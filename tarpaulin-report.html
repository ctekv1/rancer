<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

nvas\n    pub fn canvas_mut(\u0026mut self) -\u003e \u0026mut Canvas {\n        \u0026mut self.canvas\n    }\n\n    /// Get a mutable reference to the undo history\n    pub fn history_mut(\u0026mut self) -\u003e \u0026mut Record\u003cCanvasCommand\u003e {\n        \u0026mut self.history\n    }\n\n    /// Get the name of the active tool\n    pub fn tool_name(\u0026self) -\u003e \u0026str {\n        self.active_tool.name()\n    }\n\n    /// Get an immutable reference to the active tool\n    pub fn active_tool(\u0026self) -\u003e \u0026dyn Tool {\n        self.active_tool.as_ref()\n    }\n\n    /// Get a mutable reference to the active tool as a trait object\n    pub fn active_tool_mut(\u0026mut self) -\u003e \u0026mut dyn Tool {\n        self.active_tool.as_mut()\n    }\n\n    /// Set the active tool\n    pub fn set_active_tool(\u0026mut self, tool: Box\u003cdyn Tool\u003e) {\n        self.active_tool = tool;\n    }\n\n    /// Check if undo is available\n    pub fn can_undo(\u0026self) -\u003e bool {\n        self.history.can_undo()\n    }\n\n    /// Check if redo is available\n    pub fn can_redo(\u0026self) -\u003e bool {\n        self.history.can_redo()\n    }\n\n    /// Handle an application event\n    pub fn handle_event(\u0026mut self, event: AppEvent) {\n        match event {\n            AppEvent::Press { x, y } =\u003e {\n                if let Some((cx, cy)) = self.viewport.screen_to_canvas(x, y) {\n                    self.active_tool.on_press(cx, cy, \u0026mut self.canvas);\n                }\n            }\n            AppEvent::Drag { x, y } =\u003e {\n                if let Some((cx, cy)) = self.viewport.screen_to_canvas(x, y) {\n                    self.active_tool.on_drag(cx, cy, \u0026mut self.canvas);\n                }\n            }\n            AppEvent::Release { x, y } =\u003e {\n                if let Some((cx, cy)) = self.viewport.screen_to_canvas(x, y) {\n                    self.active_tool.on_release(cx, cy, \u0026mut self.canvas);\n                }\n            }\n            AppEvent::Key { code } =\u003e {\n                self.handle_key(\u0026code);\n            }\n            AppEvent::Resize { width, height } =\u003e {\n                self.viewport.resize_window(width, height);\n            }\n            AppEvent::Wheel { x, y, delta } =\u003e {\n                let factor = if delta \u003e 0 { crate::viewport::ZOOM_FACTOR } else { 1.0 / crate::viewport::ZOOM_FACTOR };\n                self.viewport.zoom_toward(x, y, factor);\n            }\n            AppEvent::Pan { dx, dy } =\u003e {\n                self.viewport.pan(dx, dy);\n            }\n            AppEvent::Quit =\u003e {\n                // Handled by SDL2 loop\n            }\n        }\n    }\n\n    fn handle_key(\u0026mut self, code: \u0026str) {\n        match code {\n            \"z\" =\u003e {\n                if self.history.can_undo() {\n                    self.history.undo(\u0026mut self.canvas);\n                }\n            }\n            \"y\" =\u003e {\n                if self.history.can_redo() {\n                    self.history.redo(\u0026mut self.canvas);\n                }\n            }\n            _ =\u003e {\n                self.active_tool.on_key(code);\n            }\n        }\n    }\n\n    /// Add a new layer through the undo system\n    pub fn add_layer(\u0026mut self) {\n        let _ = self.history.edit(\u0026mut self.canvas, CanvasCommand::AddLayer(AddLayer::default()));\n    }\n\n    /// Undo the last action\n    pub fn undo(\u0026mut self) {\n        if self.history.can_undo() {\n            self.history.undo(\u0026mut self.canvas);\n        }\n    }\n\n    /// Redo the last undone action\n    pub fn redo(\u0026mut self) {\n        if self.history.can_redo() {\n            self.history.redo(\u0026mut self.canvas);\n        }\n    }\n\n    /// Execute a canvas command through the undo system\n    pub fn execute_command(\u0026mut self, command: CanvasCommand) {\n        let _ = self.history.edit(\u0026mut self.canvas, command);\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":1657324662872342528}},{"line":25,"address":[],"length":0,"stats":{"Line":3314649325744685056}},{"line":27,"address":[],"length":0,"stats":{"Line":6629298651489370112}},{"line":30,"address":[],"length":0,"stats":{"Line":9943947977234055168}},{"line":32,"address":[],"length":0,"stats":{"Line":1657324662872342528}},{"line":33,"address":[],"length":0,"stats":{"Line":1657324662872342528}},{"line":38,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":39,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":43,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":44,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":48,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":49,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":53,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":54,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":58,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":59,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":74,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":78,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":79,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":83,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":84,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address"      }\n        _ =\u003e panic!(\"expected Drag event\"),\n    }\n}\n\n#[test]\nfn app_event_release_is_constructed() {\n    use crate::events::AppEvent;\n    let evt = AppEvent::Release { x: 300.0, y: 400.0 };\n    match evt {\n        AppEvent::Release { x, y } =\u003e {\n            assert_eq!(x, 300.0);\n            assert_eq!(y, 400.0);\n        }\n        _ =\u003e panic!(\"expected Release event\"),\n    }\n}\n\n#[test]\nfn app_state_has_canvas() {\n    use crate::app::AppState;\n    let state = AppState::new(1280, 720);\n    assert!(state.canvas().layers().len() \u003e 0);\n}\n\n#[test]\nfn app_state_has_active_tool() {\n    use crate::app::AppState;\n    let state = AppState::new(1280, 720);\n    assert!(state.tool_name() == \"Brush\");\n}\n\n#[test]\nfn app_state_handle_press_modifies_canvas() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n    \n    let mut state = AppState::new(1280, 720);\n    state.handle_event(AppEvent::Press { x: 10.0, y: 10.0 });\n    // Press event should be handled without error\n    // The canvas state may change (stroke started, etc.)\n}\n\n#[test]\nfn app_state_handle_drag_updates_state() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n    \n    let mut state = AppState::new(1280, 720);\n    state.handle_event(AppEvent::Press { x: 10.0, y: 10.0 });\n    state.handle_event(AppEvent::Drag { x: 20.0, y: 20.0 });\n    // Drag after press should work\n}\n\n#[test]\nfn app_state_handle_release_completes_stroke() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n    \n    let mut state = AppState::new(1280, 720);\n    state.handle_event(AppEvent::Press { x: 10.0, y: 10.0 });\n    state.handle_event(AppEvent::Drag { x: 20.0, y: 20.0 });\n    state.handle_event(AppEvent::Release { x: 30.0, y: 30.0 });\n    // Release should complete the stroke\n}\n\n#[test]\nfn app_state_undo_redo_via_keyboard() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n    \n    let mut state = AppState::new(1280, 720);\n    assert!(!state.can_undo());\n    \n    // Add a layer\n    state.add_layer();\n    assert_eq!(state.canvas().layers.len(), 2);\n    assert!(state.can_undo());\n    \n    // Undo via key\n    state.handle_event(AppEvent::Key { code: \"z\".to_string() });\n    assert_eq!(state.canvas().layers.len(), 1);\n    assert!(!state.can_undo());\n    assert!(state.can_redo());\n    \n    // Redo via key\n    state.handle_event(AppEvent::Key { code: \"y\".to_string() });\n    assert_eq!(state.canvas().layers.len(), 2);\n}\n\n#[test]\nfn app_state_resize_does_not_change_canvas_size() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n\n    let mut state = AppState::new(1280, 720);\n    let (orig_w, orig_h) = state.canvas().size();\n\n    state.handle_event(AppEvent::Resize { width: 800, height: 600 });\n\n    assert_eq!(state.canvas().size(), (orig_w, orig_h));\n    assert_eq!(state.canvas().width(), 1280);\n    assert_eq!(state.canvas().height(), 720);\n}\n\n#[test]\nfn app_state_tracks_viewport_size_after_resize() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n\n    let mut state = AppState::new(1280, 720);\n    assert_eq!(state.viewport_width(), 1280);\n    assert_eq!(state.viewport_height(), 720);\n\n    state.handle_event(AppEvent::Resize { width: 1920, height: 1080 });\n\n    assert_eq!(state.viewport_width(), 1920);\n    assert_eq!(state.viewport_height(), 1080);\n    // Canvas should still be original size\n    assert_eq!(state.canvas().width(), 1280);\n    assert_eq!(state.canvas().height(), 720);\n}\n\n#[test]\nfn app_state_undo_redo_methods() {\n    use crate::app::AppState;\n    \n    let mut state = AppState::new(1280, 720);\n    state.add_layer();\n    assert_eq!(state.canvas().layers.len(), 2);\n    \n    state.undo();\n    assert_eq!(state.canvas().layers.len(), 1);\n    \n    state.redo();\n    assert_eq!(state.canvas().layers.len(), 2);\n}\n\n#[test]\nfn app_event_wheel_contains_position_and_delta() {\n    use crate::events::AppEvent;\n    let evt = AppEvent::Wheel { x: 100.0, y: 200.0, delta: 1 };\n    match evt {\n        AppEvent::Wheel { x, y, delta } =\u003e {\n            assert_eq!(x, 100.0);\n            assert_eq!(y, 200.0);\n            assert_eq!(delta, 1);\n        }\n        _ =\u003e panic!(\"expected Wheel event\"),\n    }\n}\n\n#[test]\nfn app_event_pan_contains_deltas() {\n    use crate::events::AppEvent;\n    let evt = AppEvent::Pan { dx: 10.0, dy: 20.0 };\n    match evt {\n        AppEvent::Pan { dx, dy } =\u003e {\n            assert_eq!(dx, 10.0);\n            assert_eq!(dy, 20.0);\n        }\n        _ =\u003e panic!(\"expected Pan event\"),\n    }\n}\n\n#[test]\nfn pan_event_moves_viewport_offset() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n\n    let mut state = AppState::new(1280, 720);\n    let before_x = state.viewport().offset_x;\n    let before_y = state.viewport().offset_y;\n\n    state.handle_event(AppEvent::Pan { dx: 50.0, dy: 30.0 });\n\n    assert!((state.viewport().offset_x - before_x - 50.0).abs() \u003c 1e-6);\n    assert!((state.viewport().offset_y - before_y - 30.0).abs() \u003c 1e-6);\n}\n\n#[test]\nfn wheel_event_zooms_in() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n\n    let mut state = AppState::new(1280, 720);\n    let orig_scale = state.viewport().scale;\n\n    state.handle_event(AppEvent::Wheel { x: 640.0, y: 360.0, delta: 1 });\n\n    assert!(state.viewport().scale \u003e orig_scale);\n}\n\n#[test]\nfn wheel_event_zooms_out() {\n    use crate::app::AppState;\n    use crate::events::AppEvent;\n\n    let mut state = AppState::new(1280, 720);\n    state.viewport_mut().scale = 2.0;\n    let orig_scale = state.viewport().scale;\n\n    state.handle_event(AppEvent::Wheel { x: 640.0, y: 360.0, delta: -1 });\n\n    assert!(state.viewport().scale \u003c orig_scale);\n}\n\n#[test]\nfn app_state_press_at_centered_viewport_maps_to_canvas_coord() {\n    use crate:: ests {\n    use super::*;\n\n    #[test]\n    fn test_dab_mask_creates_square_buffer() {\n        let dab = DabMask::new(3);\n        assert_eq!(dab.width, 3);\n        assert_eq!(dab.height, 3);\n        assert_eq!(dab.data.len(), 36);\n    }\n\n    #[test]\n    fn test_dab_mask_get_alpha_returns_full_opacity_by_default() {\n        let dab = DabMask::new(2);\n        assert_eq!(dab.get_alpha(0, 0), 255);\n        assert_eq!(dab.get_alpha(1, 1), 255);\n    }\n\n    #[test]\n    fn test_dab_mask_get_alpha_returns_zero_for_out_of_bounds() {\n        let dab = DabMask::new(2);\n        assert_eq!(dab.get_alpha(5, 0), 0);\n        assert_eq!(dab.get_alpha(0, 5), 0);\n    }\n\n    #[test]\n    fn test_dab_mask_set_alpha_updates_pixel() {\n        let mut dab = DabMask::new(2);\n        dab.set_alpha(0, 0, 128);\n        assert_eq!(dab.get_alpha(0, 0), 128);\n    }\n\n    #[test]\n    fn test_dab_mask_set_alpha_ignores_out_of_bounds() {\n        let mut dab = DabMask::new(2);\n        dab.set_alpha(5, 5, 128);\n        assert_eq!(dab.get_alpha(5, 5), 0);\n    }\n\n    #[test]\n    fn test_dab_mask_clamped_to_minimum_size() {\n        let dab = DabMask::new(0);\n        assert_eq!(dab.width, 1);\n        assert_eq!(dab.height, 1);\n    }\n}","traces":[{"line":14,"address":[],"length":0,"stats":{"Line":2954361355555045376}},{"line":15,"address":[],"length":0,"stats":{"Line":8863084066665136128}},{"line":19,"address":[],"length":0,"stats":{"Line":5908722711110090752}},{"line":23,"address":[],"length":0,"stats":{"Line":10880696699727118336}},{"line":24,"address":[],"length":0,"stats":{"Line":3170534137668829173}},{"line":25,"address":[],"length":0,"stats":{"Line":216172782113783819}},{"line":27,"address":[],"length":0,"stats":{"Line":2882303761517117418}},{"line":28,"address":[],"length":0,"stats":{"Line":5764607523034234836}},{"line":31,"address":[],"length":0,"stats":{"Line":14195346025471803392}},{"line":32,"address":[],"length":0,"stats":{"Line":9871890383196127221}},{"l ab: \u0026DabMask,\n        color: Color,\n    ) {\n        let final_alpha_mul = color.a as f32 / 255.0;\n        Self::apply_dab(buffer, cx, cy, dab, |dab_alpha, pixel| {\n            let final_alpha = ((dab_alpha as f32 / 255.0) * final_alpha_mul * 255.0) as u8;\n            let src_a = final_alpha as f32 / 255.0;\n            pixel.set_r(((color.r as f32 * src_a) + (pixel.r() as f32 * (1.0 - src_a))) as u8);\n            pixel.set_g(((color.g as f32 * src_a) + (pixel.g() as f32 * (1.0 - src_a))) as u8);\n            pixel.set_b(((color.b as f32 * src_a) + (pixel.b() as f32 * (1.0 - src_a))) as u8);\n            pixel.set_a((pixel.a() as u16 + final_alpha as u16).min(255) as u8);\n        });\n    }\n\n    pub fn erase_dab(\n        buffer: \u0026mut RasterImage,\n        cx: i32,\n        cy: i32,\n        dab: \u0026DabMask,\n        bg_color: Color,\n        erase_opacity: f32,\n    ) {\n        Self::apply_dab(buffer, cx, cy, dab, |dab_alpha, pixel| {\n            let erase_strength = (dab_alpha as f32 / 255.0) * erase_opacity;\n            let new_a = (pixel.a() as f32 * (1.0 - erase_strength)) as u8;\n            pixel.set_a(new_a);\n            if new_a == 0 {\n                pixel.set_r(bg_color.r);\n                pixel.set_g(bg_color.g);\n                pixel.set_b(bg_color.b);\n            }\n        });\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::brush::RoundDab;\n\n    #[test]\n    fn test_stamp_dab_affects_pixels_at_center() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 255, g: 0, b: 0, a: 255 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, 5, 5, \u0026dab, color);\n\n        let px = buffer.get_pixel(5, 5).unwrap();\n        assert!(px.0 \u003e 0);\n    }\n\n    #[test]\n    fn test_stamp_dab_does_not_affect_distant_pixels() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 255, g: 0, b: 0, a: 255 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, 0, 0, \u0026dab, color);\n\n        let px = buffer.get_pixel(5, 5).unwrap();\n        assert_eq!(px.0, 0);\n    }\n\n    #[test]\n    fn test_stamp_dab_respects_partial_transparency() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 255, g: 0, b: 0, a: 128 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, 5, 5, \u0026dab, color);\n\n        let px = buffer.get_pixel(5, 5).unwrap();\n        assert!(px.0 \u003e px.1);\n        assert!(px.0 \u003c 255);\n    }\n\n    #[test]\n    fn test_stamp_dab_out_of_bounds_is_ignored() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(20);\n        let color = Color { r: 255, g: 0, b: 0, a: 255 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, -5, -5, \u0026dab, color);\n    }\n\n    #[test]\n    fn test_draw_line_produces_continuous_pixels() {\n        let mut buffer = RasterImage::new(20, 20);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 50, g: 50, b: 50, a: 200 };\n\n        for t in [0.0_f32, 0.5, 1.0] {\n            let x = (0.0 + (10.0 - 0.0) * t) as i32;\n            let y = (0.0 + (10.0 - 0.0) * t) as i32;\n            BrushEngine::stamp_dab(\u0026mut buffer, x, y, \u0026dab, color);\n        }\n\n        let px = buffer.get_pixel(0, 0).unwrap();\n        assert!(px.0 \u003e 0);\n        let px = buffer.get_pixel(10, 10).unwrap();\n        assert!(px.0 \u003e 0);\n    }\n\n    #[test]\n    fn test_small_dab_does_not_panic() {\n        let mut buffer = RasterImage::new(3, 3);\n        let dab = RoundDab::generate(1);\n        BrushEngine::stamp_dab(\u0026mut buffer, 1, 1, \u0026dab, Color { r: 100, g: 100, b: 100, a: 200 });\n    }\n}","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":15,"address":[],"length":0,"stats":{"Lin              0\n                };\n                dab.set_alpha(x, y, alpha);\n            }\n        }\n        dab\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_round_dab_center_has_high_opacity() {\n        let dab = RoundDab::generate(5);\n        let alpha = dab.get_alpha(2, 2);\n        assert!(alpha \u003e 128);\n    }\n\n    #[test]\n    fn test_round_dab_corners_have_zero_opacity() {\n        let dab = RoundDab::generate(5);\n        assert_eq!(dab.get_alpha(0, 0), 0);\n        assert_eq!(dab.get_alpha(4, 4), 0);\n    }\n\n    #[test]\n    fn test_round_dab_edge_pixels_are_antialiased() {\n        let dab = RoundDab::generate(5);\n        let center_alpha = dab.get_alpha(2, 2);\n        let corner_alpha = dab.get_alpha(0, 0);\n        assert!(center_alpha \u003e corner_alpha);\n        assert!(center_alpha \u003e 0);\n        assert_eq!(corner_alpha, 0);\n    }\n\n    #[test]\n    fn test_round_dab_small_size() {\n        let dab = RoundDab::generate(1);\n        assert!(dab.get_alpha(0, 0) \u003e 0);\n    }\n}","traces":[{"line":8,"address":[],"length":0,"stats":{"Line":2522015791327477760}},{"line":9,"address":[],"length":0,"stats":{"Line":2522015791327477760}},{"line":10,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":13,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":14,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":15,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":16,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":17,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":19,"address":[],"length":0,"stats":{"Line":5332261958806667264}},{"line":20,"address":[],"length":0,"stats":{"Line":17005592192950992897}},{"line":21,"address":[],"length":0,"stats":{"Line":9655717601082343426}},{"line":22,"address":[],"length":0,"stats":{"Line":9655717601082343426}},{"line":23,"address":[],"length":0,"s     let v = v / 100.0;\n    let h_norm = h / 60.0;\n    let i = h_norm.floor() as i32 % 6;\n    let f = h_norm - h_norm.floor();\n    let p = v * (1.0 - s);\n    let q = v * (1.0 - s * f);\n    let t = v * (1.0 - s * (1.0 - f));\n\n    let (r, g, b) = match i {\n        0 =\u003e (v, t, p),\n        1 =\u003e (q, v, p),\n        2 =\u003e (p, v, t),\n        3 =\u003e (p, q, v),\n        4 =\u003e (t, p, v),\n        _ =\u003e (v, p, q),\n    };\n\n    Color {\n        r: (r * 255.0).round() as u8,\n        g: (g * 255.0).round() as u8,\n        b: (b * 255.0).round() as u8,\n        a: 255,\n    }\n}\n\npub fn rgb_to_hsv(color: Color) -\u003e HsvColor {\n    let r = color.r as f32 / 255.0;\n    let g = color.g as f32 / 255.0;\n    let b = color.b as f32 / 255.0;\n    let max = r.max(g).max(b);\n    let min = r.min(g).min(b);\n    let delta = max - min;\n\n    let v = max * 100.0;\n    let s = if max.abs() \u003c f32::EPSILON {\n        0.0\n    } else {\n        delta / max * 100.0\n    };\n    let h = if delta.abs() \u003c f32::EPSILON {\n        0.0\n    } else if (max - r).abs() \u003c f32::EPSILON {\n        60.0 * (((g - b) / delta) % 6.0)\n    } else if (max - g).abs() \u003c f32::EPSILON {\n        60.0 * ((b - r) / delta + 2.0)\n    } else {\n        60.0 * ((r - g) / delta + 4.0)\n    };\n\n    HsvColor { h, s, v }\n}\n\n/// Pixel reference for mutable access\npub struct PixelRef\u003c'a\u003e {\n    data: \u0026'a mut [u8],\n}\n\nimpl\u003c'a\u003e PixelRef\u003c'a\u003e {\n    pub fn r(\u0026self) -\u003e u8 { self.data[0] }\n    pub fn g(\u0026self) -\u003e u8 { self.data[1] }\n    pub fn b(\u0026self) -\u003e u8 { self.data[2] }\n    pub fn a(\u0026self) -\u003e u8 { self.data[3] }\n\n    pub fn set_r(\u0026mut self, r: u8) { self.data[0] = r; }\n    pub fn set_g(\u0026mut self, g: u8) { self.data[1] = g; }\n    pub fn set_b(\u0026mut self, b: u8) { self.data[2] = b; }\n    pub fn set_a(\u0026mut self, a: u8) { self.data[3] = a; }\n}\n\n/// Raster image data (RGBA pixels)\n#[derive(Debug, Clone)]\npub struct RasterImage {\n    pub width: u32,\n    pub height: u32,\n    pub data: Vec\u003cu8\u003e,\n}\n\nimpl RasterImage {\n    pub fn new(width: u32, height: u32) -\u003e Self {\n        Self {\n            width,\n            height,\n            data: vec![0; (width * height * 4) as usize],\n        }\n    }\n\n    pub fn get_pixel(\u0026self, x: u32, y: u32) -\u003e Option\u003c(u8, u8, u8, u8)\u003e {\n        if x \u003e= self.width || y \u003e= self.height {\n            return None;\n        }\n        let idx = ((y * self.width + x) * 4) as usize;\n        Some((\n            self.data[idx],\n            self.data[idx + 1],\n            self.data[idx + 2],\n            self.data[idx + 3],\n        ))\n    }\n\n    pub fn set_pixel(\u0026mut self, x: u32, y: u32, r: u8, g: u8, b: u8, a: u8) {\n        if x \u003e= self.width || y \u003e= self.height {\n            return;\n        }\n        let idx = ((y * self.width + x) * 4) as usize;\n        self.data[idx] = r;\n        self.data[idx + 1] = g;\n        self.data[idx + 2] = b;\n        self.data[idx + 3] = a;\n    }\n\n    pub fn get_pixel_mut(\u0026mut self, x: u32, y: u32) -\u003e Option\u003cPixelRef\u003c'_\u003e\u003e {\n        if x \u003e= self.width || y \u003e= self.height {\n            return None;\n        }\n        let idx = ((y * self.width + x) * 4) as usize;\n        Some(PixelRef { data: \u0026mut self.data[idx..idx + 4] })\n    }\n\n    pub fn resize(\u0026mut self, width: u32, height: u32) {\n        self.width = width;\n        self.height = height;\n        self.data.resize((width * height * 4) as usize, 0);\n    }\n\n    pub fn fill(\u0026mut self, color: Color) {\n        let bytes = [color.r, color.g, color.b, color.a];\n        for chunk in self.data.chunks_exact_mut(4) {\n            chunk.copy_from_slice(\u0026bytes);\n        }\n    }\n}\n\n#[cfg(test)]\nmod pixel_ref_tests {\n    use super::*;\n\n    #[test]\n    fn test_pixel_ref_reads_correct_values() {\n        let mut image = RasterImage::new(2, 2);\n        image.set_pixel(0, 0, 10, 20, 30, 40);\n        \n        if let Some(pixel) = image.get_pixel_mut(0, 0) {\n            assert_eq!(pixel.r(), 10);\n            assert_eq!(pixel.g(), 20);\n            assert_eq!(pixel.b(), 30);\n            assert_eq!(pixel.a(), 40);\n        } else {\n            panic!(\"Expected pixel\");\n        }\n    }\n\n    #[test]\n    fn test_pixel_ref_writes_correct_values() {\n        let mut image = RasterImage::new(2, 2);\n        \n        if let Some(mut pixel) = image.get_pixel_mut(0, 0) {\n            pixel.set_r(100);\n            pixel.set_g(150);\n            pixel.set_b(200);\n            pixel.set_a(250);\n        }\n        \n        assert_eq!(image.get_pixel(0, 0), Some((100, 150, 200, 250)));\n    }\n\n    #[test]\n    fn test_pixel_ref_returns_none_for_out_of_bounds() {\n        let mut image = RasterImage::new(2, 2);\n        assert!(image.get_pixel_mut(5, 0).is_none());\n        assert!(image.get_pixel_mut(0, 5).is_none());\n    }\n}\n\n/// Represents a single layer in the canvas (raster only)\n#[derive(Debug, Clone)]\npub struct Layer {\n    pub name: String,\n    pub content: RasterImage,\n    pub visible: bool,\n    pub opacity: f32,\n    pub locked: bool,\n}\n\nimpl Default for Layer {\n    fn default() -\u003e Self {\n        Self {\n            name: \"Layer 1\".to_string(),\n            content: RasterImage::new(1280, 720),\n            visible: true,\n            opacity: 1.0,\n            locked: false,\n        }\n    }\n}\n\nimpl Layer {\n    pub fn new(name: String, width: u32, height: u32, opacity: f32) -\u003e Self {\n        Self {\n            name,\n            content: RasterImage::new(width, height),\n            visible: true,\n            opacity,\n            locked: false,\n        }\n    }\n\n    pub fn content_mut(\u0026mut self) -\u003e \u0026mut RasterImage {\n        \u0026mut self.content\n    }\n\n    pub fn content(\u0026self) -\u003e \u0026RasterImage {\n        \u0026self.content\n    }\n\n    pub fn clear(\u0026mut self) {\n        self.content.fill(Color::TRANSPARENT);\n    }\n}\n\n/// The main canvas for drawing operations\n#[derive(Clone)]\npub struct Canvas {\n    pub(crate) width: u32,\n    pub(crate) height: u32,\n    pub(crate) background_color: Color,\n    pub(crate) layers: Vec\u003cLayer\u003e,\n    pub(crate) active_layer: usize,\n    pub(crate) version: u64,\n    dirty_rect: DirtyRect,\n}\n\n/// Rectangle representing a dirty region\n#[derive(Debug, Clone, Copy)]\npub struct DirtyRect {\n    pub x: u32,\n    pub y: u32,\n    pub width: u32,\n    pub height: u32,\n    is_dirty: bool,\n}\n\nimpl DirtyRect {\n    pub fn new() -\u003e Self {\n        Self {\n            x: 0,\n            y: 0,\n            width: 0,\n            height: 0,\n            is_dirty: false,\n        }\n    }\n\n    pub fn is_empty(\u0026self) -\u003e bool {\n        !self.is_dirty\n    }\n\n    pub fn contains(\u0026self, x: u32, y: u32) -\u003e bool {\n        self.is_dirty \u0026\u0026 x \u003e= self.x \u0026\u0026 x \u003c self.x + self.width \u0026\u0026 y \u003e= self.y \u0026\u0026 y \u003c self.y + self.height\n    }\n\n    pub fn mark_pixel(\u0026mut self, x: u32, y: u32) {\n        if !self.is_dirty {\n            self.x = x;\n            self.y = y;\n            self.width = 1;\n            self.height = 1;\n            self.is_dirty = true;\n        } else {\n            let new_min_x = self.x.min(x);\n            let new_min_y = self.y.min(y);\n            let new_max_x = (self.x + self.width).max(x + 1);\n            let new_max_y = (self.y + self.height).max(y + 1);\n            self.x = new_min_x;\n            self.y = new_min_y;\n            self.width = new_max_x - new_min_x;\n            self.height = new_max_y - new_min_y;\n        }\n    }\n\n    pub fn mark_rect(\u0026mut self, x: u32, y: u32, w: u32, h: u32) {\n        if w == 0 || h == 0 {\n            return;\n        }\n        if !self.is_dirty {\n            self.x = x;\n            self.y = y;\n            self.width = w;\n            self.height = h;\n            self.is_dirty = true;\n        } else {\n            let new_min_x = self.x.min(x);\n            let new_min_y = self.y.min(y);\n            let new_max_x = (self.x + self.width).max(x + w);\n            let new_max_y = (self.y + self.height).max(y + h);\n            self.x = new_min_x;\n            self.y = new_min_y;\n            self.width = new_max_x - new_min_x;\n            self.height = new_max_y - new_min_y;\n        }\n    }\n\n    pub fn clear(\u0026mut self) {\n        self.is_dirty = false;\n        self.x = 0;\n        self.y = 0;\n        self.width = 0;\n        self.height = 0;\n    }\n\n    pub fn mark_full(\u0026mut self, width: u32, height: u32) {\n        self.x = 0;\n        self.y = 0;\n        self.width = width;\n        self.height = height;\n        self.is_dirty = true;\n    }\n}\n\nimpl Default for DirtyRect {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl Default for Canvas {\n    fn default() -\u003e Self {\n        Self {\n            width: 1280,\n            height: 720,\n            background_color: Color::WHITE,\n            layers: vec![Layer::new(\"Background\".to_string(), 1280, 720, 1.0)],\n            active_layer: 0,\n            version: 0,\n            dirty_rect: DirtyRect::new(),\n        }\n    }\n}\n\nimpl Canvas {\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    pub fn with_size(width: u32, height: u32) -\u003e Self {\n        let mut canvas = Self::new();\n        canvas.resize(width, height);\n        canvas\n    }\n\n    pub fn version(\u0026self) -\u003e u64 {\n        self.version\n    }\n\n    pub fn width(\u0026self) -\u003e u32 {\n        self.width\n    }\n\n    pub fn height(\u0026self) -\u003e u32 {\n        self.height\n    }\n\n    pub fn active_layer_index(\u0026self) -\u003e usize {\n        self.active_layer\n    }\n\n    pub fn invalidate(\u0026mut self) {\n        self.version += 1;\n        self.dirty_rect.mark_full(self.width, self.height);\n    }\n\n    pub fn mark_dirty(\u0026mut self, x: u32, y: u32) {\n        self.version += 1;\n        self.dirty_rect.mark_pixel(x, y);\n    }\n\n    pub fn mark_dirty_rect(\u0026mut self, x: u32, y: u32, w: u32, h: u32) {\n        self.version += 1;\n        self.dirty_rect.mark_rect(x, y, w, h);\n    }\n\n    pub fn dirty_rect(\u0026self) -\u003e \u0026DirtyRect {\n        \u0026self.dirty_rect\n    }\n\n    pub fn consume_dirty_rect(\u0026mut self) -\u003e DirtyRect {\n        let dirty = self.dirty_rect;\n        self.dirty_rect.clear();\n        dirty\n    }\n\n    pub fn resize(\u0026mut self, width: u32, height: u32) {\n        self.width = width;\n        self.height = height;\n        for layer in \u0026mut self.layers {\n            layer.content.resize(width, height);\n        }\n        self.invalidate();\n    }\n\n    pub fn set_background(\u0026mut self, color: Color) {\n        self.background_color = color;\n        self.invalidate();\n    }\n\n    pub fn clear(\u0026mut self) {\n        for layer in \u0026mut self.layers {\n            layer.clear();\n        }\n        self.invalidate();\n    }\n\n    pub fn size(\u0026self) -\u003e (u32, u32) {\n        (self.width, self.height)\n    }\n\n    pub fn background_color(\u0026self) -\u003e Color {\n        self.background_color\n    }\n\n    pub fn layers(\u0026self) -\u003e \u0026[Layer] {\n        \u0026self.layers\n    }\n\n    pub fn layers_mut(\u0026mut self) -\u003e \u0026mut [Layer] {\n        \u0026mut self.layers\n    }\n\n    pub fn layer_count(\u0026self) -\u003e usize {\n        self.layers.len()\n    }\n\n    pub fn active_layer(\u0026self) -\u003e usize {\n        self.active_layer\n    }\n\n    pub fn set_active_layer(\u0026mut self, index: usize) -\u003e Result\u003c(), String\u003e {\n        if index \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        self.active_layer = index;\n        Ok(())\n    }\n\n    pub fn add_layer(\u0026mut self, name: Option\u003cString\u003e) -\u003e Result\u003cusize, String\u003e {\n        const MAX_LAYERS: usize = 20;\n        if self.layers.len() \u003e= MAX_LAYERS {\n            return Err(\"Maximum number of layers reached\".to_string());\n        }\n        let layer_name = name.unwrap_or_else(|| format!(\"Layer {}\", self.layers.len()));\n        self.layers.push(Layer::new(layer_name, self.width, self.height, 1.0));\n        self.invalidate();\n        Ok(self.layers.len() - 1)\n    }\n\n    pub fn remove_layer(\u0026mut self, index: usize) -\u003e Result\u003c(), String\u003e {\n        if index == 0 {\n            return Err(\"Cannot remove background layer\".to_string());\n        }\n        if index \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        self.layers.remove(index);\n        if self.active_layer \u003e= self.layers.len() {\n            self.active_layer = self.layers.len() - 1;\n        }\n        self.invalidate();\n        Ok(())\n    }\n\n    pub fn move_layer(\u0026mut self, from: usize, to: usize) -\u003e Result\u003c(), String\u003e {\n        if from \u003e= self.layers.len() || to \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        let layer = self.layers.remove(from);\n        self.layers.insert(to, layer);\n        if self.active_layer == from {\n            self.active_layer = to;\n        }\n        self.invalidate();\n        Ok(())\n    }\n\n    pub fn toggle_layer_visibility(\u0026mut self, index: usize) -\u003e Result\u003c(), String\u003e {\n        if index \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        self.layers[index].visible = !self.layers[index].visible;\n        self.invalidate();\n        Ok(())\n    }\n\n    pub fn set_layer_opacity(\u0026mut self, index: usize, opacity: f32) -\u003e Result\u003c(), String\u003e {\n        if index \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        self.layers[index].opacity = opacity.clamp(0.0, 1.0);\n        self.invalidate();\n        Ok(())\n    }\n\n    pub fn toggle_layer_lock(\u0026mut self, index: usize) -\u003e Result\u003c(), String\u003e {\n        if index \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        self.layers[index].locked = !self.layers[index].locked;\n        self.invalidate();\n        Ok(())\n    }\n\n    pub fn clear_layer(\u0026mut self, index: usize) -\u003e Result\u003c(), String\u003e {\n        if index \u003e= self.layers.len() {\n            return Err(\"Invalid layer index\".to_string());\n        }\n        self.layers[index].clear();\n        Ok(())\n    }\n\n    pub fn active_layer_mut(\u0026mut self) -\u003e \u0026mut Layer {\n        \u0026mut self.layers[self.active_layer]\n    }\n\n    pub fn is_active_layer_locked(\u0026self) -\u003e bool {\n        self.layers[self.active_layer].locked\n    }\n}\n","traces":[{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":50,"address":[],"length":0,"stats":{"Line":0}},{"line":51,"address":[],"length":0,"stats":{"Line":0}},{"line":55,"address":[],"length":0,"stats":{"Line":0}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":0}},{"line":61,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":65,"address":[],"length ,{"line":567,"address":[],"length":0,"stats":{"Line":0}},{"line":568,"address":[],"length":0,"stats":{"Line":0}},{"line":570,"address":[],"length":0,"stats":{"Line":0}},{"line":571,"address":[],"length":0,"stats":{"Line":0}},{"line":574,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":575,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":578,"address":[],"length":0,"stats":{"Line":0}},{"line":579,"address":[],"length":0,"stats":{"Line":0}}],"covered":161,"coverable":258},{"path":["C:","\\","Users","robin","Projects","rancer","src","commands.rs"],"content":"//! Undo/redo commands for canvas operations\n//!\n//! Each command implements the `undo::Edit` trait, providing `edit()` and `undo()` methods.\n\nuse undo::Edit;\n\nuse crate::canvas::{Canvas, Layer};\n\n/// Enum wrapping all canvas commands for use with a single Record\n#[derive(Debug, Clone)]\npub enum CanvasCommand {\n    AddLayer(AddLayer),\n    RemoveLayer(RemoveLayer),\n    ToggleVisibility(ToggleVisibility),\n    SetOpacity(SetOpacity),\n}\n\nimpl Edit for CanvasCommand {\n    type Target = Canvas;\n    type Output = Result\u003c(), String\u003e;\n\n    fn edit(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        match self {\n            CanvasCommand::AddLayer(cmd) =\u003e cmd.edit(target),\n            CanvasCommand::RemoveLayer(cmd) =\u003e cmd.edit(target),\n            CanvasCommand::ToggleVisibility(cmd) =\u003e {\n                cmd.edit(target);\n                Ok(())\n            }\n            CanvasCommand::SetOpacity(cmd) =\u003e {\n                cmd.edit(target);\n                Ok(())\n            }\n        }\n    }\n\n    fn undo(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        match self {\n            CanvasCommand::AddLayer(cmd) =\u003e cmd.undo(target),\n            CanvasCommand::RemoveLayer(cmd) =\u003e cmd.undo(target),\n            CanvasCommand::ToggleVisibility(cmd) =\u003e {\n vel::Info =\u003e \"INFO\",\n            LogLevel::Warn =\u003e \"WARN\",\n            LogLevel::Error =\u003e \"ERROR\",\n        }\n    }\n}\n\n/// Global logger instance\nstatic LOGGER: Mutex\u003cOption\u003cFile\u003e\u003e = Mutex::new(None);\n\n/// Get the platform-specific log file path\nfn get_log_path() -\u003e PathBuf {\n    if let Some(data_dir) = dirs::data_local_dir() {\n        let rancer_dir = data_dir.join(\"rancer\");\n        let _ = std::fs::create_dir_all(\u0026rancer_dir);\n        rancer_dir.join(\"rancer.log\")\n    } else {\n        // Fallback to CWD if platform directory unavailable\n        PathBuf::from(\"rancer.log\")\n    }\n}\n\n/// Initialize the logger\n/// Creates or overwrites the `rancer.log` file\npub fn init() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    let log_path = get_log_path();\n    let file = OpenOptions::new()\n        .write(true)\n        .create(true)\n        .truncate(true)\n        .open(\u0026log_path)?;\n\n    let mut logger = LOGGER.lock().unwrap_or_else(|e| e.into_inner());\n    *logger = Some(file);\n\n    let log_path_str = log_path.display();\n    let timestamp = Local::now().format(\"%Y-%m-%d %H:%M:%S\");\n    let log_line = format!(\n        \"[{}] INFO  - Logger initialized - writing to {}\\n\",\n        timestamp, log_path_str\n    );\n    if let Some(f) = logger.as_mut() {\n        let _ = f.write_all(log_line.as_bytes());\n        let _ = f.flush();\n    }\n    // Drop the lock before printing to stdout\n    drop(logger);\n    print!(\"{}\", log_line);\n\n    Ok(())\n}\n\n/// Write a log message with timestamp and level\nfn write_log(level: LogLevel, msg: \u0026str) {\n    let timestamp = Local::now().format(\"%Y-%m-%d %H:%M:%S\");\n    let log_line = format!(\"[{}] {:5} - {}\\n\", timestamp, level.as_str(), msg);\n\n    if let Ok(mut logger) = LOGGER.lock()\n        \u0026\u0026 let Some(file) = logger.as_mut()\n    {\n        let _ = file.write_all(log_line.as_bytes());\n        let _ = file.flush();\n    }\n\n    print!(\"{}\", log_line);\n}\n\n/// Log a debug message\npub fn debug(msg: \u0026str) {\n    write_log(LogLevel::Debug, msg);\n}\n\n/// Log an info message\npub fn info(msg: \u0026str) {\n    write_log(LogLevel::Info, msg);\n}\n\n/// Log a warning message\npub fn warn(msg: \u0026str) {\n    write_log(LogLevel::Warn, msg);\n}\n\n/// Log an error message\npub fn error(msg: \u0026str) {\n    write_log(LogLevel::Error, msg);\n}\n\n/// Timing scope for profiling - prints elapsed time when dropped\npub struct Timer {\n    name: \u0026'static str,\n    start: Instant,\n}\n\nimpl Timer {\n    pub fn new(name: \u0026'static str) -\u003e Self {\n        Self {\n            name,\n            start: Instant::now(),\n        }\n    }\n}\n\nimpl Drop for Timer {\n    fn drop(\u0026mut self) {\n        let elapsed = self.start.elapsed().as_secs_f64();\n        write_log(\n            LogLevel::Debug,\n            \u0026format!(\"{} took {:.3}ms\", self.name, elapsed * 1000.0),\n        );\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_log_levels() {\n        assert_eq!(LogLevel::Debug.as_str(), \"DEBUG\");\n        assert_eq!(LogLevel::Info.as_str(), \"INFO\");\n        assert_eq!(LogLevel::Warn.as_str(), \"WARN\");\n        assert_eq!(LogLevel::Error.as_str(), \"ERROR\");\n    }\n\n    #[test]\n    fn test_logger_initialization() {\n        // This test verifies that init() can be called without deadlock\n        let result = init();\n        assert!(result.is_ok(), \"Logger initialization should succeed\");\n\n        // Verify we can write logs after initialization\n        info(\"Test log message\");\n        warn(\"Test warning\");\n        error(\"Test error\");\n\n        // If we reach here without hanging, the test passes\n        // (deadlock would cause the test to hang forever)\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"line":25,"a asPreferences,\n    pub brush: BrushPreferences,\n    pub renderer: RendererPreferences,\n    pub palette: PalettePreferences,\n}\n\n/// Window configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct WindowPreferences {\n    pub width: u32,\n    pub height: u32,\n    pub title: String,\n}\n\n/// Canvas configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CanvasPreferences {\n    pub width: u32,\n    pub height: u32,\n    pub background_color: String, // Hex format: \"#FFFFFF\"\n}\n\n/// Brush configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct BrushPreferences {\n    pub default_size: f32,\n    pub default_opacity: f32,\n    pub default_type: String,\n    pub sizes: Vec\u003cf32\u003e,\n}\n\n/// Renderer configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct RendererPreferences {\n    pub msaa_samples: u32,\n    pub clear_color: String, // Hex format: \"#FFFFFF\"\n    pub max_fps: u32,        // 0 = unlimited, default 60\n}\n\n/// Palette configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PalettePreferences {\n    pub h: f32,                      // Hue: 0-360\n    pub s: f32,                      // Saturation: 0-100\n    pub v: f32,                      // Value: 0-100\n    pub custom_colors: Vec\u003c[u8; 3]\u003e, // RGB custom colors (max 10)\n}\n\nimpl Preferences {\n    /// Update the window dimensions in preferences\n    pub fn update_window_size(\u0026mut self, width: u32, height: u32) {\n        self.window.width = width;\n        self.window.height = height;\n    }\n}\n\nimpl Default for Preferences {\n    fn default() -\u003e Self {\n        Self {\n            version: CONFIG_VERSION.to_string(),\n            window: WindowPreferences {\n                width: 1280,\n                height: 720,\n                title: \"Rancer\".to_string(),\n            },\n            canvas: CanvasPreferences {\n                width: 1280,\n                height: 720,\n                background_color: \"#FFFFFF\".to_string(),\n            },\n            brush: BrushPreferences {\n                default_size: 3.0,\n                default_opacity: 1.0,\n                default_type: \"Square\".to_string(),\n                sizes: vec![3.0, 5.0, 10.0, 25.0, 50.0],\n            },\n            renderer: RendererPreferences {\n                msaa_samples: 1,\n                clear_color: \"#FFFFFF\".to_string(),\n                max_fps: 60,\n            },\n            palette: PalettePreferences {\n                h: 0.0,\n                s: 100.0,\n                v: 100.0,\n                custom_colors: Vec::new(),\n            },\n        }\n    }\n}\n\n/// Get the platform-specific config file path\npub fn get_config_path() -\u003e PathBuf {\n    let mut path = dirs::config_dir().unwrap_or_else(|| PathBuf::from(\".\"));\n\n    #[cfg(target_os = \"windows\")]\n    {\n        path.push(\"rancer\");\n    }\n\n    #[cfg(target_os = \"linux\")]\n    {\n        path.push(\"rancer\");\n    }\n\n    path.push(\"config.toml\");\n    path\n}\n\n/// Load preferences from config file\n/// Creates default config file if it doesn't exist\npub fn load() -\u003e Preferences {\n    let config_path = get_config_path();\n\n    if !config_path.exists() {\n        crate::logger::info(\u0026format!(\n            \"Config file not found, creating defaults at: {:?}\",\n            config_path\n        ));\n        let prefs = Preferences::default();\n        if let Err(e) = save(\u0026prefs) {\n            crate::logger::error(\u0026format!(\"Failed to create config file: {}\", e));\n        }\n        return prefs;\n    }\n\n    match fs::read_to_string(\u0026config_path) {\n        Ok(content) =\u003e match toml::from_str::\u003cPreferences\u003e(\u0026content) {\n            Ok(prefs) =\u003e {\n                crate::logger::info(\u0026format!(\"Loaded preferences from: {:?}\", config_path));\n                prefs\n            }\n            Err(e) =\u003e {\n                crate::logger::warn(\u0026format!(\n                    \"Failed to parse config file, using defaults: {}\",\n                    e\n                ));\n                Preferences::default()\n            }\n        },\n        Err(e) =\u003e {\n            crate::logger::warn(\u0026format!(\n                \"Failed to read config file, using defaults: {}\",\n                e\n            ));\n            Preferences::default()\n        }\n    }\n}\n\n/// Save preferences to config file\npub fn save(prefs: \u0026Preferences) -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    let config_path = get_config_path();\n\n    if let Some(parent) = config_path.parent() {\n        fs::create_dir_all(parent)?;\n    }\n\n    let toml_string = toml::to_string(prefs)?;\n    fs::write(\u0026config_path, toml_string)?;\n    crate::logger::info(\u0026format!(\"Saved preferences to: {:?}\", config_path));\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_preferences_default_values() {\n        let prefs = Preferences::default();\n        assert_eq!(prefs.window.width, 1280);\n        assert_eq!(prefs.window.height, 720);\n        assert_eq!(prefs.window.title, \"Rancer\");\n        assert_eq!(prefs.canvas.width, 1280);\n        assert_eq!(prefs.canvas.height, 720);\n        assert_eq!(prefs.canvas.background_color, \"#FFFFFF\");\n        assert_eq!(prefs.brush.default_size, 3.0);\n        assert_eq!(prefs.brush.sizes.len(), 5);\n        assert_eq!(prefs.renderer.msaa_samples, 1);\n        assert_eq!(prefs.renderer.clear_color, \"#FFFFFF\");\n        assert_eq!(prefs.palette.h, 0.0);\n        assert_eq!(prefs.palette.s, 100.0);\n        assert_eq!(prefs.palette.v, 100.0);\n    }\n\n    #[test]\n    fn test_preferences_serialization() {\n        let prefs = Preferences::default();\n        let toml_string = toml::to_string(\u0026prefs).expect(\"Failed to serialize\");\n        assert!(toml_string.contains(\"version = \\\"1.0\\\"\"));\n        assert!(toml_string.contains(\"width = 1280\"));\n    }\n\n    #[test]\n    fn test_config_path() {\n        let path = get_config_path();\n        assert!(path.to_string_lossy().contains(\"rancer\"));\n        assert!(path.to_string_lossy().ends_with(\"config.toml\"));\n    }\n\n    #[test]\n    fn test_preferences_deserialization() {\n        let original = Preferences::default();\n        let toml_string = toml::to_string(\u0026original).expect(\"Failed to serialize\");\n        let deserialized: Preferences =\n            toml::from_str(\u0026toml_string).expect(\"Failed to deserialize\");\n\n        assert_eq!(deserialized.version, original.version);\n        assert_eq!(deserialized.window.width, original.window.width);\n        assert_eq!(deserialized.window.height, original.window.height);\n        assert_eq!(deserialized.window.title, original.window.title);\n        assert_eq!(deserialized.canvas.width, original.canvas.width);\n        assert_eq!(deserialized.brush.default_size, original.brush.default_size);\n        assert_eq!(deserialized.brush.sizes.len(), original.brush.sizes.len());\n        assert_eq!(deserialized.palette.h, original.palette.h);\n        assert_eq!(deserialized.palette.s, original.palette.s);\n        assert_eq!(deserialized.palette.v, original.palette.v);\n    }\n\n    #[test]\n    fn test_preferences_round_trip() {\n        let mut prefs = Preferences::default();\n        prefs.window.width = 1920;\n        prefs.window.height = 1080;\n        prefs.brush.default_size = 10.0;\n        prefs.palette.h = 180.0;\n        prefs.palette.s = 50.0;\n        prefs.palette.v = 75.0;\n\n        let toml_string = toml::to_string(\u0026prefs).expect(\"Failed to serialize\");\n        let recovered: Preferences = toml::from_str(\u0026toml_string).expect(\"Failed to deserialize\");\n\n        assert_eq!(recovered.window.width, 1920);\n        assert_eq!(recovered.window.height, 1080);\n        assert_eq!(recovered.brush.default_size, 10.0);\n        assert_eq!(recovered.palette.h, 180.0);\n        assert_eq!(recovered.palette.s, 50.0);\n        assert_eq!(recovered.palette.v, 75.0);\n    }\n\n    #[test]\n    fn test_preferences_save_and_load() {\n        let mut prefs = Preferences::default();\n        prefs.window.width = 1024;\n        prefs.window.height = 768;\n\n        // Save to a temp file\n        let temp_dir = std::env::temp_dir().join(\"rancer_test_prefs\");\n        std::fs::create_dir_all(\u0026temp_dir).unwrap();\n        let temp_config = temp_dir.join(\"config.toml\");\n\n        let toml_string = toml::to_string(\u0026prefs).unwrap();\n        std::fs::write(\u0026temp_config, \u0026toml_string).unwrap();\n\n        // Read it back\n        let content = std::fs::read_to_string(\u0026temp_config).unwrap();\n        let loaded: Preferences = toml::from_str(\u0026content).unwrap();\n\n        assert_eq!(loaded.window.width, 1024);\n        assert_eq!(loaded.window.height, 768);\n\n        // Cleanup\n        let _ = std::fs::remove_dir_all(\u0026temp_dir);\n    }\n\n    #[test]\n    fn test_preferences_corrupted_toml() {\n        let corrupted = \"this is not valid toml {{{{\";\n        let result = toml::from_str::\u003cPreferences\u003e(corrupted);\n        assert!(result.is_err(), \"Corrupted TOML should fail to parse\");\n    }\n\n    #[test]\n    fn test_preferences_window_defaults() {\n        let prefs = Preferences::default();\n        assert!(prefs.window.width \u003e 0);\n        assert!(prefs.window.height \u003e 0);\n        assert!(!prefs.window.title.is_empty());\n    }\n\n    #[test]\n    fn test_preferences_brush_defaults() {\n        let prefs = Preferences::default();\n        assert!(prefs.brush.default_size \u003e 0.0);\n        assert!(prefs.brush.default_size \u003c= 100.0);\n    }\n\n    #[test]\n    fn test_preferences_palette_defaults() {\n        let prefs = Preferences::default();\n        assert_eq!(prefs.palette.h, 0.0);\n        assert_eq!(prefs.palette.s, 100.0);\n        assert_eq!(prefs.palette.v, 100.0);\n    }\n\n    #[test]\n    fn test_preferences_serialization_roundtrip() {\n        let prefs = Preferences::default();\n        let serialized = toml::to_string(\u0026prefs).unwrap();\n        let deserialized: Preferences = toml::from_str(\u0026serialized).unwrap();\n        assert_eq!(prefs.window.width, deserialized.window.width);\n        assert_eq!(prefs.window.height, deserialized.window.height);\n        assert_eq!(prefs.brush.default_size, deserialized.brush.default_size);\n    }\n\n    #[test]\n    fn test_preferences_update_window_size() {\n        let mut prefs = Preferences::default();\n        assert_eq!(prefs.window.width, 1280);\n        assert_eq!(prefs.window.height, 720);\n\n        prefs.update_window_size(800, 600);\n\n        assert_eq!(prefs.window.width, 800);\n        assert_eq!(prefs.window.height, 600);\n    }\n\n    #[test]\n    fn test_preferences_partial_update() {\n        let mut prefs = Preferences::default();\n        let original_width = prefs.window.width;\n\n        prefs.window.width = 1920;\n        prefs.brush.default_size = 15.0;\n        prefs.palette.h = 120.0;\n        prefs.palette.s = 80.0;\n        prefs.palette.v = 60.0;\n\n        assert_eq!(prefs.window.width, 1920);\n        assert_ne!(prefs.window.width, original_width);\n        assert_eq!(prefs.brush.default_size, 15.0);\n        assert_eq!(prefs.palette.h, 120.0);\n        assert_eq!(prefs.palette.s, 80.0);\n        assert_eq!(prefs.palette.v, 60.0);\n    }\n}\n","traces":[{"line":69,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":70,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":71,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":76,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":78,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":79,"address
