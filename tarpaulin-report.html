:","\\","Users","robin","Projects","rancer","src","ui","mod.rs"],"content":"//! UI state management and egui integration\n\npub mod state;\npub use state::{UiState, ToolType};\n\npub mod egui_integration;\npub use egui_integration::EguiIntegration;\n\npub mod egui_impl;\npub use egui_impl::show_ui;\npub use egui_impl::Theme;\npub use egui_impl::IconCache;\n\npub mod icons;\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","ui","state.rs"],"content":"//! UI state management for egui interface\n//!\n//! Holds tool selection, layer operations, and panel visibility.\n//! Brush settings are stored in the active tool and accessed via the Tool trait.\n\nuse crate::app::AppState;\nuse crate::commands::{CanvasCommand, RemoveLayer, SetOpacity, ToggleVisibility};\nuse crate::tools::{BrushConfig, BrushTool};\n\npub use crate::tools::ToolType;\n\n/// UI state containing all user-facing settings and operations\npub struct UiState {\n    // Tool selection\n    pub active_tool: ToolType,\n    pub eraser_mode: bool,  // true = eraser mode (BrushTool with is_eraser=true)\n    pub color_picker_open: bool,  // Color picker popup state\n    pub pending_color: Option\u003ccrate::canvas::Color\u003e,  // Color to apply after picker closes\n    \n    // Panel visibility\n    pub show_tool_panel: bool,\n    pub show_brush_panel: bool,\n    pub show_layer_panel: bool,\n    \n    // Theme\n    pub use_dark_theme: bool,\n    \n    // Persistent color picker state (avoids premultiplied-alpha drift during editing)\n    pub hsva: Option\u003cegui_sdl2::egui::ecolor::Hsva\u003e,\n    \n}\n\nimpl UiState {\n    pub fn new() -\u003e Self {\n        Self {\n            active_tool: ToolType::Brush,\n            eraser_mode: false,\n            color_picker_open: false,\n            pending_color: None,\n            show_tool_panel: true,\n            show_brush_panel: true,\n            show_layer_panel: true,\n            use_dark_theme: true,\n            hsva: None,\n        }\n    }\n\n    /// Set the active tool\n    pub fn set_tool(\u0026mut self, tool: ToolType) {\n        self.active_tool = tool;\n    }\n\n    /// Apply UI tool selection to the AppState\n    pub fn apply_to_app(\u0026mut self, app: \u0026mut AppState) {\n        if self.active_tool == ToolType::Brush {\n            if app.tool_name() != \"Brush\" {\n                let mut tool = BrushTool::new();\n                tool.set_eraser_mode(self.eraser_mode);\n                app.set_active_tool(Box::new(tool));\n            } else if let Some(config) = app.active_tool_mut().as_brush_config() {\n                config.set_eraser_mode(self.eraser_mode);\n            }\n        }\n    }\n\n    /// Add a new layer\n    pub fn add_layer(\u0026mut self, app: \u0026mut AppState) {\n        app.add_layer();\n    }\n\n    /// Remove a layer by index\n    pub fn remove_layer(\u0026mut self, app: \u0026mut AppState, index: usize) {\n        if index \u003e 0 \u0026\u0026 index \u003c app.canvas().layer_count() {\n            app.execute_command(CanvasCommand::RemoveLayer(RemoveLayer::new(index)));\n        }\n    }\n\n    /// Toggle layer visibility\n    pub fn toggle_layer_visibility(\u0026mut self, app: \u0026mut AppState, index: usize) {\n        if index \u003c app.canvas().layer_count() {\n            app.execute_command(CanvasCommand::ToggleVisibility(ToggleVisibility::new(index)));\n        }\n    }\n\n    /// Set layer opacity\n    pub fn set_layer_opacity(\u0026mut self, app: \u0026mut AppState, index: usize, opacity: f32) {\n        if index \u003c app.canvas().layer_count() {\n            app.execute_command(CanvasCommand::SetOpacity(SetOpacity::new(index, opacity)));\n        }\n    }\n\n    /// Undo the last action\n    pub fn undo(\u0026mut self, app: \u0026mut AppState) {\n        app.undo();\n    }\n\n    /// Redo the last undone action\n    pub fn redo(\u0026mut self, app: \u0026mut AppState) {\n        app.redo();\n    }\n}\n\nimpl Default for UiState {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n","traces":[{"line":34,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":49,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":50,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":54,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":55,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":56,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":61,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":67,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":68,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":72,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":73,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":74,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":94,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":98,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":99,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}}],"covered":17,"coverable":28},{"path":["C:","\\","Users","robin","Projects","rancer","src","ui_tests.rs"],"content":"//! Tests for Phase 7: egui UI integration\n//!\n//! Tests for egui integration with SDL2, UI state management,\n//! and tool switching via the egui toolbar.\n\nuse crate::ui::{UiState, ToolType};\nuse crate::ui::egui_integration::EguiIntegration;\n\n/// Test that UiState initializes with correct defaults\n#[test]\nfn test_ui_state_defaults() {\n    let ui_state = UiState::new();\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n    assert!(ui_state.show_tool_panel);\n    assert!(ui_state.show_brush_panel);\n    assert!(ui_state.show_layer_panel);\n    // show_color_panel removed - use color_picker_open instead\n    assert!(!ui_state.color_picker_open); // Default: popup closed\n}\n\n/// Test tool switching in UiState\n#[test]\nfn test_ui_state_tool_switching() {\n    let mut ui_state = UiState::new();\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n    \n    ui_state.set_tool(ToolType::Brush);\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n}\n\n/// Test UiState apply_to_app creates correct tool\n#[test]\nfn test_ui_state_apply_to_app() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test UiState layer operations\n#[test]\nfn test_ui_state_layer_operations() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Add a layer\n    ui_state.add_layer(\u0026mut app);\n    assert!(app.canvas().layer_count() \u003e= 2); // Started with 1, added 1\n    \n    // Remove a layer (not index 0)\n    let layer_count_before = app.canvas().layer_count();\n    if layer_count_before \u003e 1 {\n        ui_state.remove_layer(\u0026mut app, 1);\n        assert_eq!(app.canvas().layer_count(), layer_count_before - 1);\n    }\n}\n\n/// Test UiState undo/redo\n#[test]\nfn test_ui_state_undo_redo() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Do an action that can be undone\n    ui_state.add_layer(\u0026mut app);\n    let layer_count_after_add = app.canvas().layer_count();\n    \n    // Undo\n    ui_state.undo(\u0026mut app);\n    assert_eq!(app.canvas().layer_count(), layer_count_after_add - 1);\n    \n    // Redo\n    ui_state.redo(\u0026mut app);\n    assert_eq!(app.canvas().layer_count(), layer_count_after_add);\n}\n\n/// Test EguiIntegration creation (requires SDL2 context)\n/// This test verifies the integration can be created without panicking\n/// Note: SDL2 can only be initialized once, so we skip if already initialized\n#[test]\nfn test_egui_integration_creation() {\n    // Skip if SDL2 already initialized (e.g., by another test)\n    let sdl = match sdl2::init() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            eprintln!(\"Skipping test: SDL2 already initialized\");\n            return;\n        }\n    };\n    let video = sdl.video().expect(\"Failed to init video\");\n    \n    let window = video\n        .window(\"Test\", 800, 600)\n        .opengl()\n        .build()\n        .expect(\"Failed to create window\");\n    \n    let gl_context = window\n        .gl_create_context()\n        .expect(\"Failed to create GL context\");\n    \n    let gl = unsafe {\n        glow::Context::from_loader_function(|s| {\n            video.gl_get_proc_address(s) as *const std::os::raw::c_void\n        })\n    };\n    \n    // This should not panic\n    let result = EguiIntegration::new(\u0026window, \u0026gl_context, \u0026gl);\n    assert!(result.is_ok(), \"EguiIntegration creation failed: {:?}\", result.err());\n}\n\n/// Test that egui context is accessible\n#[test]\nfn test_egui_integration_ctx_access() {\n    // Skip if SDL2 already initialized (e.g., by another test)\n    let sdl = match sdl2::init() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            eprintln!(\"Skipping test: SDL2 already initialized\");\n            return;\n        }\n    };\n    let video = sdl.video().expect(\"Failed to init video\");\n    \n    let window = video\n        .window(\"Test\", 800, 600)\n        .opengl()\n        .build()\n        .expect(\"Failed to create window\");\n    \n    let gl_context = window\n        .gl_create_context()\n        .expect(\"Failed to create GL context\");\n    \n    let gl = unsafe {\n        glow::Context::from_loader_function(|s| {\n            video.gl_get_proc_address(s) as *const std::os::raw::c_void\n        })\n    };\n    \n    let mut egui = EguiIntegration::new(\u0026window, \u0026gl_context, \u0026gl)\n        .expect(\"Failed to create EguiIntegration\");\n    \n    // Should be able to get context (just check it's not null)\n    let _ctx = egui.ctx(); // If this doesn't panic, it's working\n}\n\n/// Test ToolType conversion from UiState to app\n#[test]\nfn test_tool_type_consistency() {\n    assert_eq!(ToolType::Brush as u8, crate::tools::ToolType::Brush as u8);\n}\n\n/// Test that clicking tool icon in UI updates active_tool in UiState\n#[test]\nfn test_tool_switching_via_ui() {\n    let mut ui_state = UiState::new();\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n    \n    ui_state.set_tool(ToolType::Brush);\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n}\n\n/// Test that apply_to_app correctly changes the tool in AppState\n#[test]\nfn test_apply_to_app_switches_tools() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n    \n    ui_state.set_tool(ToolType::Brush);\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that tool switching preserves brush settings\n#[test]\nfn test_tool_switching_preserves_settings() {\n    use crate::app::AppState;\n    use crate::brush::BrushType;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    if let Some(config) = app.active_tool_mut().as_brush_config() {\n        config.set_brush_size(25);\n        config.set_brush_opacity(0.5);\n        config.set_brush_type(BrushType::Square);\n    }\n    \n    ui_state.set_tool(ToolType::Brush);\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that multiple rapid tool switches work correctly\n#[test]\nfn test_rapid_tool_switching() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    for _ in 0..10 {\n        ui_state.set_tool(ToolType::Brush);\n        ui_state.apply_to_app(\u0026mut app);\n    }\n    \n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that clicking Brush tool icon updates active_tool and applies to app\n#[test]\nfn test_click_brush_tool_icon() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Simulate clicking Brush tool (should already be Brush)\n    ui_state.set_tool(ToolType::Brush);\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n}\n\n/// Test that apply_to_app doesn't recreate tool if already correct\n#[test]\nfn test_apply_to_app_no_recreate() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Apply when already Brush (should not recreate)\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that SVG icon doesn't disappear on hover\n/// This tests that the UI correctly renders icons without duplication or disappearance\n#[test]\nfn test_icon_does_not_disappear_on_hover() {\n    // This is a visual test - we can't test hover state directly in unit tests\n    // But we can verify the icon loading works correctly\n    use crate::ui::icons;\n    \n    // Verify all icons can be loaded as SVG\n    let icon_list = [\n        (\"Brush\", icons::BRUSH_ICON),\n        (\"Eraser\", icons::ERASER_ICON),\n        (\"Zoom In\", icons::ZOOM_IN_ICON),\n        (\"Zoom Out\", icons::ZOOM_OUT_ICON),\n        (\"Undo\", icons::UNDO_ICON),\n        (\"Redo\", icons::REDO_ICON),\n        (\"Add Layer\", icons::ADD_LAYER_ICON),\n    ];\n    \n    for (name, svg) in \u0026icon_list {\n        // SVG should be valid and loadable\n        assert!(!svg.is_empty(), \"{} icon SVG is empty\", name);\n        assert!(svg.contains(\"\u003csvg\"), \"{} icon missing \u003csvg\u003e tag\", name);\n        assert!(svg.contains(\"\u003c/svg\u003e\"), \"{} icon missing \u003c/svg\u003e tag\", name);\n    }\n}\n\n/// Test that tool button click area is correct size (no shrinkage)\n#[test]\nfn test_tool_button_fixed_size() {\n    // Verify that the UI uses fixed min_size for tool buttons\n    // This is a code review test - checking that our implementation\n    // uses min_size(36.0, 36.0) and not shrink_to_fit()\n    use std::fs;\n    let ui_impl = fs::read_to_string(\"src/ui/egui_impl.rs\").expect(\"Failed to read egui_impl.rs\");\n    \n    // Should use min_size for fixed dimensions\n    assert!(ui_impl.contains(\"min_size(egui::vec2(36.0, 36.0))\"), \n               \"Tool buttons should use min_size(36, 36) to prevent shrinkage\");\n    \n    // Should NOT use shrink_to_fit or similar\n    assert!(!ui_impl.contains(\"shrink_to_fit\"), \n               \"Tool buttons should not shrink on hover\");\n}\n\n/// Test that icon is drawn ONCE (no duplication)\n#[test]\nfn test_icon_not_duplicated() {\n    use std::fs;\n    let ui_impl = fs::read_to_string(\"src/ui/egui_impl.rs\").expect(\"Failed to read egui_impl.rs\");\n    \n    // Should use Button::image() which draws icon once\n    assert!(ui_impl.contains(\"Button::image(\"), \n               \"Should use Button::image() to draw icon once\");\n    \n    // Should NOT have manual painter().image() calls that duplicate\n    assert!(!ui_impl.contains(\"painter().image(\"), \n               \"Should not have painter().image() calls that cause duplication\");\n}\n\n/// Test that SVG icon module exists and has expected icons\n#[test]\nfn test_svg_icons_exist() {\n    use crate::ui::icons;\n    \n    // Verify icon constants exist and are non-empty\n    assert!(!icons::BRUSH_ICON.is_empty());\n    assert!(!icons::ERASER_ICON.is_empty());\n    assert!(!icons::ZOOM_IN_ICON.is_empty());\n    assert!(!icons::ZOOM_OUT_ICON.is_empty());\n    assert!(!icons::UNDO_ICON.is_empty());\n    assert!(!icons::REDO_ICON.is_empty());\n    assert!(!icons::ADD_LAYER_ICON.is_empty());\n    \n    // Verify icons contain SVG header\n    assert!(icons::BRUSH_ICON.contains(\"\u003csvg\"));\n    assert!(icons::ERASER_ICON.contains(\"\u003csvg\"));\n    assert!(icons::ZOOM_IN_ICON.contains(\"\u003csvg\"));\n}\n\n/// Test that SVG icons are valid XML (basic check)\n#[test]\nfn test_svg_icons_valid_xml() {\n    use crate::ui::icons;\n    \n    // All icons should have opening and closing svg tags\n    let icon_list = [\n        icons::BRUSH_ICON,\n        icons::ERASER_ICON,\n        icons::COLOR_PICKER_ICON,\n        icons::MOVE_ICON,\n        icons::TEXT_ICON,\n        icons::SHAPES_ICON,\n        icons::FILL_ICON,\n        icons::LINE_ICON,\n        icons::ZOOM_IN_ICON,\n        icons::ZOOM_OUT_ICON,\n        icons::EXPORT_ICON,\n        icons::ADD_LAYER_ICON,\n        icons::DELETE_ICON,\n        icons::UNDO_ICON,\n        icons::REDO_ICON,\n        icons::EYE_ICON,\n        icons::EYE_OFF_ICON,\n        icons::SETTINGS_ICON,\n        icons::THEME_ICON,\n    ];\n    \n    for (i, svg) in icon_list.iter().enumerate() {\n        // Check basic SVG structure\n        assert!(svg.contains(\"\u003csvg\"), \"Icon {} missing \u003csvg\u003e tag\", i);\n        assert!(svg.contains(\"\u003c/svg\u003e\"), \"Icon {} missing \u003c/svg\u003e tag\", i);\n        assert!(svg.contains(\"xmlns=\"), \"Icon {} missing xmlns\", i);\n        assert!(svg.contains(\"width=\"), \"Icon {} missing width\", i);\n        assert!(svg.contains(\"height=\"), \"Icon {} missing height\", i);\n    }\n}\n\n/// Test SVG icon loading with egui_extras\n#[test]\nfn test_svg_icon_loading() {\n    // Test that egui_extras can load SVG bytes\n    use crate::ui::icons;\n    \n    // Try to load brush icon (this tests the API without needing egui context)\n    let svg_bytes = icons::BRUSH_ICON.as_bytes();\n    assert!(!svg_bytes.is_empty());\n    \n    // Verify SVG has expected elements for a brush icon\n    let svg_str = std::str::from_utf8(svg_bytes).expect(\"SVG should be valid UTF-8\");\n    assert!(svg_str.contains(\"path\"), \"Brush icon should have path elements\");\n}\n\n/// Test UiState has theme toggle field\n#[test]\nfn test_ui_state_theme_toggle() {\n    let ui_state = UiState::new();\n    // Should have use_dark_theme field\n    assert!(ui_state.use_dark_theme); // Default is true (dark theme)\n}\n\n/// Test icon size consistency (all should be 24x24)\n#[test]\nfn test_svg_icon_size_consistency() {\n    use crate::ui::icons;\n    \n    // Parse SVG to check viewBox or width/height\n    // All icons should be 24x24 based on our design\n    let icon_list = [\n        (\"Brush\", icons::BRUSH_ICON),\n        (\"Eraser\", icons::ERASER_ICON),\n        (\"Zoom In\", icons::ZOOM_IN_ICON),\n        (\"Undo\", icons::UNDO_ICON),\n    ];\n    \n    for (name, svg) in icon_list {\n        // Check width and height are 24\n        assert!(svg.contains(\"width=\\\"24\\\"\"), \"{} icon should be 24px wide\", name);\n        assert!(svg.contains(\"height=\\\"24\\\"\"), \"{} icon should be 24px tall\", name);\n        assert!(svg.contains(\"viewBox=\\\"0 0 24 24\\\"\"), \"{} icon should have 24x24 viewBox\", name);\n    }\n}\n\n/// Test color conversion functions\n#[test]\nfn test_color_conversion_functions() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    // Test basic RGB color (opaque)\n    let color = Color { r: 255, g: 128, b: 64, a: 255 };\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted.r, 255);\n    assert_eq!(converted.g, 128);\n    assert_eq!(converted.b, 64);\n    assert_eq!(converted.a, 255);\n}\n\n/// Test opaque black conversion\n#[test]\nfn test_color_conversion_black() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let color = Color::BLACK; // r:0, g:0, b:0, a:255\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted, Color::BLACK);\n}\n\n/// Test white color conversion\n#[test]\nfn test_color_conversion_white() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let color = Color::WHITE; // r:255, g:255, b:255, a:255\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted, Color::WHITE);\n}\n\n/// Test that color swatch reads from active tool's brush color\n#[test]\nfn test_color_swatch_shows_brush_color() {\n    use crate::app::AppState;\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::color_to_color32;\n    \n    let app = AppState::new(800, 600);\n    \n    // Get current brush color (default is black)\n    let settings = app.active_tool().brush_settings().unwrap();\n    let color32 = color_to_color32(settings.color);\n    \n    // Default color should be black (0,0,0,255)\n    assert_eq!(settings.color, Color::BLACK);\n    \n    // Color32 should match\n    let expected = color_to_color32(Color::BLACK);\n    assert_eq!(color32, expected);\n}\n\n/// Test that changing brush color updates what swatch shows\n#[test]\nfn test_changing_brush_color_updates_swatch() {\n    use crate::app::AppState;\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let mut app = AppState::new(800, 600);\n    \n    // Change brush color to red via BrushConfig\n    let red = Color { r: 255, g: 0, b: 0, a: 255 };\n    if let Some(config) = app.active_tool_mut().as_brush_config() {\n        config.set_brush_color(red);\n    }\n    \n    // Now swatch should show red\n    let settings = app.active_tool().brush_settings().unwrap();\n    let color32 = color_to_color32(settings.color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted, red);\n}\n\n/// Test that clicking color swatch toggles color_picker_open\n#[test]\nfn test_color_swatch_click_toggles_picker() {\n    let mut ui_state = UiState::new();\n    \n    // Initially closed\n    assert!(!ui_state.color_picker_open);\n    \n    // Simulate click: toggle open\n    ui_state.color_picker_open = !ui_state.color_picker_open;\n    assert!(ui_state.color_picker_open);\n    \n    // Simulate click again: toggle closed\n    ui_state.color_picker_open = !ui_state.color_picker_open;\n    assert!(!ui_state.color_picker_open);\n}\n\n/// Test that color conversion with alpha \u003c 255 preserves RGB values\n/// within 1 of the original (integer rounding from premultiplied format).\n#[test]\nfn test_color_conversion_with_alpha_preserves_rgb() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let color = Color { r: 200, g: 150, b: 100, a: 128 };\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted.a, 128);\n    // u8 premultiplied arithmetic loses at most 1 per channel\n    assert!(converted.r.abs_diff(200) \u003c= 1);\n    assert!(converted.g.abs_diff(150) \u003c= 1);\n    assert!(converted.b.abs_diff(100) \u003c= 1);\n}\n\n/// Test that UiState hsva lifecycle matches picker open/close\n#[test]\nfn test_ui_state_hsva_lifecycle() {\n    use crate::ui::state::UiState;\n    \n    let mut state = UiState::new();\n    assert!(state.hsva.is_none());\n    \n    // Simulate picker opening: initialize Hsva from brush color\n    let color = crate::canvas::Color { r: 100, g: 150, b: 200, a: 255 };\n    state.hsva = Some(egui_sdl2::egui::ecolor::Hsva::from_srgba_unmultiplied([\n        color.r, color.g, color.b, color.a,\n    ]));\n    assert!(state.hsva.is_some());\n    \n    // Simulate picker closing: reset to None\n    state.color_picker_open = false;\n    state.hsva = None;\n    assert!(state.hsva.is_none());\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","undo_tests.rs"],"content":"//! Tests for Phase 4: undo/redo with command pattern\n\n#[test]\nfn add_layer_command_edits_canvas() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::AddLayer;\n\n    let mut canvas = Canvas::new();\n    assert_eq!(canvas.layer_count(), 1); // Starts with 1 default layer\n\n    let mut record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, AddLayer::default());\n    \n    assert_eq!(canvas.layer_count(), 2);\n}\n\n#[test]\nfn add_layer_command_undo_removes_layer() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::AddLayer;\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, AddLayer::default());\n    assert_eq!(canvas.layer_count(), 2);\n\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 1);\n}\n\n#[test]\nfn add_layer_command_redo_adds_layer_back() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::AddLayer;\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, AddLayer::default());\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 1);\n\n    record.redo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 2);\n}\n\n#[test]\nfn remove_layer_command_removes_and_undo_restores() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::{AddLayer, RemoveLayer};\n\n    let mut canvas = Canvas::new();\n    let mut add_record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = add_record.edit(\u0026mut canvas, AddLayer::default());\n    assert_eq!(canvas.layer_count(), 2);\n\n    let removed_idx = canvas.layer_count() - 1;\n    let mut remove_record: Record\u003cRemoveLayer\u003e = Record::new();\n    let _ = remove_record.edit(\u0026mut canvas, RemoveLayer::new(removed_idx));\n    assert_eq!(canvas.layer_count(), 1);\n\n    remove_record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 2);\n}\n\n#[test]\nfn toggle_visibility_command_toggles_and_undo_restores() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::ToggleVisibility;\n\n    let mut canvas = Canvas::new();\n    // Default layer is visible\n    assert!(canvas.layers()[0].visible);\n\n    let mut record: Record\u003cToggleVisibility\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, ToggleVisibility::new(0));\n    assert!(!canvas.layers()[0].visible);\n\n    record.undo(\u0026mut canvas);\n    assert!(canvas.layers()[0].visible);\n}\n\n#[test]\nfn set_opacity_command_changes_and_undo_restores() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::SetOpacity;\n\n    let mut canvas = Canvas::new();\n    assert_eq!(canvas.layers()[0].opacity, 1.0);\n\n    let mut record: Record\u003cSetOpacity\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, SetOpacity::new(0, 0.5));\n    assert_eq!(canvas.layers()[0].opacity, 0.5);\n\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layers()[0].opacity, 1.0);\n}\n\n#[test]\nfn canvas_undo_record_handles_multiple_commands() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::{CanvasCommand, AddLayer, ToggleVisibility};\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cCanvasCommand\u003e = Record::new();\n    \n    // Add a layer\n    let _ = record.edit(\u0026mut canvas, CanvasCommand::AddLayer(AddLayer::default()));\n    assert_eq!(canvas.layer_count(), 2);\n    \n    // Toggle visibility\n    let _ = record.edit(\u0026mut canvas, CanvasCommand::ToggleVisibility(ToggleVisibility::new(0)));\n    assert!(!canvas.layers()[0].visible);\n    \n    // Undo toggle\n    record.undo(\u0026mut canvas);\n    assert!(canvas.layers()[0].visible);\n    assert_eq!(canvas.layer_count(), 2);\n    \n    // Undo add layer\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 1);\n}\n\n#[test]\nfn canvas_can_undo_and_can_redo() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::{CanvasCommand, AddLayer};\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cCanvasCommand\u003e = Record::new();\n    \n    assert!(!record.can_undo());\n    assert!(!record.can_redo());\n    \n    let _ = record.edit(\u0026mut canvas, CanvasCommand::AddLayer(AddLayer::default()));\n    assert!(record.can_undo());\n    assert!(!record.can_redo());\n    \n    record.undo(\u0026mut canvas);\n    assert!(!record.can_undo());\n    assert!(record.can_redo());\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","viewport.rs"],"content":"pub const ZOOM_MIN: f64 = 0.1;\npub const ZOOM_MAX: f64 = 64.0;\npub const ZOOM_FACTOR: f64 = 1.15;\n\npub struct ViewportState {\n    pub offset_x: f64,\n    pub offset_y: f64,\n    pub scale: f64,\n    pub canvas_width: u32,\n    pub canvas_height: u32,\n    pub window_width: u32,\n    pub window_height: u32,\n}\n\nimpl ViewportState {\n    pub fn new(canvas_width: u32, canvas_height: u32, window_width: u32, window_height: u32) -\u003e Self {\n        let (offset_x, offset_y) = if canvas_width \u003c= window_width \u0026\u0026 canvas_height \u003c= window_height {\n            (\n                (window_width - canvas_width) as f64 / 2.0,\n                (window_height - canvas_height) as f64 / 2.0,\n            )\n        } else {\n            (0.0, 0.0)\n        };\n\n        Self {\n            offset_x,\n            offset_y,\n            scale: 1.0,\n            canvas_width,\n            canvas_height,\n            window_width,\n            window_height,\n        }\n    }\n\n    fn zoom_impl(\u0026mut self, center_x: f64, center_y: f64, factor: f64) {\n        let old = self.scale;\n        self.scale = (self.scale * factor).clamp(ZOOM_MIN, ZOOM_MAX);\n        let cx = (center_x - self.offset_x) / old;\n        let cy = (center_y - self.offset_y) / old;\n        self.offset_x = center_x - cx * self.scale;\n        self.offset_y = center_y - cy * self.scale;\n    }\n\n    pub fn zoom_in(\u0026mut self) {\n        self.zoom_impl(\n            self.window_width as f64 / 2.0,\n            self.window_height as f64 / 2.0,\n            ZOOM_FACTOR,\n        );\n    }\n\n    pub fn zoom_out(\u0026mut self) {\n        self.zoom_impl(\n            self.window_width as f64 / 2.0,\n            self.window_height as f64 / 2.0,\n            1.0 / ZOOM_FACTOR,\n        );\n    }\n\n    pub fn pan(\u0026mut self, dx: f32, dy: f32) {\n        self.offset_x += dx as f64;\n        self.offset_y += dy as f64;\n    }\n\n    pub fn zoom_toward(\u0026mut self, sx: f32, sy: f32, factor: f64) {\n        self.zoom_impl(sx as f64, sy as f64, factor);\n    }\n\n    pub fn zoom_to_fit(\u0026mut self) {\n        let scale_x = self.window_width as f64 / self.canvas_width as f64;\n        let scale_y = self.window_height as f64 / self.canvas_height as f64;\n        self.scale = scale_x.min(scale_y).min(1.0);\n        self.offset_x = (self.window_width as f64 - self.canvas_width as f64 * self.scale) / 2.0;\n        self.offset_y = (self.window_height as f64 - self.canvas_height as f64 * self.scale) / 2.0;\n    }\n\n    pub fn zoom_to_100(\u0026mut self) {\n        self.scale = 1.0;\n        self.offset_x = ((self.window_width as f64 - self.canvas_width as f64) / 2.0).max(0.0);\n        self.offset_y = ((self.window_height as f64 - self.canvas_height as f64) / 2.0).max(0.0);\n    }\n\n    pub fn resize_window(\u0026mut self, width: u32, height: u32) {\n        self.window_width = width;\n        self.window_height = height;\n        let (offset_x, offset_y) = if self.canvas_width \u003c= width \u0026\u0026 self.canvas_height \u003c= height {\n            ((width - self.canvas_width) as f64 / 2.0, (height - self.canvas_height) as f64 / 2.0)\n        } else {\n            (0.0, 0.0)\n        };\n        self.offset_x = offset_x;\n        self.offset_y = offset_y;\n    }\n\n    pub fn screen_to_canvas(\u0026self, sx: f32, sy: f32) -\u003e Option\u003c(f32, f32)\u003e {\n        let cx = (sx as f64 - self.offset_x) / self.scale;\n        let cy = (sy as f64 - self.offset_y) / self.scale;\n        if cx \u003e= 0.0 \u0026\u0026 cx \u003c self.canvas_width as f64 \u0026\u0026 cy \u003e= 0.0 \u0026\u0026 cy \u003c self.canvas_height as f64 {\n            Some((cx as f32, cy as f32))\n        } else {\n            None\n        }\n    }\n\n    /// Returns (x, y, width, height) of the visible canvas region in screen coordinates.\n    /// The rectangle is clipped to the window bounds.\n    pub fn viewport_rect(\u0026self) -\u003e (i32, i32, i32, i32) {\n        let left = self.offset_x;\n        let top = self.offset_y;\n        let right = self.offset_x + self.canvas_width as f64 * self.scale;\n        let bottom = self.offset_y + self.canvas_height as f64 * self.scale;\n\n        let vx = left.max(0.0) as i32;\n        let vy = top.max(0.0) as i32;\n        let vw = (right.min(self.window_width as f64) - vx as f64) as i32;\n        let vh = (bottom.min(self.window_height as f64) - vy as f64) as i32;\n\n        (vx.max(0), vy.max(0), vw.max(0), vh.max(0))\n    }\n\n    /// Returns texture UV coordinates [x1,y1, x2,y2, x3,y3, x4,y4] for the fullscreen quad.\n    /// Maps the visible portion of the canvas to the viewport rect.\n    /// Uses OpenGL convention where v=0 is the bottom of the texture (canvas row 0, top of image)\n    /// and v=1 is the top of the texture (last canvas row, bottom of image).\n    pub fn texture_uv(\u0026self) -\u003e [f32; 8] {\n        let (vx, vy, vw, vh) = self.viewport_rect();\n\n        let canvas_x = (vx as f64 - self.offset_x) / self.scale;\n        let canvas_y = (vy as f64 - self.offset_y) / self.scale;\n        let canvas_rx = ((vx + vw) as f64 - self.offset_x) / self.scale;\n        let canvas_by = ((vy + vh) as f64 - self.offset_y) / self.scale;\n\n        let u0 = (canvas_x / self.canvas_width as f64).clamp(0.0, 1.0) as f32;\n        let u1 = (canvas_rx / self.canvas_width as f64).clamp(0.0, 1.0) as f32;\n        let v_bottom = (canvas_by / self.canvas_height as f64).clamp(0.0, 1.0) as f32;\n        let v_top = (canvas_y / self.canvas_height as f64).clamp(0.0, 1.0) as f32;\n\n        [u0, v_bottom, u1, v_bottom, u1, v_top, u0, v_top]\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn new_viewport_centers_canvas_when_fitting_in_window() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n        assert_eq!(vp.scale, 1.0);\n        assert_eq!(vp.canvas_width, 1280);\n        assert_eq!(vp.canvas_height, 720);\n        assert_eq!(vp.window_width, 1920);\n        assert_eq!(vp.window_height, 1080);\n    }\n\n    #[test]\n    fn new_viewport_puts_top_left_at_origin_when_canvas_larger_than_window() {\n        let vp = ViewportState::new(1280, 720, 800, 600);\n        assert_eq!(vp.offset_x, 0.0);\n        assert_eq!(vp.offset_y, 0.0);\n        assert_eq!(vp.scale, 1.0);\n    }\n\n    #[test]\n    fn screen_to_canvas_maps_window_coord_to_canvas_coord_when_centered() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        let result = vp.screen_to_canvas(400.0, 200.0);\n        assert_eq!(result, Some((80.0, 20.0)));\n    }\n\n    #[test]\n    fn screen_to_canvas_returns_none_for_letterbox_click() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        assert_eq!(vp.screen_to_canvas(100.0, 100.0), None);\n    }\n\n    #[test]\n    fn resize_window_recomputes_offset_when_window_grows() {\n        let mut vp = ViewportState::new(1280, 720, 800, 600);\n        assert_eq!(vp.offset_x, 0.0);\n        assert_eq!(vp.offset_y, 0.0);\n\n        vp.resize_window(1920, 1080);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n        assert_eq!(vp.scale, 1.0);\n    }\n\n    #[test]\n    fn zoom_to_fit_scales_down_oversized_canvas() {\n        let mut vp = ViewportState::new(1280, 720, 800, 600);\n        vp.zoom_to_fit();\n        let expected_scale = (800.0_f64 / 1280.0).min(600.0_f64 / 720.0);\n        assert!((vp.scale - expected_scale).abs() \u003c 1e-12);\n        assert!((vp.offset_x - 0.0).abs() \u003c 1e-12);\n        assert!((vp.offset_y - 75.0).abs() \u003c 1e-12);\n    }\n\n    #[test]\n    fn zoom_to_fit_does_not_upscale_when_canvas_fits() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.zoom_to_fit();\n        assert_eq!(vp.scale, 1.0);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n    }\n\n    #[test]\n    fn zoom_to_100_resets_scale_and_centers() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = 2.0;\n        vp.offset_x = 100.0;\n        vp.offset_y = 50.0;\n\n        vp.zoom_to_100();\n        assert_eq!(vp.scale, 1.0);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n    }\n\n    #[test]\n    fn zoom_in_increases_scale_and_preserves_viewport_center() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        let center = vp.screen_to_canvas(960.0, 540.0);\n\n        vp.zoom_in();\n\n        assert!(vp.scale \u003e 1.0);\n        let center_after = vp.screen_to_canvas(960.0, 540.0);\n        assert_eq!(center, center_after);\n    }\n\n    #[test]\n    fn zoom_out_decreases_scale_and_preserves_viewport_center() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        let center = vp.screen_to_canvas(960.0, 540.0);\n\n        vp.zoom_out();\n\n        assert!(vp.scale \u003c 1.0);\n        let center_after = vp.screen_to_canvas(960.0, 540.0);\n        assert_eq!(center, center_after);\n    }\n\n    #[test]\n    fn zoom_in_clamps_at_max() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MAX;\n\n        vp.zoom_in();\n\n        assert_eq!(vp.scale, ZOOM_MAX);\n    }\n\n    #[test]\n    fn zoom_out_clamps_at_min() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MIN;\n\n        vp.zoom_out();\n\n        assert_eq!(vp.scale, ZOOM_MIN);\n    }\n\n    #[test]\n    fn viewport_rect_full_canvas_when_equal_to_window() {\n        let vp = ViewportState::new(1280, 720, 1280, 720);\n        let (x, y, w, h) = vp.viewport_rect();\n        assert_eq!((x, y, w, h), (0, 0, 1280, 720));\n    }\n\n    #[test]\n    fn viewport_rect_centered_when_window_larger_than_canvas() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        let (x, y, w, h) = vp.viewport_rect();\n        assert_eq!((x, y, w, h), (320, 180, 1280, 720));\n    }\n\n    #[test]\n    fn viewport_rect_full_window_when_canvas_larger_than_window() {\n        let vp = ViewportState::new(1280, 720, 640, 480);\n        let (x, y, w, h) = vp.viewport_rect();\n        assert_eq!((x, y, w, h), (0, 0, 640, 480));\n    }\n\n    #[test]\n    fn texture_uv_full_when_canvas_fits_in_window() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        let uv = vp.texture_uv();\n        assert_eq!(uv, [0.0, 1.0, 1.0, 1.0, 1.0, 0.0, 0.0, 0.0]);\n    }\n\n    #[test]\n    fn zoom_toward_clamps_at_max() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MAX;\n        vp.zoom_toward(600.0, 300.0, ZOOM_FACTOR);\n        assert_eq!(vp.scale, ZOOM_MAX);\n    }\n\n    #[test]\n    fn zoom_toward_clamps_at_min() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MIN;\n        vp.zoom_toward(600.0, 300.0, 1.0 / ZOOM_FACTOR);\n        assert_eq!(vp.scale, ZOOM_MIN);\n    }\n\n    #[test]\n    fn viewport_rect_vy_is_window_from_top_not_opengl_from_bottom() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.pan(0.0, -100.0);\n        let (_, vy, _, vh) = vp.viewport_rect();\n        let gl_y = vp.window_height as i32 - vy - vh;\n        // After panning up 100px from center (vy=180), vy should be ~80\n        // gl_y should be 1080 - 80 - 720 = 280\n        assert_ne!(vy, gl_y);\n        assert_eq!(gl_y, 280);\n    }\n\n    #[test]\n    fn screen_to_canvas_at_viewport_top_left_maps_to_near_origin() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.pan(0.0, -100.0);\n        let (vx, vy, _, _) = vp.viewport_rect();\n        let canvas = vp.screen_to_canvas(vx as f32, vy as f32);\n        assert!(canvas.is_some());\n        let (cx, cy) = canvas.unwrap();\n        assert!((cx - 0.0).abs() \u003c 1e-6);\n        assert!((cy - 0.0).abs() \u003c 1e-6);\n    }\n\n    #[test]\n    fn pan_moves_offset() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        let before_x = vp.offset_x;\n        let before_y = vp.offset_y;\n\n        vp.pan(100.0, 50.0);\n\n        asser         var previousData = {"files":[{"path":["C:","\\","Users","robin","Projects","rancer","src","app.rs"],"content":"//! AppState — owns canvas, active tool, and handles events\n//!\n//! This is the core application state that bridges SDL2 events\n//! to domain operations on the canvas.\n\nuse undo::Record;\n\nuse crate::canvas::Canvas;\nuse crate::commands::{AddLayer, CanvasCommand};\nuse crate::events::AppEvent;\nuse crate::tools::{BrushTool, Tool};\nuse crate::viewport::ViewportState;\n\n/// Application state containing all mutable application data\npub struct AppState {\n    canvas: Canvas,\n    active_tool: Box\u003cdyn Tool\u003e,\n    history: Record\u003cCanvasCommand\u003e,\n    viewport: ViewportState,\n}\n\nimpl AppState {\n    /// Create a new AppState with default canvas and brush tool\n    pub fn new(width: u32, height: u32) -\u003e Self {\n        let mut canvas = Canvas::new();\n        // Initialize canvas with given dimensions\n        canvas.resize(width, height);\n\n        Self {\n            viewport: ViewportState::new(width, height, width, height),\n            canvas,\n            active_tool: Box::new(BrushTool::new()),\n            history: Record::new(),\n        }\n    }\n\n    /// Get a reference to the canvas\n    pub fn canvas(\u0026self) -\u003e \u0026Canvas {\n        \u0026self.canvas\n    }\n\n    /// Get the viewport width (window width)\n    pub fn viewport_width(\u0026self) -\u003e u32 {\n        self.viewport.window_width\n    }\n\n    /// Get the viewport height (window height)\n    pub fn viewport_height(\u0026self) -\u003e u32 {\n        self.viewport.window_height\n    }\n\n    /// Get a reference to the viewport state\n    pub fn viewport(\u0026self) -\u003e \u0026ViewportState {\n        \u0026self.viewport\n    }\n\n    /// Get a mutable reference to the viewport state\n    pub fn viewport_mut(\u0026mut self) -\u003e \u0026mut ViewportState {\n        \u0026mut self.viewport\n    }\n\n    /// Get a mutable reference to the canvas\n    pub fn canvas_mut(\u0026mut self) -\u003e \u0026mut Canvas {\n        \u0026mut self.canvas\n    }\n\n    /// Get a mutable reference to the undo history\n    pub fn history_mut(\u0026mut self) -\u003e \u0026mut Record\u003cCanvasCommand\u003e {\n        \u0026mut self.history\n    }\n\n    /// Get the name of the active tool\n    pub fn tool_name(\u0026self) -\u003e \u0026str {\n        self.active_tool.name()\n    }\n\n    /// Get an immutable reference to the active tool\n    pub fn active_tool(\u0026self) -\u003e \u0026dyn Tool {\n        self.active_tool.as_ref()\n    }\n\n    /// Get a mutable reference to the active tool as a trait object\n    pub fn active_tool_mut(\u0026mut self) -\u003e \u0026mut dyn Tool {\n        self.active_tool.as_mut()\n    }\n\n    /// Set the active tool\n    pub fn set_active_tool(\u0026mut self, tool: Box\u003cdyn Tool\u003e) {\n        self.active_tool = tool;\n    }\n\n    /// Check if undo is available\n    pub fn can_undo(\u0026self) -\u003e bool {\n        self.history.can_undo()\n    }\n\n    /// Check if redo is available\n    pub fn can_redo(\u0026self) -\u003e bool {\n        self.history.can_redo()\n    }\n\n    /// Handle an application event\n    pub fn handle_event(\u0026mut self, event: AppEvent) {\n        match event {\n            AppEvent::Press { x, y } =\u003e {\n                if let Some((cx, cy)) = self.viewport.screen_to_canvas(x, y) {\n                    self.active_tool.on_press(cx, cy, \u0026mut self.canvas);\n                }\n            }\n            AppEvent::Drag { x, y } =\u003e {\n                if let Some((cx, cy)) = self.viewport.screen_to_canvas(x, y) {\n                    self.active_tool.on_drag(cx, cy, \u0026mut self.canvas);\n                }\n            }\n            AppEvent::Release { x, y } =\u003e {\n                if let Some((cx, cy)) = self.viewport.screen_to_canvas(x, y) {\n                    self.active_tool.on_release(cx, cy, \u0026mut self.canvas);\n                }\n            }\n            AppEvent::Key { code } =\u003e {\n                self.handle_key(\u0026code);\n            }\n            AppEvent::Resize { width, height } =\u003e {\n                self.viewport.resize_window(width, height);\n            }\n            AppEvent::Wheel { x, y, delta } =\u003e {\n                let factor = if delta \u003e 0 { crate::viewport::ZOOM_FACTOR } else { 1.0 / crate::viewport::ZOOM_FACTOR };\n                self.viewport.zoom_toward(x, y, factor);\n            }\n            AppEvent::Pan { dx, dy } =\u003e {\n                self.viewport.pan(dx, dy);\n            }\n            AppEvent::Quit =\u003e {\n                // Handled by SDL2 loop\n            }\n        }\n    }\n\n    fn handle_key(\u0026mut self, code: \u0026str) {\n        match code {\n            \"z\" =\u003e {\n                if self.history.can_undo() {\n                    self.history.undo(\u0026mut self.canvas);\n                }\n            }\n            \"y\" =\u003e {\n                if self.history.can_redo() {\n                    self.history.redo(\u0026mut self.canvas);\n                }\n            }\n            _ =\u003e {\n                self.active_tool.on_key(code);\n            }\n        }\n    }\n\n    /// Add a new layer through the undo system\n    pub fn add_layer(\u0026mut self) {\n        let _ = self.history.edit(\u0026mut self.canvas, CanvasCommand::AddLayer(AddLayer::default()));\n    }\n\n    /// Undo the last action\n    pub fn undo(\u0026mut self) {\n        if self.history.can_undo() {\n            self.history.undo(\u0026mut self.canvas);\n        }\n    }\n\n    /// Redo the last undone action\n    pub fn redo(\u0026mut self) {\n        if self.history.can_redo() {\n            self.history.redo(\u0026mut self.canvas);\n        }\n    }\n\n    /// Execute a canvas command through the undo system\n    pub fn execute_command(\u0026mut self, command: CanvasCommand) {\n        let _ = self.history.edit(\u0026mut self.canvas, command);\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":1657324662872342528}},{"line":25,"address":[],"length":0,"stats":{"Line":3314649325744685056}},{"line":27,"address":[],"length":0,"stats":{"Line":6629298651489370112}},{"line":30,"address":[],"length":0,"stats":{"Line":9943947977234055168}},{"line":32,"address":[],"length":0,"stats":{"Line":1657324662872342528}},{"line":33,"address":[],"length":0,"stats":{"Line":1657324662872342528}},{"line":38,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":39,"address":[],"length":0,"stats":{"Line":1585267068834414592}},{"line":43,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":44,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":48,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":49,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":53,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":54,"address":[],"length":0,"stats":{"Line":576460752303423488}},{"line":58,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":59,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":63,"address":[],"length":0,"stats":{"Line":0}},{"line":64,"address":[],"length":0,"stats":{"Line":0}},{"line":68,"address":[],"length":0,"stats":{"Line":0}},{"line":69,"address":[],"length":0,"stats":{"Line":0}},{"line":73,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":74,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":78,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":79,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":83,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":84,"address":[],"length":0,"stats":{"Line":1297036692682702848}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":89,"address":[],"length":0,"stats":{"Line":0}},{"line":93," ]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_dab_mask_creates_square_buffer() {\n        let dab = DabMask::new(3);\n        assert_eq!(dab.width, 3);\n        assert_eq!(dab.height, 3);\n        assert_eq!(dab.data.len(), 36);\n    }\n\n    #[test]\n    fn test_dab_mask_get_alpha_returns_full_opacity_by_default() {\n        let dab = DabMask::new(2);\n        assert_eq!(dab.get_alpha(0, 0), 255);\n        assert_eq!(dab.get_alpha(1, 1), 255);\n    }\n\n    #[test]\n    fn test_dab_mask_get_alpha_returns_zero_for_out_of_bounds() {\n        let dab = DabMask::new(2);\n        assert_eq!(dab.get_alpha(5, 0), 0);\n        assert_eq!(dab.get_alpha(0, 5), 0);\n    }\n\n    #[test]\n    fn test_dab_mask_set_alpha_updates_pixel() {\n        let mut dab = DabMask::new(2);\n        dab.set_alpha(0, 0, 128);\n        assert_eq!(dab.get_alpha(0, 0), 128);\n    }\n\n    #[test]\n    fn test_dab_mask_set_alpha_ignores_out_of_bounds() {\n        let mut dab = DabMask::new(2);\n        dab.set_alpha(5, 5, 128);\n        assert_eq!(dab.get_alpha(5, 5), 0);\n    }\n\n    #[test]\n    fn test_dab_mask_clamped_to_minimum_size() {\n        let dab = DabMask::new(0);\n        assert_eq!(dab.width, 1);\n        assert_eq!(dab.height, 1);\n    }\n}","traces":[{"line":14,"address":[],"length":0,"stats":{"Line":2954361355555045376}},{"line":15,"address":[],"length":0,"stats":{"Line":8863084066665136128}},{"line":19,"address":[],"length":0,"stats":{"Line":5908722711110090752}},{"line":23,"address":[],"length":0,"stats":{"Line":10880696699727118336}},{"line":24,"address":[],"length":0,"stats":{"Line":3170534137668829173}},{"line":25,"address":[],"length":0,"stats":{"Line":216172782113783819}},{"line":27,"address":[],"length":0,"stats":{"Line":2882303761517117418}},{"line":28,"address":[],"length":0,"stats":{"Line":5764607523034234836}},{"line":31,"address":[],"length":0,"stats":{"Line":14195346025471803392}},{"line":32,"address":[],"length":0,"stats":{"Line":98718903831961272        dab: \u0026DabMask,\n        color: Color,\n    ) {\n        let final_alpha_mul = color.a as f32 / 255.0;\n        Self::apply_dab(buffer, cx, cy, dab, |dab_alpha, pixel| {\n            let final_alpha = ((dab_alpha as f32 / 255.0) * final_alpha_mul * 255.0) as u8;\n            let src_a = final_alpha as f32 / 255.0;\n            pixel.set_r(((color.r as f32 * src_a) + (pixel.r() as f32 * (1.0 - src_a))) as u8);\n            pixel.set_g(((color.g as f32 * src_a) + (pixel.g() as f32 * (1.0 - src_a))) as u8);\n            pixel.set_b(((color.b as f32 * src_a) + (pixel.b() as f32 * (1.0 - src_a))) as u8);\n            pixel.set_a((pixel.a() as u16 + final_alpha as u16).min(255) as u8);\n        });\n    }\n\n    pub fn erase_dab(\n        buffer: \u0026mut RasterImage,\n        cx: i32,\n        cy: i32,\n        dab: \u0026DabMask,\n        bg_color: Color,\n        erase_opacity: f32,\n    ) {\n        Self::apply_dab(buffer, cx, cy, dab, |dab_alpha, pixel| {\n            let erase_strength = (dab_alpha as f32 / 255.0) * erase_opacity;\n            let new_a = (pixel.a() as f32 * (1.0 - erase_strength)) as u8;\n            pixel.set_a(new_a);\n            if new_a == 0 {\n                pixel.set_r(bg_color.r);\n                pixel.set_g(bg_color.g);\n                pixel.set_b(bg_color.b);\n            }\n        });\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::brush::RoundDab;\n\n    #[test]\n    fn test_stamp_dab_affects_pixels_at_center() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 255, g: 0, b: 0, a: 255 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, 5, 5, \u0026dab, color);\n\n        let px = buffer.get_pixel(5, 5).unwrap();\n        assert!(px.0 \u003e 0);\n    }\n\n    #[test]\n    fn test_stamp_dab_does_not_affect_distant_pixels() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 255, g: 0, b: 0, a: 255 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, 0, 0, \u0026dab, color);\n\n        let px = buffer.get_pixel(5, 5).unwrap();\n        assert_eq!(px.0, 0);\n    }\n\n    #[test]\n    fn test_stamp_dab_respects_partial_transparency() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 255, g: 0, b: 0, a: 128 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, 5, 5, \u0026dab, color);\n\n        let px = buffer.get_pixel(5, 5).unwrap();\n        assert!(px.0 \u003e px.1);\n        assert!(px.0 \u003c 255);\n    }\n\n    #[test]\n    fn test_stamp_dab_out_of_bounds_is_ignored() {\n        let mut buffer = RasterImage::new(10, 10);\n        let dab = RoundDab::generate(20);\n        let color = Color { r: 255, g: 0, b: 0, a: 255 };\n\n        BrushEngine::stamp_dab(\u0026mut buffer, -5, -5, \u0026dab, color);\n    }\n\n    #[test]\n    fn test_draw_line_produces_continuous_pixels() {\n        let mut buffer = RasterImage::new(20, 20);\n        let dab = RoundDab::generate(3);\n        let color = Color { r: 50, g: 50, b: 50, a: 200 };\n\n        for t in [0.0_f32, 0.5, 1.0] {\n            let x = (0.0 + (10.0 - 0.0) * t) as i32;\n            let y = (0.0 + (10.0 - 0.0) * t) as i32;\n            BrushEngine::stamp_dab(\u0026mut buffer, x, y, \u0026dab, color);\n        }\n\n        let px = buffer.get_pixel(0, 0).unwrap();\n        assert!(px.0 \u003e 0);\n        let px = buffer.get_pixel(10, 10).unwrap();\n        assert!(px.0 \u003e 0);\n    }\n\n    #[test]\n    fn test_small_dab_does_not_panic() {\n        let mut buffer = RasterImage::new(3, 3);\n        let dab = RoundDab::generate(1);\n        BrushEngine::stamp_dab(\u0026mut buffer, 1, 1, \u0026dab, Color { r: 100, g: 100, b: 100, a: 200 });\n    }\n}","traces":[{"line":11,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":15,"address":[],"length":0,"stat n                    0\n                };\n                dab.set_alpha(x, y, alpha);\n            }\n        }\n        dab\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_round_dab_center_has_high_opacity() {\n        let dab = RoundDab::generate(5);\n        let alpha = dab.get_alpha(2, 2);\n        assert!(alpha \u003e 128);\n    }\n\n    #[test]\n    fn test_round_dab_corners_have_zero_opacity() {\n        let dab = RoundDab::generate(5);\n        assert_eq!(dab.get_alpha(0, 0), 0);\n        assert_eq!(dab.get_alpha(4, 4), 0);\n    }\n\n    #[test]\n    fn test_round_dab_edge_pixels_are_antialiased() {\n        let dab = RoundDab::generate(5);\n        let center_alpha = dab.get_alpha(2, 2);\n        let corner_alpha = dab.get_alpha(0, 0);\n        assert!(center_alpha \u003e corner_alpha);\n        assert!(center_alpha \u003e 0);\n        assert_eq!(corner_alpha, 0);\n    }\n\n    #[test]\n    fn test_round_dab_small_size() {\n        let dab = RoundDab::generate(1);\n        assert!(dab.get_alpha(0, 0) \u003e 0);\n    }\n}","traces":[{"line":8,"address":[],"length":0,"stats":{"Line":2522015791327477760}},{"line":9,"address":[],"length":0,"stats":{"Line":2522015791327477760}},{"line":10,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":13,"address":[],"length":0,"stats":{"Line":7133701809754865664}},{"line":14,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":15,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":16,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":17,"address":[],"length":0,"stats":{"Line":4755801206503243776}},{"line":19,"address":[],"length":0,"stats":{"Line":5332261958806667264}},{"line":20,"address":[],"length":0,"stats":{"Line":17005592192950992897}},{"line":21,"address":[],"length":0,"stats":{"Line":9655717601082343426}},{"line":22,"address":[],"length":0,"stats":{"Line":9655717601082343426}},{"line":23,"address":[],"leng 100.0;\n    let v = v / 100.0;\n    let h_norm = h / 60.0;\n    let i = h_norm.floor() as i32 % 6;\n    let f = h_norm - h_norm.floor();\n    let p = v * (1.0 - s);\n    let q = v * (1.0 - s * f);\n    let t = v * (1.0 - s * (1.0 - f));\n\n    let (r, g, b) = match i {\n        0 =\u003e (v, t, p),\n        1 =\u003e (q, v, p),\n        2 =\u003e (p, v, t),\n        3 =\u003e (p, q, v),\n        4 =\u003e (t, p, v),\n        _ =\u003e (v, p, q),\n    };\n\n    Color {\n        r: (r * 255.0).round() as u8,\n        g: (g * 255.0).round() as u8,\n        b: (b * 255.0).round() as u8,\n        a: 255,\n    }\n}\n\npub fn rgb_to_hsv(color: Color) -\u003e HsvColor {\n    let r = color.r as f32 / 255.0;\n    let g = color.g as f32 / 255.0;\n    let b = color.b as f32 / 255.0;\n    let max = r.max(g).max(b);\n    let min = r.min(g).min(b);\n    let delta = max - min;\n\n    let v = max * 100.0;\n    let s = if max.abs() \u003c f32::EPSILON {\n        0.0\n    } else {\n        delta / max * 100.0\n    };\n    let h = if delta.abs() \u003c f32::EPSILON {\n        0.0\n    } else if (max - r).abs() \u003c f32::EPSILON {\n        60.0 * (((g - b) / delta) % 6.0)\n    } else if (max - g).abs() \u003c f32::EPSILON {\n        60.0 * ((b - r) / delta + 2.0)\n    } else {\n        60.0 * ((r - g) / delta + 4.0)\n    };\n\n    HsvColor { h, s, v }\n}\n\n/// Pixel reference for mutable access\npub struct PixelRef\u003c'a\u003e {\n    data: \u0026'a mut [u8],\n}\n\nimpl\u003c'a\u003e PixelRef\u003c'a\u003e {\n    pub fn r(\u0026self) -\u003e u8 { self.data[0] }\n    pub fn g(\u0026self) -\u003e u8 { self.data[1] }\n    pub fn b(\u0026self) -\u003e u8 { self.data[2] }\n    pub fn a(\u0026self) -\u003e u8 { self.data[3] }\n\n    pub fn set_r(\u0026mut self, r: u8) { self.data[0] = r; }\n    pub fn set_g(\u0026mut self, g: u8) { self.data[1] = g; }\n    pub fn set_b(\u0026mut self, b: u8) { self.data[2] = b; }\n    pub fn set_a(\u0026mut self, a: u8) { self.data[3] = a; }\n}\n\n/// Raster image data (RGBA pixels)\n#[derive(Debug, Clone)]\npub struct RasterImage {\n    pub width: u32,\n    pub height: u32,\n    pub data: Vec\u003cu8\u003e,\n}\n\nimpl RasterImage {\n    pub fn new(width: u32, height: u32) -\u003e Self {\n        Self {\n            width,\n            height,\n            data: vec![0; (width * height * 4) as usize],\n        }\n    }\n\n    pub fn get_pixel(\u0026self, x: u32, y: u32) -\u003e Option\u003c(u8, u8, u8, u8)\u003e {\n        if x \u003e= self.width || y \u003e= self.height {\n            return None;\n        }\n        let idx = ((y * self.width + x) * 4) as usize;\n        Some((\n            self.data[idx],\n            self.data[idx + 1],\n            self.data[idx + 2],\n            self.data[idx + 3],\n        ))\n    }\n\n    pub fn set_pixel(\u0026mut self, x: u32, y: u32, r: u8, g: u8, b: u8, a: u8) {\n        if x \u003e= self.width || y \u003e= self.height {\n            return;\n        }\n        let idx = ((y * self.width + x) * 4) as usize;\n        self.data[idx] = r;\n        self.data[idx + 1] = g;\n        self.data[idx + 2] = b;\n        self.data[idx + 3] = a;\n    }\n\n    pub fn get_pixel_mut(\u0026mut self, x: u32, y: u32) -\u003e Option\u003cPixelRef\u003c'_\u003e\u003e {\n        if x \u003e= self.width || y \u003e= self.height {\n            return None;\n        }\n        let idx = ((y * self.width + x) * 4) as usize;\n        Some(PixelRef { data: \u0026mut self.data[idx..idx + 4] })\n    }\n\n    pub fn resize(\u0026mut self, width: u32, height: u32) {\n        self.width = width;\n        self.height = height;\n        self.data.resize((width * height * 4) as usize, 0);\n    }\n\n    pub fn fill(\u0026mut self, color: Color) {\n        let bytes = [color.r, color.g, color.b, color.a];\n        for chunk in self.data.chunks_exact_mut(4) {\n            chunk.copy_from_slice(\u0026bytes);\n        }\n    }\n}\n\n#[cfg(test)]\nmod pixel_ref_tests {\n    use super::*;\n\n    #[test]\n    fn test_pixel_ref_reads_correct_values() {\n        let mut image = RasterImage::new(2, 2);\n        image.set_pixel(0, 0, 10, 20, 30, 40);\n        \n        if let Some(pixel) = image.get_pixel_mut(0, 0) {\n            assert_eq!(pixel.r(), 10);\n            assert_eq!(pixel.g(), 20);\n            assert_eq!(pixel.b(), 30);\n            assert_eq!(pixel.a(), 40);\n        } else {\n            panic!(\"Expected pixel\");\n        }\n    }\n\n    #[test]\n    fn test_pixel_ref_writes_correct_values() {\n        let mut image = RasterImage::new(2, 2);\n        \n        if let Some(mut pixel) = image.get_pixel_mut(0, 0) {\n            pixel.set_r(100);\n            pixel.set_g(150);\n            pixel.set_b(200);\n            pixel.set_a(250);\n        }\n        \n        assert_eq!(image.get_pixel(0, 0), Some((100, 150, 200, 250)));\n    }\n\n    #[test]\n    fn test_pixel_ref_returns_none_for_out_of_bounds() {\n        let mut image = RasterImage::new(2, 2);\n        assert!(image.get_pixel_mut(5, 0).is_none());\n        assert!(image.get_pixel_mut(0, 5).is_none());\n    }\n}\n\n/// Represents a single layer in the canvas (raster only)\n#[derive(Debug, Clone)]\npub struct Layer {\n    pub name: String,\n    pub content: RasterImage,\n    pub visible: bool,\n    pub opacity: f32,\n    pub locked: bool,\n}\n\nimpl Default for Layer {\n    fn default() -\u003e Self {\n        Self {\n            name: \"Layer 1\".to_string(),\n            content: RasterImage::new(1280, 720),\n            visible: true,\n            opacity: 1.0,\n            locked: false,\n        }\n    }\n}\n\nimpl Layer {\n    pub fn new(name: String, width: u32, height: u32, opacity: f32) -\u003e Self {\n        Self {\n            name,\n            content: RasterImage::new(width, height),\n            visible: true,\n            opacity,\n            locked: false,\n        }\n    }\n\n    pub fn content_mut(\u0026mut self) -\u003e \u0026mut RasterImage {\n        \u0026mut self.content\n    }\n\n    pub fn content(\u0026self) -\u003e \u0026RasterImage {\n        \u0026self.content\n    }\n\n    pub fn clear(\u0026mut self) {\n        self.content.fill(Color::TRANSPARENT);\n    }\n}\n\n/// The main canvas for drawing operations\n#[derive(Clone)]\npub struct Canvas {\n    pub(crate) width: u32,\n    pub(crate) height: u32,\n    pub(crate) background_color: Color,\n    pub(crate) layers: Vec\u003cLayer\u003e,\n    pub(crate) active_layer: usize,\n    pub(crate) version: u64,\n    dirty_rect: DirtyRect,\n}\n\n/// Rectangle representing a dirty region\n#[derive(Debug, Clone, Copy)]\npub struct DirtyRect {\n    pub x: u32,\n    pub y: u32,\n    pub width: u32,\n    pub height: u32,\n    is_dirty: bool,\n}\n\nimpl DirtyRect {\n    pub fn new() -\u003e Self {\n        Self {\n            x: 0,\n            y: 0,\n            width: 0,\n            height: 0,\n            is_dirty: false,\n        }\n    }\n\n    pub fn is_empty(\u0026self) -\u003e bool {\n        !self.is_dirty\n    }\n\n    pub fn contains(\u0026self, x: u32, y: u32) -\u003e bool {\n        self.is_dirty \u0026\u0026 x \u003e= self.x \u0026\u0026 x \u003c self.x + self.width \u0026\u0026 y \u003e= self.y \u0026\u0026 y \u003c self.y + self.height\n    }\n\n    pub fn mark_pixel(\u0026mut self, x: u32, y: u32) {\n        if !self.is_dirty {\n            self.x = x;\n            self.y = y;\n            self.width = 1;\n            self.height = 1;\n            self.is_dirty = true;\n        } else {\n            let new_min_x = self.x.min(x);\n            let new_min_y = self.y.min(y);\n            let new_max_x = (self.x + self.width).max(x + 1);\n            let new_max_y = (self.y + self.height).max(y + 1);\n            self.x = new_min_x;\n            self.y = new_min_y;\n            self.width = new_max_x - new_min_x;\n            self.height = new_max_y - new_min_y;\n        }\n    }\n\n    pub fn mark_rect(\u0026mut self, x: u32, y: u32, w: u32, h: u32) {\n        if w == 0 || h == 0 {\n            return;\n        }\n        if !self.is_dirty {\n            self.x = x;\n            self.y = y;\n            self.width = w;\n            self.height = h;\n            self.is_dirty = true;\n        } else {\n            let new_min_x = self.x.min(x);\n            let new_min_y = self.y.min(y);\n            let new_max_x = (self.x + self.width).max(x + w);\n            let new_max_y = (self.y + self.height).max(y + h);\n            self.x = new_min_x;\n            self.y = new_min_y;\n            self.width = new_max_x - new_min_x;\n            self.height = new_max_y - new_min_y;\n        }\n    }\n\n    pub fn clear(\u0026mut self) {\n        self.is_dirty = false;\n        self.x = 0;\n        self.y = 0;\n        self.width = 0;\n        self.height = 0;\n    }\n\n    pub fn mark_full(\u0026mut self, width: u32, height: u32) {\n        self.x = 0;\n        self.y = 0;\n        self.width = width;\n        self.height = height;\n        self.is_dirty = true;\n    }\n}\n\nimpl Default for DirtyRect {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl Default for Canvas {\n    fn default() -\u003e Self {\n        Self {\n            width: 1280,\n            height: 720,\n            background_color: Color::WHITE,\n            layers: vec![Layer::new(\"Background\".to_string(), 1280, 720, 1.0)],\n            active_layer: 0,\n            version: 0,\n            dirty_rect: DirtyRect::new(),\n        }\n    }\n}\n\nimpl Canvas {\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    pub fn with_size(width: u32, height: u32) -\u003e Self {\n        let mut canvas = Self::new();\n        canvas.resize(width, height);\n        canvas\n    }\n\n    pub fn version(\u0026self) -\u003e u64 {\n        self.version\n    }\n\n    pub fn width(\u0026self) -\u003e u32 {\n        self.width\n    }\n\n    pub fn height(\u0026self) -\u003e u32 {\n        self.height\n    }\n\n    pub fn active_layer_index(\u0026self) -\u003e us           cmd.undo(target);\n                Ok(())\n            }\n            CanvasCommand::SetOpacity(cmd) =\u003e {\n                cmd.undo(target);\n                Ok(())\n            }\n        }\n    }\n}\n\n/// Command to add a new layer to the canvas\n#[derive(Debug, Clone, Default)]\npub struct AddLayer {\n    name: Option\u003cString\u003e,\n    layer: Option\u003cLayer\u003e,\n    insertion_index: Option\u003cusize\u003e,\n}\n\nimpl AddLayer {\n    pub fn new(name: Option\u003cString\u003e) -\u003e Self {\n        Self { name, layer: None, insertion_index: None }\n    }\n}\n\nimpl Edit for AddLayer {\n    type Target = Canvas;\n    type Output = Result\u003c(), String\u003e;\n\n    fn edit(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        let idx = target.add_layer(self.name.clone())?;\n        self.layer = Some(target.layers[idx].clone());\n        self.insertion_index = Some(idx);\n        Ok(())\n    }\n\n    fn undo(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        if let Some(idx) = self.insertion_index {\n            if idx \u003c target.layers.len() {\n                self.insertion_index = None;\n                self.layer = None;\n                target.remove_layer(idx)\n            } else {\n                Ok(())\n            }\n        } else {\n            Ok(())\n        }\n    }\n}\n\n/// Command to remove a layer from the canvas\n#[derive(Debug, Clone)]\npub struct RemoveLayer {\n    index: usize,\n    layer: Option\u003cLayer\u003e,\n}\n\nimpl RemoveLayer {\n    pub fn new(index: usize) -\u003e Self {\n        Self { index, layer: None }\n    }\n}\n\nimpl Edit for RemoveLayer {\n    type Target = Canvas;\n    type Output = Result\u003c(), String\u003e;\n\n    fn edit(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        self.layer = Some(target.layers[self.index].clone());\n        target.remove_layer(self.index)\n    }\n\n    fn undo(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        if let Some(layer) = self.layer.take() {\n            target.layers.insert(self.index, layer);\n            target.invalidate();\n            Ok(())\n        } else {\n            Err(\"No layer to restore\".to_string())\n        }\n    }\n}\n\n/// Command to toggle layer visibility\n#[derive(Debug, Clone)]\npub struct ToggleVisibility {\n    index: usize,\n    was_visible: bool,\n}\n\nimpl ToggleVisibility {\n    pub fn new(index: usize) -\u003e Self {\n        Self {\n            index,\n            was_visible: true,\n        }\n    }\n}\n\nimpl Edit for ToggleVisibility {\n    type Target = Canvas;\n    type Output = ();\n\n    fn edit(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        if self.index \u003c target.layers.len() {\n            self.was_visible = target.layers[self.index].visible;\n        }\n        let _ = target.toggle_layer_visibility(self.index);\n    }\n\n    fn undo(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        if self.index \u003c target.layers.len() {\n            target.layers[self.index].visible = self.was_visible;\n            target.invalidate();\n        }\n    }\n}\n\n/// Command to set layer opacity\n#[derive(Debug, Clone)]\npub struct SetOpacity {\n    index: usize,\n    old_opacity: f32,\n    new_opacity: f32,\n}\n\nimpl SetOpacity {\n    pub fn new(index: usize, opacity: f32) -\u003e Self {\n        Self {\n            index,\n            old_opacity: 1.0,\n            new_opacity: opacity,\n        }\n    }\n}\n\nimpl Edit for SetOpacity {\n    type Target = Canvas;\n    type Output = ();\n\n    fn edit(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        if self.index \u003c target.layers.len() {\n            self.old_opacity = target.layers[self.index].opacity;\n        }\n        let _ = target.set_layer_opacity(self.index, self.new_opacity);\n    }\n\n    fn undo(\u0026mut self, target: \u0026mut Canvas) -\u003e Self::Output {\n        if self.index \u003c target.layers.len() {\n            target.layers[self.index].opacity = self.old_opacity;\n            target.invalidate();\n        }\n    }\n}\n","traces":[{"line":22,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":23,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":24,"address":[],"length":0,"stats":{"Line":2594073385365405696}},{"line":25,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":26,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":27,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":28,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":30,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":38,"address":[],"length":0,"stats":{"Line":432345564227567616}},{"line":39,"address":[],"length":0,"stats":{"Line":1441151880758558720}},{"line":40,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":42,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":43,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":45,"address":[],"length":0,"stats":{"Line":0}},{"line":46,"address":[],"length":0,"stats":{"Line":0}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":71,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":72,"address":[],"length":0,"stats":{"Line":5044031582654955520}},{"line":73,"address":[],"length":0,"stats":{"Line":2017612633061982208}},{"line":74,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":75,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":78,"address":[],"length":0,"stats":{"Line":50440315 .height) as usize;\n        let mut data = vec![0u8; pixel_count * 4];\n\n        for i in 0..pixel_count {\n            data[i * 4] = canvas.background_color.r;\n            data[i * 4 + 1] = canvas.background_color.g;\n            data[i * 4 + 2] = canvas.background_color.b;\n            data[i * 4 + 3] = 255;\n        }\n\n        for layer in \u0026canvas.layers {\n            if !layer.visible {\n                continue;\n            }\n\n            let opacity = layer.opacity;\n            let layer_data = \u0026layer.content.data;\n\n            for i in 0..pixel_count {\n                let src_r = layer_data[i * 4] as f32 / 255.0;\n                let src_g = layer_data[i * 4 + 1] as f32 / 255.0;\n                let src_b = layer_data[i * 4 + 2] as f32 / 255.0;\n                let src_a = (layer_data[i * 4 + 3] as f32 / 255.0) * opacity;\n\n                if src_a \u003c= 0.0 {\n                    continue;\n                }\n\n                blend_pixel(\u0026mut data[i * 4..i * 4 + 4], src_r, src_g, src_b, src_a);\n            }\n        }\n\n        CompositeResult {\n            width: canvas.width,\n            height: canvas.height,\n            data,\n        }\n    }\n\n    pub fn composite_rect(\u0026self, canvas: \u0026Canvas, x: u32, y: u32, w: u32, h: u32) -\u003e CompositeResult {\n        if w == 0 || h == 0 {\n            return CompositeResult {\n                width: 0,\n                height: 0,\n                data: Vec::new(),\n            };\n        }\n\n        let x = x.min(canvas.width);\n        let y = y.min(canvas.height);\n        let w = w.min(canvas.width - x);\n        let h = h.min(canvas.height - y);\n\n        let pixel_count = (w * h) as usize;\n        let mut data = vec![0u8; pixel_count * 4];\n\n        for i in 0..pixel_count {\n            data[i * 4] = canvas.background_color.r;\n            data[i * 4 + 1] = canvas.background_color.g;\n            data[i * 4 + 2] = canvas.background_color.b;\n            data[i * 4 + 3] = 255;\n        }\n\n        for layer in \u0026canvas.layers {\n            if !layer.visible {\n                continue;\n            }\n\n            let opacity = layer.opacity;\n            let layer_data = \u0026layer.content.data;\n            let layer_width = layer.content.width;\n\n            for cy in 0..h {\n                for cx in 0..w {\n                    let canvas_x = x + cx;\n                    let canvas_y = y + cy;\n\n                    let out_idx = ((cy * w + cx) * 4) as usize;\n                    let layer_idx = ((canvas_y * layer_width + canvas_x) * 4) as usize;\n\n                    let src_r = layer_data[layer_idx] as f32 / 255.0;\n                    let src_g = layer_data[layer_idx + 1] as f32 / 255.0;\n                    let src_b = layer_data[layer_idx + 2] as f32 / 255.0;\n                    let src_a = (layer_data[layer_idx + 3] as f32 / 255.0) * opacity;\n\n                    if src_a \u003c= 0.0 {\n                        continue;\n                    }\n\n                    blend_pixel(\u0026mut data[out_idx..out_idx + 4], src_r, src_g, src_b, src_a);\n                }\n            }\n        }\n\n        CompositeResult {\n            width: w,\n            height: h,\n            data,\n        }\n    }\n\n    /// Returns (CompositeResult, x_offset, y_offset) where x/y is the position\n    /// of the composited region within the canvas.\n    /// Full-canvas composites have (0, 0); partial composites have the dirty rect origin.\n    pub fn render(\u0026mut self, canvas: \u0026mut Canvas) -\u003e Option\u003c(CompositeResult, u32, u32)\u003e {\n        let current_version = canvas.version();\n\n        if !self.has_composited {\n            self.has_composited = true;\n            self.last_composited_version = current_version;\n            let result = self.composite_all(canvas);\n            canvas.consume_dirty_rect();\n            return Some((result, 0, 0));\n        }\n\n        if current_vers
