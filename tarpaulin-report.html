   LogLevel::Info =\u003e \"INFO\",\n            LogLevel::Warn =\u003e \"WARN\",\n            LogLevel::Error =\u003e \"ERROR\",\n        }\n    }\n}\n\n/// Global logger instance\nstatic LOGGER: Mutex\u003cOption\u003cFile\u003e\u003e = Mutex::new(None);\n\n/// Get the platform-specific log file path\nfn get_log_path() -\u003e PathBuf {\n    if let Some(data_dir) = dirs::data_local_dir() {\n        let rancer_dir = data_dir.join(\"rancer\");\n        let _ = std::fs::create_dir_all(\u0026rancer_dir);\n        rancer_dir.join(\"rancer.log\")\n    } else {\n        // Fallback to CWD if platform directory unavailable\n        PathBuf::from(\"rancer.log\")\n    }\n}\n\n/// Initialize the logger\n/// Creates or overwrites the `rancer.log` file\npub fn init() -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    let log_path = get_log_path();\n    let file = OpenOptions::new()\n        .write(true)\n        .create(true)\n        .truncate(true)\n        .open(\u0026log_path)?;\n\n    let mut logger = LOGGER.lock().unwrap_or_else(|e| e.into_inner());\n    *logger = Some(file);\n\n    let log_path_str = log_path.display();\n    let timestamp = Local::now().format(\"%Y-%m-%d %H:%M:%S\");\n    let log_line = format!(\n        \"[{}] INFO  - Logger initialized - writing to {}\\n\",\n        timestamp, log_path_str\n    );\n    if let Some(f) = logger.as_mut() {\n        let _ = f.write_all(log_line.as_bytes());\n        let _ = f.flush();\n    }\n    // Drop the lock before printing to stdout\n    drop(logger);\n    print!(\"{}\", log_line);\n\n    Ok(())\n}\n\n/// Write a log message with timestamp and level\nfn write_log(level: LogLevel, msg: \u0026str) {\n    let timestamp = Local::now().format(\"%Y-%m-%d %H:%M:%S\");\n    let log_line = format!(\"[{}] {:5} - {}\\n\", timestamp, level.as_str(), msg);\n\n    if let Ok(mut logger) = LOGGER.lock()\n        \u0026\u0026 let Some(file) = logger.as_mut()\n    {\n        let _ = file.write_all(log_line.as_bytes());\n        let _ = file.flush();\n    }\n\n    print!(\"{}\", log_line);\n}\n\n/// Log a debug message\npub fn debug(msg: \u0026str) {\n    write_log(LogLevel::Debug, msg);\n}\n\n/// Log an info message\npub fn info(msg: \u0026str) {\n    write_log(LogLevel::Info, msg);\n}\n\n/// Log a warning message\npub fn warn(msg: \u0026str) {\n    write_log(LogLevel::Warn, msg);\n}\n\n/// Log an error message\npub fn error(msg: \u0026str) {\n    write_log(LogLevel::Error, msg);\n}\n\n/// Timing scope for profiling - prints elapsed time when dropped\npub struct Timer {\n    name: \u0026'static str,\n    start: Instant,\n}\n\nimpl Timer {\n    pub fn new(name: \u0026'static str) -\u003e Self {\n        Self {\n            name,\n            start: Instant::now(),\n        }\n    }\n}\n\nimpl Drop for Timer {\n    fn drop(\u0026mut self) {\n        let elapsed = self.start.elapsed().as_secs_f64();\n        write_log(\n            LogLevel::Debug,\n            \u0026format!(\"{} took {:.3}ms\", self.name, elapsed * 1000.0),\n        );\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_log_levels() {\n        assert_eq!(LogLevel::Debug.as_str(), \"DEBUG\");\n        assert_eq!(LogLevel::Info.as_str(), \"INFO\");\n        assert_eq!(LogLevel::Warn.as_str(), \"WARN\");\n        assert_eq!(LogLevel::Error.as_str(), \"ERROR\");\n    }\n\n    #[test]\n    fn test_logger_initialization() {\n        // This test verifies that init() can be called without deadlock\n        let result = init();\n        assert!(result.is_ok(), \"Logger initialization should succeed\");\n\n        // Verify we can write logs after initialization\n        info(\"Test log message\");\n        warn(\"Test warning\");\n        error(\"Test error\");\n\n        // If we reach here without hanging, the test passes\n        // (deadlock would cause the test to hang forever)\n    }\n}\n","traces":[{"line":24,"address":[],"length":0,"stats":{"Line":504403158265495552}},{"lin as: CanvasPreferences,\n    pub brush: BrushPreferences,\n    pub renderer: RendererPreferences,\n    pub palette: PalettePreferences,\n}\n\n/// Window configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct WindowPreferences {\n    pub width: u32,\n    pub height: u32,\n    pub title: String,\n}\n\n/// Canvas configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct CanvasPreferences {\n    pub width: u32,\n    pub height: u32,\n    pub background_color: String, // Hex format: \"#FFFFFF\"\n}\n\n/// Brush configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct BrushPreferences {\n    pub default_size: f32,\n    pub default_opacity: f32,\n    pub default_type: String,\n    pub sizes: Vec\u003cf32\u003e,\n}\n\n/// Renderer configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct RendererPreferences {\n    pub msaa_samples: u32,\n    pub clear_color: String, // Hex format: \"#FFFFFF\"\n    pub max_fps: u32,        // 0 = unlimited, default 60\n}\n\n/// Palette configuration\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct PalettePreferences {\n    pub h: f32,                      // Hue: 0-360\n    pub s: f32,                      // Saturation: 0-100\n    pub v: f32,                      // Value: 0-100\n    pub custom_colors: Vec\u003c[u8; 3]\u003e, // RGB custom colors (max 10)\n}\n\nimpl Preferences {\n    /// Update the window dimensions in preferences\n    pub fn update_window_size(\u0026mut self, width: u32, height: u32) {\n        self.window.width = width;\n        self.window.height = height;\n    }\n}\n\nimpl Default for Preferences {\n    fn default() -\u003e Self {\n        Self {\n            version: CONFIG_VERSION.to_string(),\n            window: WindowPreferences {\n                width: 1280,\n                height: 720,\n                title: \"Rancer\".to_string(),\n            },\n            canvas: CanvasPreferences {\n                width: 1280,\n                height: 720,\n                background_color: \"#FFFFFF\".to_string(),\n            },\n            brush: BrushPreferences {\n                default_size: 3.0,\n                default_opacity: 1.0,\n                default_type: \"Square\".to_string(),\n                sizes: vec![3.0, 5.0, 10.0, 25.0, 50.0],\n            },\n            renderer: RendererPreferences {\n                msaa_samples: 1,\n                clear_color: \"#FFFFFF\".to_string(),\n                max_fps: 60,\n            },\n            palette: PalettePreferences {\n                h: 0.0,\n                s: 100.0,\n                v: 100.0,\n                custom_colors: Vec::new(),\n            },\n        }\n    }\n}\n\n/// Get the platform-specific config file path\npub fn get_config_path() -\u003e PathBuf {\n    let mut path = dirs::config_dir().unwrap_or_else(|| PathBuf::from(\".\"));\n\n    #[cfg(target_os = \"windows\")]\n    {\n        path.push(\"rancer\");\n    }\n\n    #[cfg(target_os = \"linux\")]\n    {\n        path.push(\"rancer\");\n    }\n\n    path.push(\"config.toml\");\n    path\n}\n\n/// Load preferences from config file\n/// Creates default config file if it doesn't exist\npub fn load() -\u003e Preferences {\n    let config_path = get_config_path();\n\n    if !config_path.exists() {\n        crate::logger::info(\u0026format!(\n            \"Config file not found, creating defaults at: {:?}\",\n            config_path\n        ));\n        let prefs = Preferences::default();\n        if let Err(e) = save(\u0026prefs) {\n            crate::logger::error(\u0026format!(\"Failed to create config file: {}\", e));\n        }\n        return prefs;\n    }\n\n    match fs::read_to_string(\u0026config_path) {\n        Ok(content) =\u003e match toml::from_str::\u003cPreferences\u003e(\u0026content) {\n            Ok(prefs) =\u003e {\n                crate::logger::info(\u0026format!(\"Loaded preferences from: {:?}\", config_path));\n                prefs\n            }\n            Err(e) =\u003e {\n                crate::logger::warn(\u0026format!(\n                    \"Failed to parse config file, using defaults: {}\",\n                    e\n                ));\n                Preferences::default()\n            }\n        },\n        Err(e) =\u003e {\n            crate::logger::warn(\u0026format!(\n                \"Failed to read config file, using defaults: {}\",\n                e\n            ));\n            Preferences::default()\n        }\n    }\n}\n\n/// Save preferences to config file\npub fn save(prefs: \u0026Preferences) -\u003e Result\u003c(), Box\u003cdyn std::error::Error\u003e\u003e {\n    let config_path = get_config_path();\n\n    if let Some(parent) = config_path.parent() {\n        fs::create_dir_all(parent)?;\n    }\n\n    let toml_string = toml::to_string(prefs)?;\n    fs::write(\u0026config_path, toml_string)?;\n    crate::logger::info(\u0026format!(\"Saved preferences to: {:?}\", config_path));\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_preferences_default_values() {\n        let prefs = Preferences::default();\n        assert_eq!(prefs.window.width, 1280);\n        assert_eq!(prefs.window.height, 720);\n        assert_eq!(prefs.window.title, \"Rancer\");\n        assert_eq!(prefs.canvas.width, 1280);\n        assert_eq!(prefs.canvas.height, 720);\n        assert_eq!(prefs.canvas.background_color, \"#FFFFFF\");\n        assert_eq!(prefs.brush.default_size, 3.0);\n        assert_eq!(prefs.brush.sizes.len(), 5);\n        assert_eq!(prefs.renderer.msaa_samples, 1);\n        assert_eq!(prefs.renderer.clear_color, \"#FFFFFF\");\n        assert_eq!(prefs.palette.h, 0.0);\n        assert_eq!(prefs.palette.s, 100.0);\n        assert_eq!(prefs.palette.v, 100.0);\n    }\n\n    #[test]\n    fn test_preferences_serialization() {\n        let prefs = Preferences::default();\n        let toml_string = toml::to_string(\u0026prefs).expect(\"Failed to serialize\ ow.height, 1080);\n        assert_eq!(recovered.brush.default_size, 10.0);\n        assert_eq!(recovered.palette.h, 180.0);\n        assert_eq!(recovered.palette.s, 50.0);\n        assert_eq!(recovered.palette.v, 75.0);\n    }\n\n    #[test]\n    fn test_preferences_save_and_load() {\n        let mut prefs = Preferences::default();\n        prefs.window.width = 1024;\n        prefs.window.height = 768;\n\n        // Save to a temp file\n        let temp_dir = std::env::temp_dir().join(\"rancer_test_prefs\");\n        std::fs::create_dir_all(\u0026temp_dir).unwrap();\n        let temp_config = temp_dir.join(\"config.toml\");\n\n        let toml_string = toml::to_string(\u0026prefs).unwrap();\n        std::fs::write(\u0026temp_config, \u0026toml_string).unwrap();\n\n        // Read it back\n        let content = std::fs::read_to_string(\u0026temp_config).unwrap();\n        let loaded: Preferences = toml::from_str(\u0026content).unwrap();\n\n        assert_eq!(loaded.window.width, 1024);\n        assert_eq!(loaded.window.height, 768);\n\n        // Cleanup\n        let _ = std::fs::remove_dir_all(\u0026temp_dir);\n    }\n\n    #[test]\n    fn test_preferences_corrupted_toml() {\n        let corrupted = \"this is not valid toml {{{{\";\n        let result = toml::from_str::\u003cPreferences\u003e(corrupted);\n        assert!(result.is_err(), \"Corrupted TOML should fail to parse\");\n    }\n\n    #[test]\n    fn test_preferences_window_defaults() {\n        let prefs = Preferences::default();\n        assert!(prefs.window.width \u003e 0);\n        assert!(prefs.window.height \u003e 0);\n        assert!(!prefs.window.title.is_empty());\n    }\n\n    #[test]\n    fn test_preferences_brush_defaults() {\n        let prefs = Preferences::default();\n        assert!(prefs.brush.default_size \u003e 0.0);\n        assert!(prefs.brush.default_size \u003c= 100.0);\n    }\n\n    #[test]\n    fn test_preferences_palette_defaults() {\n        let prefs = Preferences::default();\n        assert_eq!(prefs.palette.h, 0.0);\n        assert_eq!(prefs.palette.s, 100.0);\n        assert_eq!(prefs.palette.v, 100.0);\n    }\n\n    #[test]\n    fn test_preferences_serialization_roundtrip() {\n        let prefs = Preferences::default();\n        let serialized = toml::to_string(\u0026prefs).unwrap();\n        let deserialized: Preferences = toml::from_str(\u0026serialized).unwrap();\n        assert_eq!(prefs.window.width, deserialized.window.width);\n        assert_eq!(prefs.window.height, deserialized.window.height);\n        assert_eq!(prefs.brush.default_size, deserialized.brush.default_size);\n    }\n\n    #[test]\n    fn test_preferences_update_window_size() {\n        let mut prefs = Preferences::default();\n        assert_eq!(prefs.window.width, 1280);\n        assert_eq!(prefs.window.height, 720);\n\n        prefs.update_window_size(800, 600);\n\n        assert_eq!(prefs.window.width, 800);\n        assert_eq!(prefs.window.height, 600);\n    }\n\n    #[test]\n    fn test_preferences_partial_update() {\n        let mut prefs = Preferences::default();\n        let original_width = prefs.window.width;\n\n        prefs.window.width = 1920;\n        prefs.brush.default_size = 15.0;\n        prefs.palette.h = 120.0;\n        prefs.palette.s = 80.0;\n        prefs.palette.v = 60.0;\n\n        assert_eq!(prefs.window.width, 1920);\n        assert_ne!(prefs.window.width, original_width);\n        assert_eq!(prefs.brush.default_size, 15.0);\n        assert_eq!(prefs.palette.h, 120.0);\n        assert_eq!(prefs.palette.s, 80.0);\n        assert_eq!(prefs.palette.v, 60.0);\n    }\n}\n","traces":[{"line":69,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":70,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":71,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":76,"address":[],"length":0,"stats":{"Line":792633534417207296}},{"line":78,"address":[],"length":0,"stats":{"Line":2377900603251621888}},{"line":79, ve_layer_mut();\n        layer.content.set_pixel(10, 10, 255, 0, 0, 255);\n    }\n    canvas.mark_dirty(10, 10);\n    \n    assert!(canvas.version() \u003e initial_version, \"Version should increment on change\");\n}\n\n#[test]\nfn canvas_version_increments_on_layer_add() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    let initial_version = canvas.version();\n    \n    canvas.add_layer(None).unwrap();\n    \n    assert!(canvas.version() \u003e initial_version, \"Version should increment on add_layer\");\n}\n\n#[test]\nfn canvas_version_increments_on_layer_remove() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.add_layer(None).unwrap();\n    let version_before_remove = canvas.version();\n    \n    canvas.remove_layer(1).unwrap();\n    \n    assert!(canvas.version() \u003e version_before_remove, \"Version should increment on remove_layer\");\n}\n\n#[test]\nfn canvas_version_increments_on_toggle_visibility() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    let initial_version = canvas.version();\n    \n    let _ = canvas.toggle_layer_visibility(0);\n    \n    assert!(canvas.version() \u003e initial_version, \"Version should increment on toggle_visibility\");\n}\n\n#[test]\nfn canvas_version_increments_on_set_layer_opacity() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    let initial_version = canvas.version();\n    \n    let _ = canvas.set_layer_opacity(0, 0.5);\n    \n    assert!(canvas.version() \u003e initial_version, \"Version should increment on set_layer_opacity\");\n}\n\n#[test]\nfn canvas_version_increments_on_layer_move() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.add_layer(None).unwrap();\n    let version_before_move = canvas.version();\n    \n    canvas.move_layer(0, 1).unwrap();\n    \n    assert!(canvas.version() \u003e version_before_move, \"Version should increment on move_layer\");\n}\n\n#[test]\nfn render_skips_when_version_unchanged() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.resize(100, 100);\n    \n    let version1 = canvas.version();\n    \n    // No changes made\n    let version2 = canvas.version();\n    \n    // Render should skip (versions match)\n    assert_eq!(version1, version2, \"Version unchanged, render should skip\");\n}\n\n#[test]\nfn dirty_rect_tracks_pixel_changes() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.resize(100, 100);\n    \n    // Consume the dirty rect from resize\n    canvas.consume_dirty_rect();\n    \n    // Initial dirty rect should be empty\n    assert!(canvas.dirty_rect().is_empty());\n    \n    // Change a pixel and mark dirty\n    {\n        let layer = canvas.active_layer_mut();\n        layer.content.set_pixel(50, 50, 255, 0, 0, 255);\n    }\n    canvas.mark_dirty(50, 50);\n    \n    // Dirty rect should now include the changed pixel\n    let dirty = canvas.dirty_rect();\n    assert!(!dirty.is_empty(), \"Dirty rect should be non-empty after change\");\n    assert!(dirty.contains(50, 50), \"Dirty rect should contain changed pixel\");\n}\n\n#[test]\nfn dirty_rect_clears_on_consume() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.resize(100, 100);\n    \n    // Change a pixel\n    {\n        let layer = canvas.active_layer_mut();\n        layer.content.set_pixel(50, 50, 255, 0, 0, 255);\n    }\n    \n    // Consume the dirty rect\n    let dirty = canvas.consume_dirty_rect();\n    assert!(!dirty.is_empty(), \"Should have a dirty rect\");\n    \n    // After consuming, dirty rect should be empty\n    assert!(canvas.dirty_rect().is_empty(), \"Dirty rect should be empty after consume\");\n}\n\n#[test]\nfn composite_all_visible_layers() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.resize(100, 100);\n    \n    // Add a second layer\n    canvas.add_layer(None).unwrap();\n    \n    // Composite all visible layers\n    let composite = crate::compositor::Compositor::new().composite_all(\u0026canvas);\n    \n    // Result should have correct dimensions\n    assert_eq!(composite.width, 100);\n    assert_eq!(composite.height, 100);\n    // Data should be RGBA\n    assert_eq!(composite.data.len(), 100 * 100 * 4);\n}\n\n#[test]\nfn composite_respects_layer_visibility() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.resize(100, 100);\n    \n    // Draw on background layer\n    {\n        let layer = canvas.active_layer_mut();\n        for y in 0..100 {\n            for x in 0..100 {\n                layer.content.set_pixel(x, y, 255, 0, 0, 255);\n            }\n        }\n    }\n    \n    // Hide the layer\n    let _ = canvas.toggle_layer_visibility(0);\n    \n    // Composite should show background color (white) since no layers are visible\n    let composite = crate::compositor::Compositor::new().composite_all(\u0026canvas);\n    \n    // All pixels should be the background color (white, opaque)\n    for y in 0..100 {\n        for x in 0..100 {\n            let idx = ((y * 100 + x) * 4) as usize;\n            assert_eq!(composite.data[idx], 255, \"Pixel ({}, {}) R should be 255\", x, y);\n            assert_eq!(composite.data[idx + 1], 255, \"Pixel ({}, {}) G should be 255\", x, y);\n            assert_eq!(composite.data[idx + 2], 255, \"Pixel ({}, {}) B should be 255\", x, y);\n            assert_eq!(composite.data[idx + 3], 255, \"Pixel ({}, {}) A should be 255\", x, y);\n        }\n    }\n}\n\n#[test]\nfn composite_respects_layer_opacity() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::new();\n    canvas.resize(100, 100);\n    \n    // Draw on background layer with full opacity\n    {\n        let layer = canvas.active_layer_mut();\n        for y in 0..100 {\n            for x in 0..100 {\n                layer.content.set_pixel(x, y, 255, 0, 0, 255);\n            }\n        }\n    }\n    let _ = canvas.set_layer_opacity(0, 0.5);\n    \n    // Composite should blend red layer (50% opacity) over white background\n    let composite = crate::compositor::Compositor::new().composite_all(\u0026canvas);\n    \n    // Expected result: RGB(255, ~127, ~127) with alpha 255\n    // Red channel: (255*0.5 + 255*0.5) / 1.0 = 255\n    // Green channel: (0*0.5 + 255*0.5) / 1.0 = ~127\n    // Blue channel: (0*0.5 + 255*0.5) / 1.0 = ~127\n    let idx = ((50 * 100 + 50) * 4) as usize;\n    let r = composite.data[idx];\n    let g = composite.data[idx + 1];\n    let b = composite.data[idx + 2];\n    let a = composite.data[idx + 3];\n    \n    assert_eq!(r, 255, \"Red channel should be 255\");\n    assert!(g \u003e= 120 \u0026\u0026 g \u003c= 135, \"Green should be ~127, got {}\", g);\n    assert!(b \u003e= 120 \u0026\u0026 b \u003c= 135, \"Blue should be ~127, got {}\", b);\n    assert_eq!(a, 255, \"Alpha should be 255\");\n}\n\n#[test]\nfn composite_rect_produces_correct_output_for_small_region() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::with_size(20, 20);\n    \n    // Draw a red pixel at center\n    {\n        let layer = canvas.active_layer_mut();\n        layer.content.set_pixel(10, 10, 255, 0, 0, 255);\n    }\n    \n    // Composite only a 5x5 region around the red pixel\n    let region = crate::compositor::Compositor::new().composite_rect(\u0026canvas, 8, 8, 5, 5);\n    \n    // Should be 5x5 RGBA\n    assert_eq!(region.width, 5);\n    assert_eq!(region.height, 5);\n    assert_eq!(region.data.len(), 5 * 5 * 4);\n    \n    // Center of region should be red pixel (at offset 2,2 within 5x5)\n    let center_idx = (2 * 5 + 2) * 4;\n    assert_eq!(region.data[center_idx], 255);     // R\n    assert_eq!(region.data[center_idx + 1], 0);   // G\n    assert_eq!(region.data[center_idx + 2], 0);   // B\n    assert_eq!(region.data[center_idx + 3], 255); // A\n    \n    // Top-left corner should be white (background)\n    assert_eq!(region.data[0], 255); // R\n    assert_eq!(region.data[1], 255); // G\n    assert_eq!(region.data[2], 255); // B\n    assert_eq!(region.data[3], 255); // A\n}\n\n#[test]\nfn composite_rect_respects_layer_visibility() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::with_size(20, 20);\n    \n    // Draw a red pixel\n    {\n        let layer = canvas.active_layer_mut();\n        layer.content.set_pixel(10, 10, 255, 0, 0, 255);\n    }\n    \n    // Hide the layer\n    let _ = canvas.toggle_layer_visibility(0);\n    \n    // Composite the region - should be white background only\n    let region = crate::compositor::Compositor::new().composite_rect(\u0026canvas, 8, 8, 5, 5);\n    \n    // All pixels should be white (background color)\n    for y in 0..5 {\n        for x in 0..5 {\n            let idx = (y * 5 + x) * 4;\n            assert_eq!(region.data[idx], 255);\n            assert_eq!(region.data[idx + 1], 255);\n            assert_eq!(region.data[idx + 2], 255);\n            assert_eq!(region.data[idx + 3], 255);\n        }\n    }\n}\n\n#[test]\nfn composite_rect_clamps_to_canvas_bounds() {\n    use crate::canvas::Canvas;\n\n    let canvas = Canvas::with_size(20, 20);\n    \n    // Request region that extends beyond canvas bounds\n    let region = crate::compositor::Compositor::new().composite_rect(\u0026canvas, 15, 15, 10, 10);\n    \n    // Should be clamped to 5x5 (remaining canvas area)\n    assert_eq!(region.width, 5);\n    assert_eq!(region.height, 5);\n    assert_eq!(region.data.len(), 5 * 5 * 4);\n    \n    // All pixels should be white background\n    assert_eq!(region.data[0], 255);\n}\n\n#[test]\nfn composite_rect_handles_empty_request() {\n    use crate::canvas::Canvas;\n\n    let canvas = Canvas::with_size(20, 20);\n    \n    // Request zero-size region\n    let region = crate::compositor::Compositor::new().composite_rect(\u0026canvas, 5, 5, 0, 0);\n    \n    // Should return empty result\n    assert_eq!(region.width, 0);\n    assert_eq!(region.height, 0);\n    assert!(region.data.is_empty());\n}\n\n#[test]\nfn composite_rect_respects_layer_opacity() {\n    use crate::canvas::Canvas;\n\n    let mut canvas = Canvas::with_size(20, 20);\n    \n    // Draw opaque red\n    {\n        let layer = canvas.active_layer_mut();\n        layer.content.set_pixel(10, 10, 255, 0, 0, 255);\n    }\n    let _ = canvas.set_layer_opacity(0, 0.5);\n    \n    let region = crate::compositor::Compositor::new().composite_rect(\u0026canvas, 8, 8, 5, 5);\n    \n    // Center pixel should blend red with white background at 50%\n    let center_idx = (2 * 5 + 2) * 4;\n    let r = region.data[center_idx];\n    let g = region.data[center_idx + 1];\n    let b = region.data[center_idx + 2];\n    \n    // Expected: R=255, G=~127, B=~127 (same as composite_all)\n    assert_eq!(r, 255);\n    assert!(g \u003e= 120 \u0026\u0026 g \u003c= 135, \"G should be ~127, got {}\", g);\n    assert!(b \u003e= 120 \u0026\u0026 b \u003c= 135, \"B should be ~127, got {}\", b);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","sdl2_event_tests.rs"],"content":"//! Tests for SDL2 event → AppEvent mapping\n\n#[test]\nfn sdl2_mouse_button_down_maps_to_press() {\n    use sdl2::event::Event;\n    use sdl2::mouse::MouseButton;\n    use crate::events::AppEvent;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let sdl_event = Event::MouseButtonDown {\n        timestamp: 0,\n        window_id: 0,\n        which: 0,\n        mouse_btn: MouseButton::Left,\n        clicks: 1,\n        x: 100,\n        y: 200,\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    match result {\n        Some(AppEvent::Press { x, y }) =\u003e {\n            assert_eq!(x, 100.0);\n            assert_eq!(y, 200.0);\n        }\n        _ =\u003e panic!(\"expected Press event\"),\n    }\n}\n\n#[test]\nfn sdl2_mouse_button_up_maps_to_release() {\n    use sdl2::event::Event;\n    use sdl2::mouse::MouseButton;\n    use crate::events::AppEvent;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let sdl_event = Event::MouseButtonUp {\n        timestamp: 0,\n        window_id: 0,\n        which: 0,\n        mouse_btn: MouseButton::Left,\n        clicks: 1,\n        x: 150,\n        y: 250,\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    match result {\n        Some(AppEvent::Release { x, y }) =\u003e {\n            assert_eq!(x, 150.0);\n            assert_eq!(y, 250.0);\n        }\n        _ =\u003e panic!(\"expected Release event\"),\n    }\n}\n\n#[test]\nfn sdl2_mouse_motion_with_left_button_maps_to_drag() {\n    use sdl2::event::Event;\n    use sdl2::mouse::MouseState;\n    use crate::events::AppEvent;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let mouse_state = MouseState::from_sdl_state(1); // SDL_BUTTON_LMASK = 1\n\n    let sdl_event = Event::MouseMotion {\n        timestamp: 0,\n        window_id: 0,\n        which: 0,\n        mousestate: mouse_state,\n        xrel: 0,\n        yrel: 0,\n        x: 50,\n        y: 75,\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    match result {\n        Some(AppEvent::Drag { x, y }) =\u003e {\n            assert_eq!(x, 50.0);\n            assert_eq!(y, 75.0);\n        }\n        _ =\u003e panic!(\"expected Drag event\"),\n    }\n}\n\n#[test]\nfn sdl2_mouse_motion_without_button_maps_to_none() {\n    use sdl2::event::Event;\n    use sdl2::mouse::MouseState;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let mouse_state = MouseState::from_sdl_state(0); // no buttons pressed\n\n    let sdl_event = Event::MouseMotion {\n        timestamp: 0,\n        window_id: 0,\n        which: 0,\n        mousestate: mouse_state,\n        xrel: 0,\n        yrel: 0,\n        x: 50,\n        y: 75,\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    assert!(result.is_none());\n}\n\n#[test]\nfn sdl2_key_down_maps_to_key_event() {\n    use sdl2::event::Event;\n    use sdl2::keyboard::Keycode;\n    use crate::events::AppEvent;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let sdl_event = Event::KeyDown {\n        timestamp: 0,\n        window_id: 0,\n        keycode: Some(Keycode::A),\n        scancode: None,\n        keymod: sdl2::keyboard::Mod::empty(),\n        repeat: false,\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    match result {\n        Some(AppEvent::Key { code }) =\u003e {\n            // Keycode::A maps to some string representation containing \"a\"\n            assert!(code.contains(\"a\") || code.contains(\"97\"));\n        }\n        _ =\u003e panic!(\"expected Key event\"),\n    }\n}\n\n#[test]\nfn sdl2_quit_maps_to_quit_event() {\n    use sdl2::event::Event;\n    use crate::events::AppEvent;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let sdl_event = Event::Quit { timestamp: 0 };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    match result {\n        Some(AppEvent::Quit) =\u003e {}\n        _ =\u003e panic!(\"expected Quit event\"),\n    }\n}\n\n#[test]\nfn sdl2_window_size_changed_maps_to_resize() {\n    use sdl2::event::Event;\n    use crate::events::AppEvent;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let sdl_event = Event::Window {\n        timestamp: 0,\n        window_id: 0,\n        win_event: sdl2::event::WindowEvent::SizeChanged(800, 600),\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    match result {\n        Some(AppEvent::Resize { width, height }) =\u003e {\n            assert_eq!(width, 800);\n            assert_eq!(height, 600);\n        }\n        _ =\u003e panic!(\"expected Resize event\"),\n    }\n}\n\n#[test]\nfn unhandled_sdl_event_maps_to_none() {\n    use sdl2::event::Event;\n    use crate::window::sdl2::sdl_event_to_app_event;\n\n    let sdl_event = Event::Window {\n        timestamp: 0,\n        window_id: 0,\n        win_event: sdl2::event::WindowEvent::Shown,\n    };\n\n    let result = sdl_event_to_app_event(sdl_event);\n    assert!(result.is_none());\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","tools","brush_tool.rs"],"content":"//! Brush tool implementation\n//!\n//! Stamps brush dabs onto RasterImage buffers with alpha compositing.\n//! Also supports eraser mode (erase to background color).\n\nuse crate::brush::{BrushEngine, BrushType, DabMask, RoundDab};\nuse crate::canvas::{Canvas, Color};\nuse crate::tools::{BrushConfig, BrushSettings, Tool};\n\n/// Eraser settings (separate from brush settings)\n#[derive(Clone, Copy)]\npub struct EraserSettings {\n    pub size: u32,\n    pub opacity: f32,  // Eraser strength (0.0 to 1.0)\n}\n\nimpl Default for EraserSettings {\n    fn default() -\u003e Self {\n        Self {\n            size: 10,\n            opacity: 1.0,\n        }\n    }\n}\n\n/// Tool for freehand brush drawing (with optional eraser mode)\npub struct BrushTool {\n    is_drawing: bool,\n    paint_settings: BrushSettings,\n    eraser_settings: EraserSettings,\n    is_eraser: bool,  // Mode toggle: false = paint, true = erase\n    last_x: f32,\n    last_y: f32,\n}\n\nimpl BrushTool {\n    pub fn new() -\u003e Self {\n        Self {\n            is_drawing: false,\n            paint_settings: BrushSettings {\n                size: 10,\n                opacity: 1.0,\n                color: Color { r: 0, g: 0, b: 0, a: 255 },\n                brush_type: BrushType::Round,\n            },\n            eraser_settings: EraserSettings {\n                size: 10,\n                opacity: 1.0,\n            },\n            is_eraser: false,\n            last_x: 0.0,\n            last_y: 0.0,\n        }\n    }\n\n    pub fn is_drawing(\u0026self) -\u003e bool {\n        self.is_drawing\n    }\n    \n    pub fn paint_settings(\u0026self) -\u003e BrushSettings {\n        self.paint_settings\n    }\n    \n    pub fn eraser_settings(\u0026self) -\u003e EraserSettings {\n        self.eraser_settings\n    }\n    \n    pub fn set_paint_settings(\u0026mut self, settings: BrushSettings) {\n        self.paint_settings = settings;\n    }\n    \n    pub fn set_eraser_settings(\u0026mut self, settings: EraserSettings) {\n        self.eraser_settings = settings;\n    }\n    \n    pub fn set_brush_color(\u0026mut self, color: Color) {\n        self.paint_settings.color = color;\n    }\n\n    fn stamp_at(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas) {\n        if self.is_eraser {\n            self.erase_at(x, y, canvas);\n        } else {\n            let layer_idx = canvas.active_layer_index();\n            let canvas_width = canvas.width();\n            let canvas_height = canvas.height();\n            let raster = \u0026mut canvas.layers_mut()[layer_idx].content;\n            \n            let dab = match self.paint_settings.brush_type {\n                BrushType::Round =\u003e RoundDab::generate(self.paint_settings.size),\n                BrushType::Square =\u003e DabMask::new(self.paint_settings.size),\n            };\n            \n            let color = Color {\n                r: self.paint_settings.color.r,\n                g: self.paint_settings.color.g,\n                b: self.paint_settings.color.b,\n                a: (self.paint_settings.color.a as f32 * self.paint_settings.opacity) as u8,\n            };\n            \n            let half = (self.paint_settings.size as f32 / 2.0).ceil() as i32;\n            let min_x = (x as i32 - half).max(0) as u32;\n            let min_y = (y as i32 - half).max(0) as u32;\n            let max_x = (x as i32 + half).min(canvas_width as i32 - 1) as u32;\n            let max_y = (y as i32 + half).min(canvas_height as i32 - 1) as u32;\n            \n            BrushEngine::stamp_dab(raster, x as i32, y as i32, \u0026dab, color);\n            canvas.mark_dirty_rect(min_x, min_y, max_x - min_x + 1, max_y - min_y + 1);\n        }\n    }\n    \n    fn erase_at(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas) {\n        let layer_idx = canvas.active_layer_index();\n        let canvas_width = canvas.width();\n        let canvas_height = canvas.height();\n        let bg_color = canvas.background_color;\n        let erase_opacity = self.eraser_settings.opacity;\n        let raster = \u0026mut canvas.layers_mut()[layer_idx].content;\n        \n        let dab = match self.paint_settings.brush_type {\n            BrushType::Round =\u003e RoundDab::generate(self.eraser_settings.size),\n            BrushType::Square =\u003e DabMask::new(self.eraser_settings.size),\n        };\n        \n        let half = (self.eraser_settings.size as f32 / 2.0).ceil() as i32;\n        let min_x = (x as i32 - half).max(0) as u32;\n        let min_y = (y as i32 - half).max(0) as u32;\n        let max_x = (x as i32 + half).min(canvas_width as i32 - 1) as u32;\n        let max_y = (y as i32 + half).min(canvas_height as i32 - 1) as u32;\n        \n        BrushEngine::erase_dab(raster, x as i32, y as i32, \u0026dab, bg_color, erase_opacity);\n        canvas.mark_dirty_rect(min_x, min_y, max_x - min_x + 1, max_y - min_y + 1);\n    }\n}\n\nimpl Default for BrushTool {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl Tool for BrushTool {\n    fn on_press(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas) {\n        self.is_drawing = true;\n        self.last_x = x;\n        self.last_y = y;\n        self.stamp_at(x, y, canvas);\n    }\n\n    fn on_drag(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas) {\n        if self.is_drawing {\n            let canvas_width = canvas.width() as f32;\n            let canvas_height = canvas.height() as f32;\n            \n            let x = x.clamp(0.0, canvas_width - 1.0);\n            let y = y.clamp(0.0, canvas_height - 1.0);\n            \n            let dx = x - self.last_x;\n            let dy = y - self.last_y;\n            let dist = (dx * dx + dy * dy).sqrt();\n            \n            if dist \u003e 0.0 {\n                let step = (self.paint_settings.size as f32 / 2.0).max(1.0);\n                let steps = (dist / step).ceil() as i32;\n                \n                for i in 0..=steps {\n                    let t = i as f32 / steps as f32;\n                    let ix = self.last_x + dx * t;\n                    let iy = self.last_y + dy * t;\n                    self.stamp_at(ix, iy, canvas);\n                }\n            }\n            \n            self.last_x = x;\n            self.last_y = y;\n        }\n    }\n\n    fn on_release(\u0026mut self, _x: f32, _y: f32, _canvas: \u0026mut Canvas) {\n        self.is_drawing = false;\n    }\n\n    fn on_key(\u0026mut self, _code: \u0026str) {\n    }\n\n    fn name(\u0026self) -\u003e \u0026str {\n        \"Brush\"\n    }\n\n    fn brush_settings(\u0026self) -\u003e Option\u003cBrushSettings\u003e {\n        Some(self.paint_settings)\n    }\n\n    fn as_brush_config(\u0026mut self) -\u003e Option\u003c\u0026mut dyn BrushConfig\u003e {\n        Some(self)\n    }\n}\n\nimpl BrushConfig for BrushTool {\n    fn brush_settings(\u0026self) -\u003e BrushSettings {\n        self.paint_settings\n    }\n\n    fn set_brush_size(\u0026mut self, size: u32) {\n        if self.is_eraser {\n            self.eraser_settings.size = size.max(1);\n        } else {\n            self.paint_settings.size = size.max(1);\n        }\n    }\n\n    fn set_brush_opacity(\u0026mut self, opacity: f32) {\n        if self.is_eraser {\n            self.eraser_settings.opacity = opacity.clamp(0.0, 1.0);\n        } else {\n            self.paint_settings.opacity = opacity.clamp(0.0, 1.0);\n        }\n    }\n\n    fn set_brush_color(\u0026mut self, color: Color) {\n        self.paint_settings.color = color;\n    }\n\n    fn set_brush_type(\u0026mut self, brush_type: BrushType) {\n        self.paint_settings.brush_type = brush_type;\n    }\n\n    fn set_eraser_mode(\u0026mut self, enabled: bool) {\n        self.is_eraser = enabled;\n    }\n\n    fn is_eraser(\u0026self) -\u003e bool {\n        self.is_eraser\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::canvas::{Canvas, Color};\n    use crate::tools::{BrushConfig, BrushSettings};\n    \n    #[test]\n    fn test_brush_tool_new_has_eraser_off() {\n        let tool = BrushTool::new();\n        assert!(!tool.is_eraser());\n    }\n    \n    #[test]\n    fn test_brush_tool_set_eraser_mode() {\n        let mut tool = BrushTool::new();\n        tool.set_eraser_mode(true);\n        assert!(tool.is_eraser());\n        \n        tool.set_eraser_mode(false);\n        assert!(!tool.is_eraser());\n    }\n    \n    #[test]\n    fn test_brush_tool_paint_mode_on_press() {\n        let mut canvas = Canvas::new();\n        canvas.resize(100, 100);\n        let mut tool = BrushTool::new();\n        tool.set_eraser_mode(false);\n        \n        tool.on_press(50.0, 50.0, \u0026mut canvas);\n        \n        let layer_idx = canvas.active_layer();\n        let raster = \u0026canvas.layers()[layer_idx].content;\n        let pixel = raster.get_pixel(50, 50).unwrap();\n        // Pixel should have alpha \u003e 0 after painting (even if RGB is 0 for black)\n        assert!(pixel.3 \u003e 0);\n    }\n    \n    #[test]\n    fn test_brush_tool_eraser_mode_on_press() {\n        let mut canvas = Canvas::new();\n        canvas.resize(100, 100);\n        \n        let mut paint_tool = BrushTool::new();\n        paint_tool.set_eraser_mode(false);\n        paint_tool.on_press(50.0, 50.0, \u0026mut canvas);\n        \n        let layer_idx = canvas.active_layer();\n        let raster = \u0026canvas.layers()[layer_idx].content;\n        let pixel_before = raster.get_pixel(50, 50).unwrap();\n        assert!(pixel_before.3 \u003e 0);\n        \n        let mut eraser_tool = BrushTool::new();\n        eraser_tool.set_eraser_mode(true);\n        eraser_tool.on_press(50.0, 50.0, \u0026mut canvas);\n        \n        let raster = \u0026canvas.layers()[layer_idx].content;\n        let pixel_after = raster.get_pixel(50, 50).unwrap();\n        assert!(pixel_after.3 \u003c pixel_before.3);\n    }\n    \n    #[test]\n    fn test_brush_tool_eraser_mode_on_drag() {\n        let mut canvas = Canvas::new();\n        canvas.resize(100, 100);\n        \n        let mut paint_tool = BrushTool::new();\n        paint_tool.set_eraser_mode(false);\n        paint_tool.on_press(50.0, 50.0, \u0026mut canvas);\n        paint_tool.on_drag(60.0, 50.0, \u0026mut canvas);\n        \n        let mut eraser_tool = BrushTool::new();\n        eraser_tool.set_eraser_mode(true);\n        eraser_tool.on_press(50.0, 50.0, \u0026mut canvas);\n        eraser_tool.on_drag(60.0, 50.0, \u0026mut canvas);\n        \n        let layer_idx = canvas.active_layer();\n        let raster = \u0026canvas.layers()[layer_idx].content;\n        let px1 = raster.get_pixel(50, 50).unwrap();\n        let px2 = raster.get_pixel(55, 50).unwrap();\n        assert!(px1.3 \u003c 255);\n        assert!(px2.3 \u003c 255);\n    }\n    \n    #[test]\n    fn test_eraser_uses_background_color() {\n        let mut canvas = Canvas::new();\n        canvas.resize(100, 100);\n        canvas.background_color = Color { r: 255, g: 0, b: 0, a: 0 };\n        \n        let mut tool = BrushTool::new();\n        tool.set_eraser_mode(false);\n        tool.on_press(50.0, 50.0, \u0026mut canvas);\n        \n        tool.set_eraser_mode(true);\n        tool.on_press(50.0, 50.0, \u0026mut canvas);\n        \n        let layer_idx = canvas.active_layer();\n        let raster = \u0026canvas.layers()[layer_idx].content;\n        let px = raster.get_pixel(50, 50).unwrap();\n        assert_eq!(px.0, canvas.background_color.r);\n        assert_eq!(px.3, canvas.background_color.a);\n    }\n    \n    #[test]\n    fn test_paint_and_eraser_have_separate_settings() {\n        let mut tool = BrushTool::new();\n        \n        tool.set_paint_settings(BrushSettings {\n            size: 20,\n            opacity: 1.0,\n            color: Color { r: 255, g: 0, b: 0, a: 255 },\n            brush_type: crate::brush::BrushType::Round,\n        });\n        \n        tool.set_eraser_settings(EraserSettings {\n            size: 40,\n            opacity: 0.5,\n        });\n        \n        assert_eq!(tool.paint_settings().size, 20);\n        assert_eq!(tool.eraser_settings().size, 40);\n        assert_ne!(tool.paint_settings().opacity, tool.eraser_settings().opacity);\n    }\n}\n","traces":[{"line":18,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":40,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":46,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":56,"address":[],"length":0,"stats":{"Line":0}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":61,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":64,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":65,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":68,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":69,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":72,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":73,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":76,"address":[],"length":0,"stats":{"Line":0}},{"line":77,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":1801439850948198400}},{"line":81,"address":[],"length":0,"stats":{"Line":2233785415175766016}},{"line":82,"address":[],"length":0,"stats":{"Line":1729382256910270464}},{"line":84,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":85,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":86,"address":[],"length":0,"stats":{"Line":4107282860161892352}},{"line":87 ddress":[],"length":0,"stats":{"Line":216172782113783808}}],"covered":93,"coverable":107},{"path":["C:","\\","Users","robin","Projects","rancer","src","tools","mod.rs"],"content":"//! Tool trait — interface for all drawing and interaction tools\n//!\n//! Each tool implements this trait to handle user input events.\n//! Brush-specific configuration lives in the separate `BrushConfig` trait.\n\nuse crate::canvas::{Canvas, Color};\nuse crate::brush::BrushType;\n\n/// Shared brush settings that tools can read/write\n#[derive(Debug, Clone, Copy)]\npub struct BrushSettings {\n    pub size: u32,\n    pub opacity: f32,\n    pub color: Color,\n    pub brush_type: BrushType,\n}\n\n/// Available tool types\n#[derive(Debug, Clone, Copy, PartialEq)]\npub enum ToolType {\n    Brush,\n}\n\n/// Trait for all tools (brush, pan, selection, etc.)\npub trait Tool {\n    fn on_press(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas);\n    fn on_drag(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas);\n    fn on_release(\u0026mut self, x: f32, y: f32, canvas: \u0026mut Canvas);\n    fn on_key(\u0026mut self, code: \u0026str);\n    fn name(\u0026self) -\u003e \u0026str;\n    fn brush_settings(\u0026self) -\u003e Option\u003cBrushSettings\u003e { None }\n    fn as_brush_config(\u0026mut self) -\u003e Option\u003c\u0026mut dyn BrushConfig\u003e { None }\n}\n\n/// Brush-specific configuration (size, opacity, color, eraser mode).\n/// Only brush-like tools implement this.\npub trait BrushConfig {\n    fn brush_settings(\u0026self) -\u003e BrushSettings;\n    fn set_brush_size(\u0026mut self, size: u32);\n    fn set_brush_opacity(\u0026mut self, opacity: f32);\n    fn set_brush_color(\u0026mut self, color: Color);\n    fn set_brush_type(\u0026mut self, brush_type: BrushType);\n    fn set_eraser_mode(\u0026mut self, enabled: bool);\n    fn is_eraser(\u0026self) -\u003e bool;\n}\n\npub mod brush_tool;\n\npub use brush_tool::BrushTool;\n","traces":[{"line":31,"address":[],"length":0,"stats":{"Line":0}},{"line":32,"address":[],"length":0,"stats":{"Line":0}}],"covered":0,"coverable":2},{"path":["C:","\\","Users","robin","Projects","rancer","src","ui","egui_impl.rs"],"content":"//! egui UI implementation based on Rancer UI.html design\n//!\n//! Implements the main interface: top bar, tool strip, bottom bar,\n//! color picker, layer management, themes, and canvas area.\n\nuse egui_sdl2::egui::{self, Color32, Context, Stroke, RichText, TextureHandle};\nuse std::collections::HashMap;\nuse crate::app::AppState;\nuse crate::ui::UiState;\nuse crate::tools::ToolType as AppToolType;\n\n/// Icon texture cache - pre-load all icons at startup\npub struct IconCache {\n    textures: HashMap\u003c\u0026'static str, TextureHandle\u003e,\n}\n\nimpl IconCache {\n    pub fn new(ctx: \u0026Context) -\u003e Self {\n        let mut cache = Self {\n            textures: HashMap::new(),\n        };\n        \n        // Pre-load all SVG icons\n        cache.load_icon(ctx, \"brush\", crate::ui::icons::BRUSH_ICON);\n        cache.load_icon(ctx, \"eraser\", crate::ui::icons::ERASER_ICON);\n        cache.load_icon(ctx, \"zoom_in\", crate::ui::icons::ZOOM_IN_ICON);\n        cache.load_icon(ctx, \"zoom_out\", crate::ui::icons::ZOOM_OUT_ICON);\n        cache.load_icon(ctx, \"undo\", crate::ui::icons::UNDO_ICON);\n        cache.load_icon(ctx, \"redo\", crate::ui::icons::REDO_ICON);\n        cache.load_icon(ctx, \"add_layer\", crate::ui::icons::ADD_LAYER_ICON);\n        cache.load_icon(ctx, \"settings\", crate::ui::icons::SETTINGS_ICON);\n        cache.load_icon(ctx, \"theme\", crate::ui::icons::THEME_ICON);\n        cache.load_icon(ctx, \"eye\", crate::ui::icons::EYE_ICON);\n        cache.load_icon(ctx, \"eye_off\", crate::ui::icons::EYE_OFF_ICON);\n        \n        cache\n    }\n    \n    fn load_icon(\u0026mut self, ctx: \u0026Context, name: \u0026'static str, svg_bytes: \u0026'static str) {\n        let options = resvg::usvg::Options::default();\n        let color_image = egui_extras::image::load_svg_bytes(svg_bytes.as_bytes(), \u0026options)\n            .unwrap_or_else(|_| {\n                egui::ColorImage::new([20, 20], vec![egui::Color32::TRANSPARENT])\n            });\n        \n        let handle = ctx.load_texture(\n            name,\n            color_image,\n            egui::TextureOptions::default()\n        );\n        \n        self.textures.insert(name, handle);\n    }\n    \n    pub fn get(\u0026self, name: \u0026str) -\u003e Option\u003c\u0026TextureHandle\u003e {\n        self.textures.get(name)\n    }\n}\n\n/// Theme colors for the UI\npub struct Theme {\n    pub panel: Color32,\n    pub panel_alt: Color32,\n    pub accent: Color32,\n    pub text: Color32,\n    pub text_muted: Color32,\n    pub border: Color32,\n    pub success: Color32,\n    pub surface: Color32,\n}\n\nimpl Theme {\n    pub fn studio_dark() -\u003e Self {\n        Self {\n            panel: Color32::from_rgb(36, 36, 38),\n            panel_alt: Color32::from_rgb(48, 48, 50),\n            accent: Color32::from_rgb(0, 153, 255),\n            text: Color32::from_rgb(240, 240, 240),\n            text_muted: Color32::from_rgb(160, 160, 160),\n            border: Color32::from_rgb(64, 64, 66),\n            success: Color32::from_rgb(34, 197, 94),\n            surface: Color32::from_rgb(24, 24, 26),\n        }\n    }\n    \n    pub fn studio_light() -\u003e Self {\n        Self {\n            panel: Color32::from_rgb(245, 245, 247),\n            panel_alt: Color32::from_rgb(235, 235, 237),\n            accent: Color32::from_rgb(0, 122, 204),\n            text: Color32::from_rgb(20, 20, 20),\n            text_muted: Color32::from_rgb(120, 120, 120),\n            border: Color32::from_rgb(200, 200, 202),\n            success: Color32::from_rgb(34, 197, 94),\n            surface: Color32::from_rgb(255, 255, 255),\n        }\n    }\n}\n\n/// Convert our Color (RGBA u8) to egui::Color32\npub fn color_to_color32(color: crate::canvas::Color) -\u003e Color32 {\n    // Color32 stores RGBA as u32, with a() returning the alpha byte\n    // from_rgba_unmultiplied expects values in 0-255 range\n    Color32::from_rgba_premultiplied(\n        (color.r as f32 * (color.a as f32 / 255.0)) as u8,\n        (color.g as f32 * (color.a as f32 / 255.0)) as u8,\n        (color.b as f32 * (color.a as f32 / 255.0)) as u8,\n        color.a\n    )\n}\n\n/// Convert egui::Color32 to our Color (RGBA u8)\npub fn color32_to_color(c: Color32) -\u003e crate::canvas::Color {\n    // Color32 stores premultiplied alpha; un-premultiply to recover the original RGB\n    let a = c.a();\n    if a == 0 {\n        return crate::canvas::Color { r: 0, g: 0, b: 0, a: 0 };\n    }\n    crate::canvas::Color {\n        r: (c.r() as u16 * 255 / a as u16) as u8,\n        g: (c.g() as u16 * 255 / a as u16) as u8,\n        b: (c.b() as u16 * 255 / a as u16) as u8,\n        a,\n    }\n}\n\n/// Show the main UI using egui\n#[allow(clippy::field_reassign_with_default)]\npub fn show_ui(ctx: \u0026Context, app: \u0026mut AppState, ui_state: \u0026mut UiState, icon_cache: \u0026IconCache) {\n    let theme = if ui_state.use_dark_theme { Theme::studio_dark() } else { Theme::studio_light() };\n    \n    // Apply theme to egui visuals\n    let mut visuals = egui::Visuals::default();\n    visuals.window_fill = theme.panel;\n    visuals.panel_fill = theme.panel;\n    visuals.faint_bg_color = theme.panel_alt;\n    visuals.window_stroke = Stroke::new(1.0, theme.border);\n    visuals.widgets.noninteractive.bg_fill = theme.panel_alt;\n    visuals.widgets.noninteractive.bg_stroke = Stroke::new(1.0, theme.border);\n    visuals.widgets.inactive.bg_fill = theme.panel_alt;\n    visuals.widgets.hovered.bg_fill = theme.accent.linear_multiply(0.2);\n    visuals.widgets.active.bg_fill = theme.accent.linear_multiply(0.3);\n    visuals.override_text_color = Some(theme.text);\n    visuals.weak_text_color = Some(theme.text_muted);\n    ctx.set_visuals(visuals);\n    \n    // Top bar\n    egui::TopBottomPanel::top(\"top_bar\").show(ctx, |ui| {\n        ui.horizontal(|ui| {\n            ui.add_space(8.0);\n            \n            // Title\n            ui.label(RichText::new(\"Rancer\").color(theme.text).size(16.0).strong());\n            \n            ui.with_layout(egui::Layout::right_to_left(egui::Align::Center), |ui| {\n                ui.add_space(8.0);\n                \n                // Theme toggle with SVG icon\n                if let Some(texture) = icon_cache.get(\"theme\") {\n                    let button = egui::Button::image(texture)\n                        .min_size(egui::vec2(32.0, 32.0))\n                        .corner_radius(4.0)\n                        .fill(Color32::TRANSPARENT);\n                    \n                    if ui.add(button).clicked() {\n                        ui_state.use_dark_theme = !ui_state.use_dark_theme;\n                    }\n                }\n                \n                // Settings with SVG icon\n                if let Some(texture) = icon_cache.get(\"settings\") {\n                    let button = egui::Button::image(texture)\n                        .min_size(egui::vec2(32.0, 32.0))\n                        .corner_radius(4.0)\n                        .fill(Color32::TRANSPARENT);\n                    \n                    if ui.add(button).clicked() {\n                        // TODO: open settings\n                    }\n                }\n                \n                ui.separator();\n                \n                // Redo with SVG icon\n                if let Some(texture) = icon_cache.get(\"redo\") {\n                    let button = egui::Button::image(texture)\n                        .min_size(egui::vec2(32.0, 32.0))\n                        .corner_radius(4.0)\n                        .fill(Color32::TRANSPARENT);\n                    \n                    if ui.add(button).clicked() {\n                        ui_state.redo(app);\n                    }\n                }\n                \n                // Undo with SVG icon\n                if let Some(texture) = icon_cache.get(\"undo\") {\n                    let button = egui::Button::image(texture)\n                        .min_size(egui::vec2(32.0, 32.0))\n                        .corner_radius(4.0)\n                        .fill(Color32::TRANSPARENT);\n                    \n                    if ui.add(button).clicked() {\n                        ui_state.undo(app);\n                    }\n                }\n                \n                ui.add_space(8.0);\n            });\n        });\n    });\n    \n    // Left tool strip\n    egui::SidePanel::left(\"tool_strip\").resizable(false).default_width(48.0).show(ctx, |ui| {\n        ui.vertical(|ui| {\n            ui.add_space(8.0);\n            \n            // Brush button\n            let is_brush_active = ui_state.active_tool == AppToolType::Brush \u0026\u0026 !ui_state.eraser_mode;\n            \n            if let Some(texture) = icon_cache.get(\"brush\") {\n                let button = egui::Button::image(texture)\n                    .min_size(egui::vec2(36.0, 36.0))\n                    .corner_radius(8.0)\n                    .fill(if is_brush_active { \n                        theme.accent.linear_multiply(0.2) \n                    } else { \n                        Color32::TRANSPARENT \n                    })\n                    .stroke(if is_brush_active { \n                        Stroke::new(1.5, theme.accent) \n                    } else { \n                        Stroke::NONE \n                    });\n                \n                if ui.add(button).clicked() {\n                    ui_state.set_tool(AppToolType::Brush);\n                    ui_state.eraser_mode = false;\n                    ui_state.apply_to_app(app);\n                }\n            }\n            \n            // Eraser button (uses BrushTool with eraser_mode=true)\n            let is_eraser_active = ui_state.active_tool == AppToolType::Brush \u00
