" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\n  \u003cpolyline points=\"4 7 4 4 20 4 20 7\"/\u003e\n  \u003cline x1=\"9\" y1=\"20\" x2=\"15\" y2=\"20\"/\u003e\n  \u003cline x1=\"12\" y1=\"4\" x2=\"12\" y2=\"20\"/\u003e\n\u003c/svg\u003e\"#;\n\n/// 24x24 SVG icon for Shapes tool\npub const SHAPES_ICON: \u0026str = r#\"\u003csvg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\n  \u003crect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\" ry=\"2\"/\u003e\n\u003c/svg\u003e\"#;\n\n/// 24x24 SVG icon for Fill tool\npub const FILL_ICON: \u0026str = r#\"\u003csvg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\n  \u003cpath d=\"M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z\"/\u003e\n\u003c/svg\u003e\"#;\n\n/// 24x24 SVG icon for Line tool\npub const LINE_ICON: \u0026str = r#\"\u003csvg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\n  \u003cline x1=\"5\" y1=\"19\" x2=\"19\" y2=\"5\"/\u003e\n\u003c/svg\u003e\"#;\n\n/// 24x24 SVG icon for Upload (export)\npub const UPLOAD_ICON: \u0026str = r#\"\u003csvg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"\u003e\n  \u003cpath d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"/\u003e\n  \u003cpolyline points=\"17 8 12 3 7 8\"/\u003e\n  \u003cline x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"/\u003e\n\u003c/svg\u003e\"#;\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","ui","mod.rs"],"content":"//! UI state management and egui integration\n\npub mod state;\npub use state::{UiState, ToolType};\n\npub mod egui_integration;\npub use egui_integration::EguiIntegration;\n\npub mod egui_impl;\npub use egui_impl::show_ui;\npub use egui_impl::Theme;\npub use egui_impl::IconCache;\n\npub mod icons;\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","ui","state.rs"],"content":"//! UI state management for egui interface\n//!\n//! Holds tool selection, layer operations, and panel visibility.\n//! Brush settings are stored in the active tool and accessed via the Tool trait.\n\nuse crate::app::AppState;\nuse crate::commands::{CanvasCommand, RemoveLayer, SetOpacity, ToggleVisibility};\nuse crate::tools::{BrushConfig, BrushTool};\n\npub use crate::tools::ToolType;\n\n/// UI state containing all user-facing settings and operations\npub struct UiState {\n    // Tool selection\n    pub active_tool: ToolType,\n    pub eraser_mode: bool,  // true = eraser mode (BrushTool with is_eraser=true)\n    pub color_picker_open: bool,  // Color picker popup state\n    pub pending_color: Option\u003ccrate::canvas::Color\u003e,  // Color to apply after picker closes\n    \n    // Panel visibility\n    pub show_tool_panel: bool,\n    pub show_brush_panel: bool,\n    pub show_layer_panel: bool,\n    \n    // Theme\n    pub use_dark_theme: bool,\n    \n    // Persistent color picker state (avoids premultiplied-alpha drift during editing)\n    pub hsva: Option\u003cegui_sdl2::egui::ecolor::Hsva\u003e,\n    \n}\n\nimpl UiState {\n    pub fn new() -\u003e Self {\n        Self {\n            active_tool: ToolType::Brush,\n            eraser_mode: false,\n            color_picker_open: false,\n            pending_color: None,\n            show_tool_panel: true,\n            show_brush_panel: true,\n            show_layer_panel: true,\n            use_dark_theme: true,\n            hsva: None,\n        }\n    }\n\n    /// Set the active tool\n    pub fn set_tool(\u0026mut self, tool: ToolType) {\n        self.active_tool = tool;\n    }\n\n    /// Apply UI tool selection to the AppState\n    pub fn apply_to_app(\u0026mut self, app: \u0026mut AppState) {\n        if self.active_tool == ToolType::Brush {\n            if app.tool_name() != \"Brush\" {\n                let mut tool = BrushTool::new();\n                tool.set_eraser_mode(self.eraser_mode);\n                app.set_active_tool(Box::new(tool));\n            } else if let Some(config) = app.active_tool_mut().as_brush_config() {\n                config.set_eraser_mode(self.eraser_mode);\n            }\n        }\n    }\n\n    /// Add a new layer\n    pub fn add_layer(\u0026mut self, app: \u0026mut AppState) {\n        app.add_layer();\n    }\n\n    /// Remove a layer by index\n    pub fn remove_layer(\u0026mut self, app: \u0026mut AppState, index: usize) {\n        if index \u003e 0 \u0026\u0026 index \u003c app.canvas().layer_count() {\n            app.execute_command(CanvasCommand::RemoveLayer(RemoveLayer::new(index)));\n        }\n    }\n\n    /// Toggle layer visibility\n    pub fn toggle_layer_visibility(\u0026mut self, app: \u0026mut AppState, index: usize) {\n        if index \u003c app.canvas().layer_count() {\n            app.execute_command(CanvasCommand::ToggleVisibility(ToggleVisibility::new(index)));\n        }\n    }\n\n    /// Set layer opacity\n    pub fn set_layer_opacity(\u0026mut self, app: \u0026mut AppState, index: usize, opacity: f32) {\n        if index \u003c app.canvas().layer_count() {\n            app.execute_command(CanvasCommand::SetOpacity(SetOpacity::new(index, opacity)));\n        }\n    }\n\n    /// Undo the last action\n    pub fn undo(\u0026mut self, app: \u0026mut AppState) {\n        app.undo();\n    }\n\n    /// Redo the last undone action\n    pub fn redo(\u0026mut self, app: \u0026mut AppState) {\n        app.redo();\n    }\n}\n\nimpl Default for UiState {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n","traces":[{"line":34,"address":[],"length":0,"stats":{"Line":1008806316530991104}},{"line":49,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":50,"address":[],"length":0,"stats":{"Line":1080863910568919040}},{"line":54,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":55,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":56,"address":[],"length":0,"stats":{"Line":1152921504606846976}},{"line":57,"address":[],"length":0,"stats":{"Line":0}},{"line":58,"address":[],"length":0,"stats":{"Line":0}},{"line":59,"address":[],"length":0,"stats":{"Line":0}},{"line":60,"address":[],"length":0,"stats":{"Line":3458764513820540928}},{"line":61,"address":[],"length":0,"stats":{"Line":2305843009213693952}},{"line":67,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":68,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":72,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":73,"address":[],"length":0,"stats":{"Line":288230376151711744}},{"line":74,"address":[],"length":0,"stats":{"Line":216172782113783808}},{"line":79,"address":[],"length":0,"stats":{"Line":0}},{"line":80,"address":[],"length":0,"stats":{"Line":0}},{"line":81,"address":[],"length":0,"stats":{"Line":0}},{"line":86,"address":[],"length":0,"stats":{"Line":0}},{"line":87,"address":[],"length":0,"stats":{"Line":0}},{"line":88,"address":[],"length":0,"stats":{"Line":0}},{"line":93,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":94,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":98,"address":[],"length":0,"stats":{"Line":72057594037927936}},{"line":99,"address":[],"length":0,"stats":{"Line":144115188075855872}},{"line":104,"address":[],"length":0,"stats":{"Line":0}},{"line":105,"address":[],"length":0,"stats":{"Line":0}}],"covered":17,"coverable":28},{"path":["C:","\\","Users","robin","Projects","rancer","src","ui_tests.rs"],"content":"//! Tests for Phase 7: egui UI integration\n//!\n//! Tests for egui integration with SDL2, UI state management,\n//! and tool switching via the egui toolbar.\n\nuse crate::ui::{UiState, ToolType};\nuse crate::ui::egui_integration::EguiIntegration;\n\n/// Test that UiState initializes with correct defaults\n#[test]\nfn test_ui_state_defaults() {\n    let ui_state = UiState::new();\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n    assert!(ui_state.show_tool_panel);\n    assert!(ui_state.show_brush_panel);\n    assert!(ui_state.show_layer_panel);\n    // show_color_panel removed - use color_picker_open instead\n    assert!(!ui_state.color_picker_open); // Default: popup closed\n}\n\n/// Test tool switching in UiState\n#[test]\nfn test_ui_state_tool_switching() {\n    let mut ui_state = UiState::new();\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n    \n    ui_state.set_tool(ToolType::Brush);\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n}\n\n/// Test UiState apply_to_app creates correct tool\n#[test]\nfn test_ui_state_apply_to_app() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test UiState layer operations\n#[test]\nfn test_ui_state_layer_operations() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Add a layer\n    ui_state.add_layer(\u0026mut app);\n    assert!(app.canvas().layer_count() \u003e= 2); // Started with 1, added 1\n    \n    // Remove a layer (not index 0)\n    let layer_count_before = app.canvas().layer_count();\n    if layer_count_before \u003e 1 {\n        ui_state.remove_layer(\u0026mut app, 1);\n        assert_eq!(app.canvas().layer_count(), layer_count_before - 1);\n    }\n}\n\n/// Test UiState undo/redo\n#[test]\nfn test_ui_state_undo_redo() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Do an action that can be undone\n    ui_state.add_layer(\u0026mut app);\n    let layer_count_after_add = app.canvas().layer_count();\n    \n    // Undo\n    ui_state.undo(\u0026mut app);\n    assert_eq!(app.canvas().layer_count(), layer_count_after_add - 1);\n    \n    // Redo\n    ui_state.redo(\u0026mut app);\n    assert_eq!(app.canvas().layer_count(), layer_count_after_add);\n}\n\n/// Test EguiIntegration creation (requires SDL2 context)\n/// This test verifies the integration can be created without panicking\n/// Note: SDL2 can only be initialized once, so we skip if already initialized\n#[test]\nfn test_egui_integration_creation() {\n    // Skip if SDL2 already initialized (e.g., by another test)\n    let sdl = match sdl2::init() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            eprintln!(\"Skipping test: SDL2 already initialized\");\n            return;\n        }\n    };\n    let video = sdl.video().expect(\"Failed to init video\");\n    \n    let window = video\n        .window(\"Test\", 800, 600)\n        .opengl()\n        .build()\n        .expect(\"Failed to create window\");\n    \n    let gl_context = window\n        .gl_create_context()\n        .expect(\"Failed to create GL context\");\n    \n    let gl = unsafe {\n        glow::Context::from_loader_function(|s| {\n            video.gl_get_proc_address(s) as *const std::os::raw::c_void\n        })\n    };\n    \n    // This should not panic\n    let result = EguiIntegration::new(\u0026window, \u0026gl_context, \u0026gl);\n    assert!(result.is_ok(), \"EguiIntegration creation failed: {:?}\", result.err());\n}\n\n/// Test that egui context is accessible\n#[test]\nfn test_egui_integration_ctx_access() {\n    // Skip if SDL2 already initialized (e.g., by another test)\n    let sdl = match sdl2::init() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            eprintln!(\"Skipping test: SDL2 already initialized\");\n            return;\n        }\n    };\n    let video = sdl.video().expect(\"Failed to init video\");\n    \n    let window = video\n        .window(\"Test\", 800, 600)\n        .opengl()\n        .build()\n        .expect(\"Failed to create window\");\n    \n    let gl_context = window\n        .gl_create_context()\n        .expect(\"Failed to create GL context\");\n    \n    let gl = unsafe {\n        glow::Context::from_loader_function(|s| {\n            video.gl_get_proc_address(s) as *const std::os::raw::c_void\n        })\n    };\n    \n    let mut egui = EguiIntegration::new(\u0026window, \u0026gl_context, \u0026gl)\n        .expect(\"Failed to create EguiIntegration\");\n    \n    // Should be able to get context (just check it's not null)\n    let _ctx = egui.ctx(); // If this doesn't panic, it's working\n}\n\n/// Test ToolType conversion from UiState to app\n#[test]\nfn test_tool_type_consistency() {\n    assert_eq!(ToolType::Brush as u8, crate::tools::ToolType::Brush as u8);\n}\n\n/// Test that clicking tool icon in UI updates active_tool in UiState\n#[test]\nfn test_tool_switching_via_ui() {\n    let mut ui_state = UiState::new();\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n    \n    ui_state.set_tool(ToolType::Brush);\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n}\n\n/// Test that apply_to_app correctly changes the tool in AppState\n#[test]\nfn test_apply_to_app_switches_tools() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n    \n    ui_state.set_tool(ToolType::Brush);\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that tool switching preserves brush settings\n#[test]\nfn test_tool_switching_preserves_settings() {\n    use crate::app::AppState;\n    use crate::brush::BrushType;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    if let Some(config) = app.active_tool_mut().as_brush_config() {\n        config.set_brush_size(25);\n        config.set_brush_opacity(0.5);\n        config.set_brush_type(BrushType::Square);\n    }\n    \n    ui_state.set_tool(ToolType::Brush);\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that multiple rapid tool switches work correctly\n#[test]\nfn test_rapid_tool_switching() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    for _ in 0..10 {\n        ui_state.set_tool(ToolType::Brush);\n        ui_state.apply_to_app(\u0026mut app);\n    }\n    \n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that clicking Brush tool icon updates active_tool and applies to app\n#[test]\nfn test_click_brush_tool_icon() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Simulate clicking Brush tool (should already be Brush)\n    ui_state.set_tool(ToolType::Brush);\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n    assert_eq!(ui_state.active_tool, ToolType::Brush);\n}\n\n/// Test that apply_to_app doesn't recreate tool if already correct\n#[test]\nfn test_apply_to_app_no_recreate() {\n    use crate::app::AppState;\n    \n    let mut app = AppState::new(800, 600);\n    let mut ui_state = UiState::new();\n    \n    // Apply when already Brush (should not recreate)\n    ui_state.apply_to_app(\u0026mut app);\n    assert_eq!(app.tool_name(), \"Brush\");\n}\n\n/// Test that SVG icon doesn't disappear on hover\n/// This tests that the UI correctly renders icons without duplication or disappearance\n#[test]\nfn test_icon_does_not_disappear_on_hover() {\n    // This is a visual test - we can't test hover state directly in unit tests\n    // But we can verify the icon loading works correctly\n    use crate::ui::icons;\n    \n    // Verify all icons can be loaded as SVG\n    let icon_list = [\n        (\"Brush\", icons::BRUSH_ICON),\n        (\"Eraser\", icons::ERASER_ICON),\n        (\"Zoom In\", icons::ZOOM_IN_ICON),\n        (\"Zoom Out\", icons::ZOOM_OUT_ICON),\n        (\"Undo\", icons::UNDO_ICON),\n        (\"Redo\", icons::REDO_ICON),\n        (\"Add Layer\", icons::ADD_LAYER_ICON),\n    ];\n    \n    for (name, svg) in \u0026icon_list {\n        // SVG should be valid and loadable\n        assert!(!svg.is_empty(), \"{} icon SVG is empty\", name);\n        assert!(svg.contains(\"\u003csvg\"), \"{} icon missing \u003csvg\u003e tag\", name);\n        assert!(svg.contains(\"\u003c/svg\u003e\"), \"{} icon missing \u003c/svg\u003e tag\", name);\n    }\n}\n\n/// Test that tool button click area is correct size (no shrinkage)\n#[test]\nfn test_tool_button_fixed_size() {\n    // Verify that the UI uses fixed min_size for tool buttons\n    // This is a code review test - checking that our implementation\n    // uses min_size(36.0, 36.0) and not shrink_to_fit()\n    use std::fs;\n    let ui_impl = fs::read_to_string(\"src/ui/egui_impl.rs\").expect(\"Failed to read egui_impl.rs\");\n    \n    // Should use min_size for fixed dimensions\n    assert!(ui_impl.contains(\"min_size(egui::vec2(36.0, 36.0))\"), \n               \"Tool buttons should use min_size(36, 36) to prevent shrinkage\");\n    \n    // Should NOT use shrink_to_fit or similar\n    assert!(!ui_impl.contains(\"shrink_to_fit\"), \n               \"Tool buttons should not shrink on hover\");\n}\n\n/// Test that icon is drawn ONCE (no duplication)\n#[test]\nfn test_icon_not_duplicated() {\n    use std::fs;\n    let ui_impl = fs::read_to_string(\"src/ui/egui_impl.rs\").expect(\"Failed to read egui_impl.rs\");\n    \n    // Should use Button::image() which draws icon once\n    assert!(ui_impl.contains(\"Button::image(\"), \n               \"Should use Button::image() to draw icon once\");\n    \n    // Should NOT have manual painter().image() calls that duplicate\n    assert!(!ui_impl.contains(\"painter().image(\"), \n               \"Should not have painter().image() calls that cause duplication\");\n}\n\n/// Test that SVG icon module exists and has expected icons\n#[test]\nfn test_svg_icons_exist() {\n    use crate::ui::icons;\n    \n    // Verify icon constants exist and are non-empty\n    assert!(!icons::BRUSH_ICON.is_empty());\n    assert!(!icons::ERASER_ICON.is_empty());\n    assert!(!icons::ZOOM_IN_ICON.is_empty());\n    assert!(!icons::ZOOM_OUT_ICON.is_empty());\n    assert!(!icons::UNDO_ICON.is_empty());\n    assert!(!icons::REDO_ICON.is_empty());\n    assert!(!icons::ADD_LAYER_ICON.is_empty());\n    \n    // Verify icons contain SVG header\n    assert!(icons::BRUSH_ICON.contains(\"\u003csvg\"));\n    assert!(icons::ERASER_ICON.contains(\"\u003csvg\"));\n    assert!(icons::ZOOM_IN_ICON.contains(\"\u003csvg\"));\n}\n\n/// Test that SVG icons are valid XML (basic check)\n#[test]\nfn test_svg_icons_valid_xml() {\n    use crate::ui::icons;\n    \n    // All icons should have opening and closing svg tags\n    let icon_list = [\n        icons::BRUSH_ICON,\n        icons::ERASER_ICON,\n        icons::COLOR_PICKER_ICON,\n        icons::MOVE_ICON,\n        icons::TEXT_ICON,\n        icons::SHAPES_ICON,\n        icons::FILL_ICON,\n        icons::LINE_ICON,\n        icons::ZOOM_IN_ICON,\n        icons::ZOOM_OUT_ICON,\n        icons::EXPORT_ICON,\n        icons::ADD_LAYER_ICON,\n        icons::DELETE_ICON,\n        icons::UNDO_ICON,\n        icons::REDO_ICON,\n        icons::EYE_ICON,\n        icons::EYE_OFF_ICON,\n        icons::SETTINGS_ICON,\n        icons::THEME_ICON,\n    ];\n    \n    for (i, svg) in icon_list.iter().enumerate() {\n        // Check basic SVG structure\n        assert!(svg.contains(\"\u003csvg\"), \"Icon {} missing \u003csvg\u003e tag\", i);\n        assert!(svg.contains(\"\u003c/svg\u003e\"), \"Icon {} missing \u003c/svg\u003e tag\", i);\n        assert!(svg.contains(\"xmlns=\"), \"Icon {} missing xmlns\", i);\n        assert!(svg.contains(\"width=\"), \"Icon {} missing width\", i);\n        assert!(svg.contains(\"height=\"), \"Icon {} missing height\", i);\n    }\n}\n\n/// Test SVG icon loading with egui_extras\n#[test]\nfn test_svg_icon_loading() {\n    // Test that egui_extras can load SVG bytes\n    use crate::ui::icons;\n    \n    // Try to load brush icon (this tests the API without needing egui context)\n    let svg_bytes = icons::BRUSH_ICON.as_bytes();\n    assert!(!svg_bytes.is_empty());\n    \n    // Verify SVG has expected elements for a brush icon\n    let svg_str = std::str::from_utf8(svg_bytes).expect(\"SVG should be valid UTF-8\");\n    assert!(svg_str.contains(\"path\"), \"Brush icon should have path elements\");\n}\n\n/// Test UiState has theme toggle field\n#[test]\nfn test_ui_state_theme_toggle() {\n    let ui_state = UiState::new();\n    // Should have use_dark_theme field\n    assert!(ui_state.use_dark_theme); // Default is true (dark theme)\n}\n\n/// Test icon size consistency (all should be 24x24)\n#[test]\nfn test_svg_icon_size_consistency() {\n    use crate::ui::icons;\n    \n    // Parse SVG to check viewBox or width/height\n    // All icons should be 24x24 based on our design\n    let icon_list = [\n        (\"Brush\", icons::BRUSH_ICON),\n        (\"Eraser\", icons::ERASER_ICON),\n        (\"Zoom In\", icons::ZOOM_IN_ICON),\n        (\"Undo\", icons::UNDO_ICON),\n    ];\n    \n    for (name, svg) in icon_list {\n        // Check width and height are 24\n        assert!(svg.contains(\"width=\\\"24\\\"\"), \"{} icon should be 24px wide\", name);\n        assert!(svg.contains(\"height=\\\"24\\\"\"), \"{} icon should be 24px tall\", name);\n        assert!(svg.contains(\"viewBox=\\\"0 0 24 24\\\"\"), \"{} icon should have 24x24 viewBox\", name);\n    }\n}\n\n/// Test color conversion functions\n#[test]\nfn test_color_conversion_functions() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    // Test basic RGB color (opaque)\n    let color = Color { r: 255, g: 128, b: 64, a: 255 };\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted.r, 255);\n    assert_eq!(converted.g, 128);\n    assert_eq!(converted.b, 64);\n    assert_eq!(converted.a, 255);\n}\n\n/// Test opaque black conversion\n#[test]\nfn test_color_conversion_black() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let color = Color::BLACK; // r:0, g:0, b:0, a:255\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted, Color::BLACK);\n}\n\n/// Test white color conversion\n#[test]\nfn test_color_conversion_white() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let color = Color::WHITE; // r:255, g:255, b:255, a:255\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted, Color::WHITE);\n}\n\n/// Test that color swatch reads from active tool's brush color\n#[test]\nfn test_color_swatch_shows_brush_color() {\n    use crate::app::AppState;\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::color_to_color32;\n    \n    let app = AppState::new(800, 600);\n    \n    // Get current brush color (default is black)\n    let settings = app.active_tool().brush_settings().unwrap();\n    let color32 = color_to_color32(settings.color);\n    \n    // Default color should be black (0,0,0,255)\n    assert_eq!(settings.color, Color::BLACK);\n    \n    // Color32 should match\n    let expected = color_to_color32(Color::BLACK);\n    assert_eq!(color32, expected);\n}\n\n/// Test that changing brush color updates what swatch shows\n#[test]\nfn test_changing_brush_color_updates_swatch() {\n    use crate::app::AppState;\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let mut app = AppState::new(800, 600);\n    \n    // Change brush color to red via BrushConfig\n    let red = Color { r: 255, g: 0, b: 0, a: 255 };\n    if let Some(config) = app.active_tool_mut().as_brush_config() {\n        config.set_brush_color(red);\n    }\n    \n    // Now swatch should show red\n    let settings = app.active_tool().brush_settings().unwrap();\n    let color32 = color_to_color32(settings.color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted, red);\n}\n\n/// Test that clicking color swatch toggles color_picker_open\n#[test]\nfn test_color_swatch_click_toggles_picker() {\n    let mut ui_state = UiState::new();\n    \n    // Initially closed\n    assert!(!ui_state.color_picker_open);\n    \n    // Simulate click: toggle open\n    ui_state.color_picker_open = !ui_state.color_picker_open;\n    assert!(ui_state.color_picker_open);\n    \n    // Simulate click again: toggle closed\n    ui_state.color_picker_open = !ui_state.color_picker_open;\n    assert!(!ui_state.color_picker_open);\n}\n\n/// Test that color conversion with alpha \u003c 255 preserves RGB values\n/// within 1 of the original (integer rounding from premultiplied format).\n#[test]\nfn test_color_conversion_with_alpha_preserves_rgb() {\n    use crate::canvas::Color;\n    use crate::ui::egui_impl::{color_to_color32, color32_to_color};\n    \n    let color = Color { r: 200, g: 150, b: 100, a: 128 };\n    let color32 = color_to_color32(color);\n    let converted = color32_to_color(color32);\n    \n    assert_eq!(converted.a, 128);\n    // u8 premultiplied arithmetic loses at most 1 per channel\n    assert!(converted.r.abs_diff(200) \u003c= 1);\n    assert!(converted.g.abs_diff(150) \u003c= 1);\n    assert!(converted.b.abs_diff(100) \u003c= 1);\n}\n\n/// Test that UiState hsva lifecycle matches picker open/close\n#[test]\nfn test_ui_state_hsva_lifecycle() {\n    use crate::ui::state::UiState;\n    \n    let mut state = UiState::new();\n    assert!(state.hsva.is_none());\n    \n    // Simulate picker opening: initialize Hsva from brush color\n    let color = crate::canvas::Color { r: 100, g: 150, b: 200, a: 255 };\n    state.hsva = Some(egui_sdl2::egui::ecolor::Hsva::from_srgba_unmultiplied([\n        color.r, color.g, color.b, color.a,\n    ]));\n    assert!(state.hsva.is_some());\n    \n    // Simulate picker closing: reset to None\n    state.color_picker_open = false;\n    state.hsva = None;\n    assert!(state.hsva.is_none());\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","undo_tests.rs"],"content":"//! Tests for Phase 4: undo/redo with command pattern\n\n#[test]\nfn add_layer_command_edits_canvas() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::AddLayer;\n\n    let mut canvas = Canvas::new();\n    assert_eq!(canvas.layer_count(), 1); // Starts with 1 default layer\n\n    let mut record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, AddLayer::default());\n    \n    assert_eq!(canvas.layer_count(), 2);\n}\n\n#[test]\nfn add_layer_command_undo_removes_layer() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::AddLayer;\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, AddLayer::default());\n    assert_eq!(canvas.layer_count(), 2);\n\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 1);\n}\n\n#[test]\nfn add_layer_command_redo_adds_layer_back() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::AddLayer;\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, AddLayer::default());\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 1);\n\n    record.redo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 2);\n}\n\n#[test]\nfn remove_layer_command_removes_and_undo_restores() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::{AddLayer, RemoveLayer};\n\n    let mut canvas = Canvas::new();\n    let mut add_record: Record\u003cAddLayer\u003e = Record::new();\n    let _ = add_record.edit(\u0026mut canvas, AddLayer::default());\n    assert_eq!(canvas.layer_count(), 2);\n\n    let removed_idx = canvas.layer_count() - 1;\n    let mut remove_record: Record\u003cRemoveLayer\u003e = Record::new();\n    let _ = remove_record.edit(\u0026mut canvas, RemoveLayer::new(removed_idx));\n    assert_eq!(canvas.layer_count(), 1);\n\n    remove_record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 2);\n}\n\n#[test]\nfn toggle_visibility_command_toggles_and_undo_restores() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::ToggleVisibility;\n\n    let mut canvas = Canvas::new();\n    // Default layer is visible\n    assert!(canvas.layers()[0].visible);\n\n    let mut record: Record\u003cToggleVisibility\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, ToggleVisibility::new(0));\n    assert!(!canvas.layers()[0].visible);\n\n    record.undo(\u0026mut canvas);\n    assert!(canvas.layers()[0].visible);\n}\n\n#[test]\nfn set_opacity_command_changes_and_undo_restores() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::SetOpacity;\n\n    let mut canvas = Canvas::new();\n    assert_eq!(canvas.layers()[0].opacity, 1.0);\n\n    let mut record: Record\u003cSetOpacity\u003e = Record::new();\n    let _ = record.edit(\u0026mut canvas, SetOpacity::new(0, 0.5));\n    assert_eq!(canvas.layers()[0].opacity, 0.5);\n\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layers()[0].opacity, 1.0);\n}\n\n#[test]\nfn canvas_undo_record_handles_multiple_commands() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::{CanvasCommand, AddLayer, ToggleVisibility};\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cCanvasCommand\u003e = Record::new();\n    \n    // Add a layer\n    let _ = record.edit(\u0026mut canvas, CanvasCommand::AddLayer(AddLayer::default()));\n    assert_eq!(canvas.layer_count(), 2);\n    \n    // Toggle visibility\n    let _ = record.edit(\u0026mut canvas, CanvasCommand::ToggleVisibility(ToggleVisibility::new(0)));\n    assert!(!canvas.layers()[0].visible);\n    \n    // Undo toggle\n    record.undo(\u0026mut canvas);\n    assert!(canvas.layers()[0].visible);\n    assert_eq!(canvas.layer_count(), 2);\n    \n    // Undo add layer\n    record.undo(\u0026mut canvas);\n    assert_eq!(canvas.layer_count(), 1);\n}\n\n#[test]\nfn canvas_can_undo_and_can_redo() {\n    use undo::Record;\n    use crate::canvas::Canvas;\n    use crate::commands::{CanvasCommand, AddLayer};\n\n    let mut canvas = Canvas::new();\n    let mut record: Record\u003cCanvasCommand\u003e = Record::new();\n    \n    assert!(!record.can_undo());\n    assert!(!record.can_redo());\n    \n    let _ = record.edit(\u0026mut canvas, CanvasCommand::AddLayer(AddLayer::default()));\n    assert!(record.can_undo());\n    assert!(!record.can_redo());\n    \n    record.undo(\u0026mut canvas);\n    assert!(!record.can_undo());\n    assert!(record.can_redo());\n}\n","traces":[],"covered":0,"coverable":0},{"path":["C:","\\","Users","robin","Projects","rancer","src","viewport.rs"],"content":"pub const ZOOM_MIN: f64 = 0.1;\npub const ZOOM_MAX: f64 = 64.0;\npub const ZOOM_FACTOR: f64 = 1.15;\n\npub struct ViewportState {\n    pub offset_x: f64,\n    pub offset_y: f64,\n    pub scale: f64,\n    pub canvas_width: u32,\n    pub canvas_height: u32,\n    pub window_width: u32,\n    pub window_height: u32,\n}\n\nimpl ViewportState {\n    pub fn new(canvas_width: u32, canvas_height: u32, window_width: u32, window_height: u32) -\u003e Self {\n        let (offset_x, offset_y) = if canvas_width \u003c= window_width \u0026\u0026 canvas_height \u003c= window_height {\n            (\n                (window_width - canvas_width) as f64 / 2.0,\n                (window_height - canvas_height) as f64 / 2.0,\n            )\n        } else {\n            (0.0, 0.0)\n        };\n\n        Self {\n            offset_x,\n            offset_y,\n            scale: 1.0,\n            canvas_width,\n            canvas_height,\n            window_width,\n            window_height,\n        }\n    }\n\n    fn zoom_impl(\u0026mut self, center_x: f64, center_y: f64, factor: f64) {\n        let old = self.scale;\n        self.scale = (self.scale * factor).clamp(ZOOM_MIN, ZOOM_MAX);\n        let cx = (center_x - self.offset_x) / old;\n        let cy = (center_y - self.offset_y) / old;\n        self.offset_x = center_x - cx * self.scale;\n        self.offset_y = center_y - cy * self.scale;\n    }\n\n    pub fn zoom_in(\u0026mut self) {\n        self.zoom_impl(\n            self.window_width as f64 / 2.0,\n            self.window_height as f64 / 2.0,\n            ZOOM_FACTOR,\n        );\n    }\n\n    pub fn zoom_out(\u0026mut self) {\n        self.zoom_impl(\n            self.window_width as f64 / 2.0,\n            self.window_height as f64 / 2.0,\n            1.0 / ZOOM_FACTOR,\n        );\n    }\n\n    pub fn pan(\u0026mut self, dx: f32, dy: f32) {\n        self.offset_x += dx as f64;\n        self.offset_y += dy as f64;\n    }\n\n    pub fn zoom_toward(\u0026mut self, sx: f32, sy: f32, factor: f64) {\n        self.zoom_impl(sx as f64, sy as f64, factor);\n    }\n\n    pub fn zoom_to_fit(\u0026mut self) {\n        let scale_x = self.window_width as f64 / self.canvas_width as f64;\n        let scale_y = self.window_height as f64 / self.canvas_height as f64;\n        self.scale = scale_x.min(scale_y).min(1.0);\n        self.offset_x = (self.window_width as f64 - self.canvas_width as f64 * self.scale) / 2.0;\n        self.offset_y = (self.window_height as f64 - self.canvas_height as f64 * self.scale) / 2.0;\n    }\n\n    pub fn zoom_to_100(\u0026mut self) {\n        self.scale = 1.0;\n        self.offset_x = ((self.window_width as f64 - self.canvas_width as f64) / 2.0).max(0.0);\n        self.offset_y = ((self.window_height as f64 - self.canvas_height as f64) / 2.0).max(0.0);\n    }\n\n    pub fn resize_window(\u0026mut self, width: u32, height: u32) {\n        self.window_width = width;\n        self.window_height = height;\n        let (offset_x, offset_y) = if self.canvas_width \u003c= width \u0026\u0026 self.canvas_height \u003c= height {\n            ((width - self.canvas_width) as f64 / 2.0, (height - self.canvas_height) as f64 / 2.0)\n        } else {\n            (0.0, 0.0)\n        };\n        self.offset_x = offset_x;\n        self.offset_y = offset_y;\n    }\n\n    pub fn screen_to_canvas(\u0026self, sx: f32, sy: f32) -\u003e Option\u003c(f32, f32)\u003e {\n        let cx = (sx as f64 - self.offset_x) / self.scale;\n        let cy = (sy as f64 - self.offset_y) / self.scale;\n        if cx \u003e= 0.0 \u0026\u0026 cx \u003c self.canvas_width as f64 \u0026\u0026 cy \u003e= 0.0 \u0026\u0026 cy \u003c self.canvas_height as f64 {\n            Some((cx as f32, cy as f32))\n        } else {\n            None\n        }\n    }\n\n    /// Returns (x, y, width, height) of the visible canvas region in screen coordinates.\n    /// The rectangle is clipped to the window bounds.\n    pub fn viewport_rect(\u0026self) -\u003e (i32, i32, i32, i32) {\n        let left = self.offset_x;\n        let top = self.offset_y;\n        let right = self.offset_x + self.canvas_width as f64 * self.scale;\n        let bottom = self.offset_y + self.canvas_height as f64 * self.scale;\n\n        let vx = left.max(0.0) as i32;\n        let vy = top.max(0.0) as i32;\n        let vw = (right.min(self.window_width as f64) - vx as f64) as i32;\n        let vh = (bottom.min(self.window_height as f64) - vy as f64) as i32;\n\n        (vx.max(0), vy.max(0), vw.max(0), vh.max(0))\n    }\n\n    /// Returns texture UV coordinates [x1,y1, x2,y2, x3,y3, x4,y4] for the fullscreen quad.\n    /// Maps the visible portion of the canvas to the viewport rect.\n    /// Uses OpenGL convention where v=0 is the bottom of the texture (canvas row 0, top of image)\n    /// and v=1 is the top of the texture (last canvas row, bottom of image).\n    pub fn texture_uv(\u0026self) -\u003e [f32; 8] {\n        let (vx, vy, vw, vh) = self.viewport_rect();\n\n        let canvas_x = (vx as f64 - self.offset_x) / self.scale;\n        let canvas_y = (vy as f64 - self.offset_y) / self.scale;\n        let canvas_rx = ((vx + vw) as f64 - self.offset_x) / self.scale;\n        let canvas_by = ((vy + vh) as f64 - self.offset_y) / self.scale;\n\n        let u0 = (canvas_x / self.canvas_width as f64).clamp(0.0, 1.0) as f32;\n        let u1 = (canvas_rx / self.canvas_width as f64).clamp(0.0, 1.0) as f32;\n        let v_bottom = (canvas_by / self.canvas_height as f64).clamp(0.0, 1.0) as f32;\n        let v_top = (canvas_y / self.canvas_height as f64).clamp(0.0, 1.0) as f32;\n\n        [u0, v_bottom, u1, v_bottom, u1, v_top, u0, v_top]\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn new_viewport_centers_canvas_when_fitting_in_window() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n        assert_eq!(vp.scale, 1.0);\n        assert_eq!(vp.canvas_width, 1280);\n        assert_eq!(vp.canvas_height, 720);\n        assert_eq!(vp.window_width, 1920);\n        assert_eq!(vp.window_height, 1080);\n    }\n\n    #[test]\n    fn new_viewport_puts_top_left_at_origin_when_canvas_larger_than_window() {\n        let vp = ViewportState::new(1280, 720, 800, 600);\n        assert_eq!(vp.offset_x, 0.0);\n        assert_eq!(vp.offset_y, 0.0);\n        assert_eq!(vp.scale, 1.0);\n    }\n\n    #[test]\n    fn screen_to_canvas_maps_window_coord_to_canvas_coord_when_centered() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        let result = vp.screen_to_canvas(400.0, 200.0);\n        assert_eq!(result, Some((80.0, 20.0)));\n    }\n\n    #[test]\n    fn screen_to_canvas_returns_none_for_letterbox_click() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        assert_eq!(vp.screen_to_canvas(100.0, 100.0), None);\n    }\n\n    #[test]\n    fn resize_window_recomputes_offset_when_window_grows() {\n        let mut vp = ViewportState::new(1280, 720, 800, 600);\n        assert_eq!(vp.offset_x, 0.0);\n        assert_eq!(vp.offset_y, 0.0);\n\n        vp.resize_window(1920, 1080);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n        assert_eq!(vp.scale, 1.0);\n    }\n\n    #[test]\n    fn zoom_to_fit_scales_down_oversized_canvas() {\n        let mut vp = ViewportState::new(1280, 720, 800, 600);\n        vp.zoom_to_fit();\n        let expected_scale = (800.0_f64 / 1280.0).min(600.0_f64 / 720.0);\n        assert!((vp.scale - expected_scale).abs() \u003c 1e-12);\n        assert!((vp.offset_x - 0.0).abs() \u003c 1e-12);\n        assert!((vp.offset_y - 75.0).abs() \u003c 1e-12);\n    }\n\n    #[test]\n    fn zoom_to_fit_does_not_upscale_when_canvas_fits() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.zoom_to_fit();\n        assert_eq!(vp.scale, 1.0);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n    }\n\n    #[test]\n    fn zoom_to_100_resets_scale_and_centers() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = 2.0;\n        vp.offset_x = 100.0;\n        vp.offset_y = 50.0;\n\n        vp.zoom_to_100();\n        assert_eq!(vp.scale, 1.0);\n        assert_eq!(vp.offset_x, 320.0);\n        assert_eq!(vp.offset_y, 180.0);\n    }\n\n    #[test]\n    fn zoom_in_increases_scale_and_preserves_viewport_center() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        let center = vp.screen_to_canvas(960.0, 540.0);\n\n        vp.zoom_in();\n\n        assert!(vp.scale \u003e 1.0);\n        let center_after = vp.screen_to_canvas(960.0, 540.0);\n        assert_eq!(center, center_after);\n    }\n\n    #[test]\n    fn zoom_out_decreases_scale_and_preserves_viewport_center() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        let center = vp.screen_to_canvas(960.0, 540.0);\n\n        vp.zoom_out();\n\n        assert!(vp.scale \u003c 1.0);\n        let center_after = vp.screen_to_canvas(960.0, 540.0);\n        assert_eq!(center, center_after);\n    }\n\n    #[test]\n    fn zoom_in_clamps_at_max() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MAX;\n\n        vp.zoom_in();\n\n        assert_eq!(vp.scale, ZOOM_MAX);\n    }\n\n    #[test]\n    fn zoom_out_clamps_at_min() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MIN;\n\n        vp.zoom_out();\n\n        assert_eq!(vp.scale, ZOOM_MIN);\n    }\n\n    #[test]\n    fn viewport_rect_full_canvas_when_equal_to_window() {\n        let vp = ViewportState::new(1280, 720, 1280, 720);\n        let (x, y, w, h) = vp.viewport_rect();\n        assert_eq!((x, y, w, h), (0, 0, 1280, 720));\n    }\n\n    #[test]\n    fn viewport_rect_centered_when_window_larger_than_canvas() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        let (x, y, w, h) = vp.viewport_rect();\n        assert_eq!((x, y, w, h), (320, 180, 1280, 720));\n    }\n\n    #[test]\n    fn viewport_rect_full_window_when_canvas_larger_than_window() {\n        let vp = ViewportState::new(1280, 720, 640, 480);\n        let (x, y, w, h) = vp.viewport_rect();\n        assert_eq!((x, y, w, h), (0, 0, 640, 480));\n    }\n\n    #[test]\n    fn texture_uv_full_when_canvas_fits_in_window() {\n        let vp = ViewportState::new(1280, 720, 1920, 1080);\n        let uv = vp.texture_uv();\n        assert_eq!(uv, [0.0, 1.0, 1.0, 1.0, 1.0, 0.0, 0.0, 0.0]);\n    }\n\n    #[test]\n    fn zoom_toward_clamps_at_max() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MAX;\n        vp.zoom_toward(600.0, 300.0, ZOOM_FACTOR);\n        assert_eq!(vp.scale, ZOOM_MAX);\n    }\n\n    #[test]\n    fn zoom_toward_clamps_at_min() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.scale = ZOOM_MIN;\n        vp.zoom_toward(600.0, 300.0, 1.0 / ZOOM_FACTOR);\n        assert_eq!(vp.scale, ZOOM_MIN);\n    }\n\n    #[test]\n    fn viewport_rect_vy_is_window_from_top_not_opengl_from_bottom() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.pan(0.0, -100.0);\n        let (_, vy, _, vh) = vp.viewport_rect();\n        let gl_y = vp.window_height as i32 - vy - vh;\n        // After panning up 100px from center (vy=180), vy should be ~80\n        // gl_y should be 1080 - 80 - 720 = 280\n        assert_ne!(vy, gl_y);\n        assert_eq!(gl_y, 280);\n    }\n\n    #[test]\n    fn screen_to_canvas_at_viewport_top_left_maps_to_near_origin() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        vp.pan(0.0, -100.0);\n        let (vx, vy, _, _) = vp.viewport_rect();\n        let canvas = vp.screen_to_canvas(vx as f32, vy as f32);\n        assert!(canvas.is_some());\n        let (cx, cy) = canvas.unwrap();\n        assert!((cx - 0.0).abs() \u003c 1e-6);\n        assert!((cy - 0.0).abs() \u003c 1e-6);\n    }\n\n    #[test]\n    fn pan_moves_offset() {\n        let mut vp = ViewportState::new(1280, 720, 1920, 1080);\n        let before_x = vp.offset_x;\n        let before_y = vp.offset_y;\n\n        vp.pan(100.0, 50.0);\n\n     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
