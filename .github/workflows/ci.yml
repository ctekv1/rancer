name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Build debug
        run: cargo build

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache tarpaulin
        id: cache-tarpaulin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: ${{ runner.os }}-tarpaulin

      - name: Install tarpaulin
        if: steps.cache-tarpaulin.outputs.cache-hit != 'true'
        run: cargo install cargo-tarpaulin --locked

      - name: Code coverage
        run: cargo tarpaulin --out Xml --out Html --out Json

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7

      - name: Show coverage summary
        run: |
          if [ -f "coverage/tarpaulin.json" ]; then
            jq -r '.[] | "\(.filename): \(.line_covered_percent)% line coverage"' coverage/tarpaulin.json
            TOTAL=$(jq -r '[.[].line_covered_percent] | add / length' coverage/tarpaulin.json)
            echo "Total line coverage: $TOTAL%"
          else
            echo "No coverage report found"
          fi

  verify-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.94 (MSRV)
        uses: dtolnay/rust-toolchain@1.94

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build with MSRV
        run: cargo build

      - name: Test with MSRV
        run: cargo test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check documentation
        run: cargo doc --no-deps

  ci-status:
    name: CI Status
    needs: [build-and-test, coverage, verify-msrv, audit, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          for job in build-and-test coverage verify-msrv audit docs; do
            result=$(jq -r --arg job "$job" '.[$job].result' <<< '${{ toJSON(needs) }}')
            if [ "$result" != "success" ]; then
              echo "Job $job failed with status: $result"
              exit 1
            fi
            echo "Job $job passed"
          done
          echo "All CI jobs passed"
