[coverage]
# Files excluded because they require a display or GPU (cannot be unit tested):
# - main.rs: Application entry point
# - renderer.rs: OpenGL GPU rendering
# - window/sdl2.rs: SDL2 window, GL context, event loop
# - export_ui.rs: Native file dialogs
# - ui/egui_integration.rs: egui-SDL2 integration needs display
exclude-files = [
    "target/**",
    "src/main.rs",
    "src/renderer.rs",
    "src/window/sdl2.rs",
    "src/export_ui.rs",
    "src/ui/egui_integration.rs",
]

report-dir = "coverage"
output-format = ["Html", "Json", "Xml"]

clean = true
run-tests = true
