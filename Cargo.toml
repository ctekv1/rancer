[package]
name = "rancer"
version = "0.0.3"
edition = "2024"
rust-version = "1.94"
description = "A high-performance digital art application built in Rust with cross-platform support"
authors = ["Your Name <your.email@example.com>"]
license = "GPL-3.0-or-later"
repository = "https://github.com/ctekv1/rancer"
keywords = ["graphics", "art", "canvas", "drawing"]
categories = ["graphics"]

[dependencies]
winit = "0.30"
wgpu = "28.0"
tokio = { version = "1.0", features = ["full"] }
bytemuck = "1.25.0"
futures = "0.3"
raw-window-handle = "0.6"
chrono = "0.4"
log = "0.4"
env_logger = "0.11"

[target.'cfg(target_os = "linux")'.dependencies]
gtk4 = "0.9"
cairo-rs = "0.20"
