[package]
name = "rancer"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
description = "A high-performance digital art application built in Rust with cross-platform support"
authors = ["Your Name <your.email@example.com>"]
license = "MIT"
repository = "https://github.com/yourusername/rancer"
keywords = ["graphics", "art", "canvas", "drawing"]
categories = ["graphics"]

[dependencies]
gtk4 = "0.9"
wgpu = "28.0"
tokio = { version = "1.0", features = ["full"] }
bytemuck = "1.25.0"
futures = "0.3"
raw-window-handle = "0.6"
